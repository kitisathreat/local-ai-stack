<!--
  Landing page for www.mylensandi.com/chat.
  Drop this into a Squarespace Code Block on the /chat page.

  Also add this to Design → Custom CSS to make the page full-screen:

  .page-chat #page,
  .page-chat .content-wrapper,
  .page-chat .sections {
    height: 100vh;
    padding: 0;
    margin: 0;
  }
  .page-chat header,
  .page-chat footer,
  .page-chat .Mobile-bar {
    display: none !important;
  }

<style>
  #lai-splash {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100dvh;
    background: radial-gradient(ellipse at center, #0f0f12 0%, #050506 100%);
    color: #e7e7e7;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    z-index: 9999;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    text-align: center;
    padding: 24px;
  }

  #lai-splash h1 {
    margin: 0;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  #lai-splash p {
    margin: 0;
    color: #9a9aa2;
    font-size: 15px;
    max-width: 420px;
    line-height: 1.5;
  }

  #lai-open {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #5b5fc7;
    color: #fff;
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
    padding: 14px 28px;
    border-radius: 12px;
    transition: transform 0.15s ease, background 0.15s ease;
    box-shadow: 0 12px 40px -12px rgba(91, 95, 199, 0.6);
  }

  #lai-open:hover { background: #6b70d5; transform: translateY(-1px); }
  #lai-open:active { transform: translateY(0); }

  #lai-hint {
    color: #6a6a72;
    font-size: 12px;
  }
</style>

<div id="lai-splash">
  <h1>Chat</h1>
  <p>Sign in with your email to start chatting. You'll receive a one-time code.</p>
  <a id="lai-open" href="https://chat.mylensandi.com" rel="noopener">Open Chat &rarr;</a>
  <div id="lai-hint">Works on any device, on any network.</div>
</div>
