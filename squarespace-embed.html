  Paste this into a Squarespace Code Block on your page.
  Recommended: use a Blank page with no header/footer,
  or inject the CSS below via Design → Custom CSS.

  Also add this to Design → Custom CSS to make the page full-screen:

  .page-chat #page,
  .page-chat .content-wrapper,
  .page-chat .sections {
    height: 100vh;
    padding: 0;
    margin: 0;
  }
  .page-chat header,
  .page-chat footer,
  .page-chat .Mobile-bar {
    display: none !important;
  }
-->
<style>
  #ai-container {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100dvh;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #ai-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  #ai-loading {
    color: #888;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  #ai-loading .spinner {
    width: 32px;
    height: 32px;
    border: 2px solid #333;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  #ai-error {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
    color: #888;
    max-width: 340px;
  }

  #ai-error h3 { color: #fff; margin: 0; font-size: 18px; }
  #ai-error p  { margin: 0; font-size: 14px; line-height: 1.5; }

  #ai-error a {
    color: #5b5fc7;
    text-decoration: none;
    font-size: 13px;
    border: 1px solid #333;
    padding: 8px 16px;
    border-radius: 8px;
    margin-top: 4px;
  }

  #ai-error a:hover { background: #1a1a1a; }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<div id="ai-container">
  <iframe
    id="ai-frame"
    src="__CLOUDFLARE_HOSTNAME__"
    allow="microphone; camera; clipboard-write"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
  ></iframe>

  <div id="ai-loading">
    <div class="spinner"></div>
    <span>Connecting to AI...</span>
  </div>

  <div id="ai-error">
    <h3>Can't reach AI</h3>
    <p>The AI stack is offline or your network is blocking it. Try again in a moment.</p>
    <a href="#" onclick="location.reload()">Retry</a>
  </div>
</div>

<script>
  const frame   = document.getElementById('ai-frame');
  const loading = document.getElementById('ai-loading');
  const error   = document.getElementById('ai-error');

  // Show iframe once loaded, show error on timeout
  frame.addEventListener('load', () => {
    loading.style.display = 'none';
    error.style.display   = 'none';
    frame.style.display   = 'block';
  });

  // If not loaded in 12s, show error
  const timeout = setTimeout(() => {
    if (frame.style.display !== 'block') {
      loading.style.display = 'none';
      error.style.display   = 'flex';
    }
  }, 12000);

  frame.addEventListener('load', () => clearTimeout(timeout));
</script>
