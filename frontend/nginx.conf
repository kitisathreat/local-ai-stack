server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip for bundled JS + CSS
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Cache built asset bundles (immutable since filenames don't change between
  # builds — add cache-busting via hash in a later iteration).
  location /assets/ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Proxy backend API calls. The FastAPI service is at backend:8000 (docker
  # network name). SSE responses need proxy_buffering off so tokens stream
  # to the client instead of being batched.
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    chunked_transfer_encoding off;
  }

  # Bare /auth/verify (backend redirects to / on success). Note the
  # trailing slash matching — nginx passes /auth/verify?token=... through.
  location /auth/ {
    proxy_pass http://backend:8000/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback — everything else serves index.html so the Preact router
  # can handle client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
