name: Pre-Deploy Smoke (Windows)

# Free, on-demand "is it safe to install on my real machine yet?" check.
#
# Provisions a fresh windows-latest cloud runner and exercises the three
# install-time things that ci.yml + install-and-startup.yml deliberately
# skip:
#
#   1. A real Ollama pull + run (tiny model, ~400 MB) — proves the
#      ollama binary, the model registry, and a CPU/CUDA inference cycle
#      all work end-to-end.
#   2. The PySide6 GUI constructs without exceptions under
#      QT_QPA_PLATFORM=offscreen — proves gui/requirements.txt is
#      installable on a clean Windows box and the import graph is sound.
#   3. cloudflared is reachable on PATH and `cloudflared tunnel --help`
#      exits cleanly — proves the binary install path is wired.
#
# All on top of the same -InitEnv -> -Setup -> -Start -NoGui -> /healthz
# bootstrap that install-and-startup.yml already covers.
#
# Manual trigger only (workflow_dispatch) plus pushes to the cloud-hosting
# setup branch — model pulls + GUI install make this slower than ci.yml,
# so we don't run it on every PR.

on:
  workflow_dispatch:
    inputs:
      ollama_model:
        description: "Tiny Ollama model to pull + smoke-test"
        required: false
        default: "qwen2.5:0.5b"
  push:
    branches:
      - claude/cloud-hosting-setup-sDADo

permissions:
  contents: read
  pull-requests: write

jobs:
  pre-deploy-smoke:
    name: Fresh Windows VM — full install smoke
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      OLLAMA_MODEL: ${{ github.event.inputs.ollama_model || 'qwen2.5:0.5b' }}

    steps:
      - uses: actions/checkout@v4

      - name: Create ci-logs dir + timing tracker
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ci-logs -Force | Out-Null
          # Per-step elapsed-time log so we can spot silent no-ops
          # (e.g. -Setup completing in <30s would mean it skipped venv
          # creation). Each step appends "step|elapsed_seconds".
          "step|elapsed_seconds|started_at" | Set-Content -Path ci-logs/timing.log -Encoding utf8NoBOM
          # Emit start time so subsequent steps can subtract.
          (Get-Date).ToUniversalTime().Ticks | Out-File -FilePath ci-logs/last-tick.txt -Encoding utf8NoBOM

      # ── 1/9 Install Ollama from standalone zip (no installer hangs) ──────
      - name: Install Ollama (standalone zip)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = Join-Path $env:RUNNER_TOOL_CACHE 'ollama'
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          $zip = Join-Path $env:RUNNER_TEMP 'ollama.zip'
          curl.exe --fail --show-error --location `
            --output $zip `
            'https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip'
          tar.exe -xf $zip -C $dest
          Remove-Item $zip -Force
          $exe = Get-ChildItem -Path $dest -Filter ollama.exe -Recurse | Select-Object -First 1
          if (-not $exe) { throw 'ollama.exe missing after extract' }
          Add-Content -Path $env:GITHUB_PATH -Value $exe.DirectoryName

      # ── 2/9 Install cloudflared (direct download) ───────────────────────
      - name: Install cloudflared
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = Join-Path $env:RUNNER_TOOL_CACHE 'cloudflared'
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          $exe = Join-Path $dest 'cloudflared.exe'
          curl.exe --fail --show-error --location `
            --output $exe `
            'https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe'
          Add-Content -Path $env:GITHUB_PATH -Value $dest

      # ── 3/9 -InitEnv (writes .env) + patch CI secrets ───────────────────
      - name: Initialize .env
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\LocalAIStack.ps1 -InitEnv
          $bytes = New-Object byte[] 48
          [System.Security.Cryptography.RandomNumberGenerator]::Create().GetBytes($bytes)
          $secret = [Convert]::ToBase64String($bytes)
          (Get-Content .env -Raw) `
            -replace '(?m)^AUTH_SECRET_KEY=.*', "AUTH_SECRET_KEY=$secret" `
            -replace '(?m)^HISTORY_SECRET_KEY=.*', "HISTORY_SECRET_KEY=$secret" `
            -replace '(?m)^CHAT_HOSTNAME=.*', 'CHAT_HOSTNAME=localhost' `
            -replace '(?m)^ADMIN_API_ALLOWED_HOSTS=.*', 'ADMIN_API_ALLOWED_HOSTS=127.0.0.1,localhost' `
            -replace '(?m)^PUBLIC_BASE_URL=.*', 'PUBLIC_BASE_URL=http://127.0.0.1:18000' `
            | Set-Content .env -Encoding utf8NoBOM

      # ── 4/9 -Setup (venvs + vendor binaries; skip prereqs + big models) ─
      - name: Setup (venvs + binaries; skip winget + tier model pulls)
        shell: pwsh
        env:
          OFFLINE: "1"
        run: |
          $ErrorActionPreference = 'Stop'
          $start = Get-Date
          try {
            & .\LocalAIStack.ps1 -Setup -SkipModels -SkipPrereqs *>&1 |
              Tee-Object -FilePath ci-logs/setup.log
            if ($LASTEXITCODE -gt 0) {
              throw "LocalAIStack.ps1 -Setup exited $LASTEXITCODE"
            }
          } catch {
            Write-Host "::error::-Setup failed: $($_.Exception.Message)"
            if ($_.ScriptStackTrace) { Write-Host $_.ScriptStackTrace }
            throw
          }
          $elapsed = (New-TimeSpan -Start $start -End (Get-Date)).TotalSeconds
          Add-Content -Path ci-logs/timing.log -Value ("setup|{0:N0}|{1}" -f $elapsed, $start.ToUniversalTime().ToString('o'))
          Write-Host ("Setup elapsed: {0:N0}s" -f $elapsed)

          # Hard assertions: -Setup is supposed to produce three venvs
          # and two vendor binaries. If it took 30s and produced none of
          # these, the previous "success" was masking a silent skip.
          $expected = @(
            'vendor\venv-backend\Scripts\python.exe',
            'vendor\venv-gui\Scripts\python.exe',
            'vendor\venv-jupyter\Scripts\python.exe',
            'vendor\qdrant\qdrant.exe',
            'vendor\llama-server\llama-server.exe'
          )
          $missing = @()
          foreach ($p in $expected) {
            if (Test-Path $p) {
              $size = (Get-Item $p).Length
              Write-Host ("  OK    {0} ({1} bytes)" -f $p, $size)
            } else {
              Write-Host ("  MISS  {0}" -f $p)
              $missing += $p
            }
          }
          if ($missing.Count -gt 0) {
            Write-Host "::error::Setup did not produce expected outputs:"
            $missing | ForEach-Object { Write-Host "  - $_" }
            throw "Setup completed without creating: $($missing -join ', ')"
          }
          # Also assert that Setup actually took meaningful time. A truly
          # cold-cache run on windows-latest creates 3 venvs + downloads
          # 2 binaries — under 60s strongly suggests something
          # short-circuited even if the file checks above pass (e.g.
          # leftover state from a cache hit).
          if ($elapsed -lt 60) {
            Write-Host "::warning::Setup completed unusually fast ($elapsed s) — verify cache behaviour"
          }

      # ── 5/9 Real Ollama pull + run round-trip (tiny model) ──────────────
      - name: Ollama pull + run smoke (tiny model)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $start = Get-Date
          # Start ollama serve in the background; it does not daemonize on
          # Windows so we capture the process and tear it down at the end.
          $ollamaProc = Start-Process -FilePath 'ollama' -ArgumentList 'serve' `
            -RedirectStandardOutput 'ci-logs/ollama-serve.log' `
            -RedirectStandardError  'ci-logs/ollama-serve.err' `
            -PassThru -WindowStyle Hidden
          $ollamaProc.Id | Out-File ci-logs/ollama.pid -Encoding ascii
          # Wait for the API to come up.
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            try {
              Invoke-WebRequest -Uri 'http://127.0.0.1:11434/api/tags' `
                -UseBasicParsing -TimeoutSec 2 -ErrorAction Stop | Out-Null
              $ready = $true; break
            } catch { Start-Sleep -Seconds 2 }
          }
          if (-not $ready) {
            Get-Content ci-logs/ollama-serve.err -ErrorAction SilentlyContinue
            throw 'ollama serve did not become reachable on :11434'
          }
          Write-Host "ollama serve ready; pulling $env:OLLAMA_MODEL"
          & ollama pull $env:OLLAMA_MODEL 2>&1 | Tee-Object -FilePath ci-logs/ollama-pull.log
          if ($LASTEXITCODE -ne 0) { throw "ollama pull exit $LASTEXITCODE" }

          # Hard assert the model is actually registered (proves the pull
          # wrote real bytes, not a no-op).
          $listOut = & ollama list 2>&1
          $listOut | Tee-Object -FilePath ci-logs/ollama-list.log | Out-Host
          if (-not ($listOut -match [regex]::Escape($env:OLLAMA_MODEL.Split(':')[0]))) {
            throw "ollama list did not show $env:OLLAMA_MODEL after pull"
          }

          # Single-shot generation through the HTTP API (avoids interactive
          # `ollama run` REPL behaviour).
          $body = @{
            model  = $env:OLLAMA_MODEL
            prompt = 'Reply with the single word OK.'
            stream = $false
          } | ConvertTo-Json
          $r = Invoke-RestMethod -Uri 'http://127.0.0.1:11434/api/generate' `
            -Method Post -Body $body -ContentType 'application/json' -TimeoutSec 120
          $resp = ($r.response | Out-String).Trim()
          Write-Host "model response: $resp"
          if (-not $resp) { throw 'ollama returned empty response' }
          "$resp" | Out-File ci-logs/ollama-response.txt -Encoding utf8NoBOM
          $elapsed = (New-TimeSpan -Start $start -End (Get-Date)).TotalSeconds
          Add-Content -Path ci-logs/timing.log -Value ("ollama|{0:N0}|{1}" -f $elapsed, $start.ToUniversalTime().ToString('o'))

      # ── 6/9 Backend boots; /healthz + /v1/models ────────────────────────
      - name: Start backend + verify health
        shell: pwsh
        env:
          OFFLINE: "1"
        run: |
          $ErrorActionPreference = 'Continue'
          $start = Get-Date
          & .\LocalAIStack.ps1 -Start -NoGui -Offline -NoUpdateCheck *>&1 |
            Tee-Object -FilePath ci-logs/start.log
          $deadline = (Get-Date).AddSeconds(90)
          $ok = $false
          while ((Get-Date) -lt $deadline) {
            try {
              $r = Invoke-WebRequest -Uri 'http://127.0.0.1:18000/healthz' `
                -UseBasicParsing -TimeoutSec 4 -ErrorAction Stop
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch { }
            Start-Sleep -Seconds 3
          }
          if (-not $ok) { throw 'backend /healthz never responded' }
          $r = Invoke-WebRequest -Uri 'http://127.0.0.1:18000/v1/models' `
            -UseBasicParsing -TimeoutSec 10
          $body = $r.Content | ConvertFrom-Json
          $count = @($body.data).Count
          Write-Host "backend advertises $count tiers"
          if ($count -lt 1) { throw '/v1/models returned no tiers' }
          $elapsed = (New-TimeSpan -Start $start -End (Get-Date)).TotalSeconds
          Add-Content -Path ci-logs/timing.log -Value ("backend|{0:N0}|{1}" -f $elapsed, $start.ToUniversalTime().ToString('o'))

      # ── 7/9 PySide6 GUI offscreen construction smoke ────────────────────
      - name: GUI offscreen construction smoke
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          $ErrorActionPreference = 'Stop'
          # Strict: the venv-gui MUST exist (Setup step asserts this
          # already, but re-check here to catch out-of-band issues).
          # No silent fallback — if Setup didn't make the venv, fail loud.
          $py = Join-Path (Get-Location) 'vendor\venv-gui\Scripts\python.exe'
          if (-not (Test-Path $py)) {
            throw "GUI venv missing at $py — Setup didn't produce it"
          }
          # Smoke script (tests/smoke/gui_offscreen.py): build QApplication
          # + ChatWindow + tray, process events briefly, exit 0. Imports
          # prove gui/requirements.txt is satisfied; construction proves
          # the widget tree initialises without crashing.
          & $py tests/smoke/gui_offscreen.py 2>&1 | Tee-Object -FilePath ci-logs/gui-smoke.log
          if ($LASTEXITCODE -ne 0) { throw "GUI smoke failed: $LASTEXITCODE" }
          # Assert the smoke script actually printed its terminal marker
          # — guards against a path where the script imports succeed but
          # exec returns immediately because something earlier killed it.
          $log = Get-Content ci-logs/gui-smoke.log -Raw -ErrorAction SilentlyContinue
          if (-not ($log -match '\[gui-smoke\] exec returned')) {
            throw 'GUI smoke log missing terminal marker — script did not run to completion'
          }
          # Capture timing — the GUI smoke should take ~3-5s if PySide6
          # really loads. Sub-second strongly suggests an import-only path.
          Add-Content -Path ci-logs/timing.log -Value ("gui|na|gui-smoke step")

      # ── 8/9 cloudflared binary smoke ────────────────────────────────────
      - name: cloudflared binary smoke
        shell: pwsh
        run: |
          & cloudflared --version 2>&1 | Tee-Object -FilePath ci-logs/cloudflared-version.log
          if ($LASTEXITCODE -ne 0) { throw "cloudflared --version exit $LASTEXITCODE" }
          # `tunnel --help` exits 0 without needing OAuth/cert.pem.
          & cloudflared tunnel --help 2>&1 | Tee-Object -FilePath ci-logs/cloudflared-help.log
          if ($LASTEXITCODE -ne 0) { throw "cloudflared tunnel --help exit $LASTEXITCODE" }

      # ── 9/9 Tear down ───────────────────────────────────────────────────
      - name: Stop services
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          try { & .\LocalAIStack.ps1 -Stop } catch { Write-Host "Stop: $_" }
          if (Test-Path ci-logs/ollama.pid) {
            $opid = (Get-Content ci-logs/ollama.pid).Trim()
            try { Stop-Process -Id $opid -Force -ErrorAction SilentlyContinue } catch {}
          }

      - name: Collect launcher logs into artifact
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $logs = Join-Path $env:APPDATA 'LocalAIStack\logs'
          if (Test-Path $logs) {
            Copy-Item -Path (Join-Path $logs '*') -Destination 'ci-logs' -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Upload ci-logs artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: pre-deploy-smoke-logs
          path: ci-logs/
          if-no-files-found: ignore

      - name: Post diagnostic snapshot to PR
        # Always runs — and posts on failure AND success — so we can verify
        # by inspection (not just job color) that every assertion really
        # ran. Without this we'd be trusting a green checkmark from a
        # workflow that completed in 4 minutes.
        if: always() && github.event_name == 'pull_request'
        shell: pwsh
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          $emoji = if ($env:JOB_STATUS -eq 'success') { ':white_check_mark:' } else { ':x:' }
          $body = "## $emoji Pre-deploy smoke diagnostic`n`n"
          $body += "**Job status:** $env:JOB_STATUS  •  [run]($env:RUN_URL)`n`n"

          # --- per-step timing -----------------------------------------------
          $body += "### Per-step elapsed time`n`n"
          if (Test-Path ci-logs/timing.log) {
            $body += "``````csv`n"
            $body += (Get-Content ci-logs/timing.log -Raw)
            $body += "`n```````n`n"
          } else {
            $body += "_timing.log missing — early failure before any step recorded_`n`n"
          }

          # --- expected -Setup outputs --------------------------------------
          $body += "### Setup outputs (file size = proof of work)`n`n"
          $body += "| path | exists | size (bytes) |`n|---|---|---|`n"
          $expected = @(
            'vendor\venv-backend\Scripts\python.exe',
            'vendor\venv-gui\Scripts\python.exe',
            'vendor\venv-jupyter\Scripts\python.exe',
            'vendor\qdrant\qdrant.exe',
            'vendor\llama-server\llama-server.exe',
            'data\resolved-models.json'
          )
          foreach ($p in $expected) {
            if (Test-Path $p) {
              $sz = (Get-Item $p).Length
              $body += "| ``$p`` | yes | $sz |`n"
            } else {
              $body += "| ``$p`` | **NO** | - |`n"
            }
          }
          $body += "`n"

          # --- key log tails -------------------------------------------------
          $logs = @(
            @{ name = 'setup.log';            tail = 25 },
            @{ name = 'ollama-pull.log';      tail = 20 },
            @{ name = 'ollama-list.log';      tail = 10 },
            @{ name = 'ollama-response.txt';  tail = 5  },
            @{ name = 'gui-smoke.log';        tail = 15 },
            @{ name = 'cloudflared-version.log'; tail = 5 },
            @{ name = 'start.log';            tail = 30 }
          )
          $body += "### Key log tails`n`n"
          foreach ($spec in $logs) {
            $path = "ci-logs/$($spec.name)"
            if (Test-Path $path) {
              $size = (Get-Item $path).Length
              if ($size -gt 0) {
                $content = Get-Content $path -Tail $spec.tail -Raw
                # Strip CRs to keep the comment readable
                $content = $content -replace "`r", ''
                $body += "<details><summary>$($spec.name) — $size bytes (last $($spec.tail) lines)</summary>`n`n``````text`n$content`n```````n</details>`n`n"
              } else {
                $body += "- $($spec.name) — empty file`n"
              }
            } else {
              $body += "- $($spec.name) — **missing**`n"
            }
          }

          $tmp = Join-Path $env:RUNNER_TEMP 'smoke-diag.md'
          Set-Content -Path $tmp -Value $body -Encoding utf8NoBOM
          Write-Host "diag body length: $($body.Length)"
          & gh pr comment $env:PR_NUMBER --body-file $tmp 2>&1 | Write-Host
          Write-Host "gh exit=$LASTEXITCODE"

      - name: Step summary
        if: always()
        shell: pwsh
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          $summary = $env:GITHUB_STEP_SUMMARY
          $verdict = if ($env:JOB_STATUS -eq 'success') {
            "## :white_check_mark: Pre-deploy smoke PASSED — safe to install locally"
          } else {
            "## :x: Pre-deploy smoke $($env:JOB_STATUS) — DO NOT install locally yet"
          }
          $model = $env:OLLAMA_MODEL
          $lines = @(
            $verdict,
            "",
            "Checks exercised on a fresh windows-latest runner:",
            "- ollama install + serve + pull ($model) + generate",
            "- LocalAIStack.ps1 -InitEnv / -Setup -SkipModels / -Start -NoGui",
            "- backend /healthz + /v1/models",
            "- PySide6 GUI offscreen construction (ChatWindow + tray)",
            "- cloudflared --version + tunnel --help"
          )
          Add-Content -Path $summary -Value ($lines -join "`n")
