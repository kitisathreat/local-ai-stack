name: CI

on:
  pull_request:
    branches: [main, master, non-docker-dependent]
  push:
    branches: [main, master, claude-code-integration, non-docker-dependent]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Python static analysis: syntax, metadata, config consistency ─────────────
  python-tests:
    name: Python — Tools, Pipelines & Config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install \
            pytest pytest-asyncio \
            pyyaml pydantic httpx \
            aiosqlite bcrypt \
            'python-jose[cryptography]' \
            fastapi 'uvicorn[standard]' \
            cryptography 'redis[hiredis]' \
            pypdf python-multipart \
            pynvml \
            ddgs huggingface_hub

      - name: Run all Python tests
        run: |
          set -o pipefail
          python3 -m pytest \
            tests/test_tools.py \
            tests/test_config.py \
            tests/test_router.py \
            tests/test_vram_scheduler.py \
            tests/test_db.py \
            tests/test_auth.py \
            tests/test_tools_registry.py \
            tests/test_rag.py \
            tests/test_memory.py \
            tests/test_diagnostics.py \
            tests/test_main.py \
            tests/test_admin_endpoints.py \
            tests/test_host_gate.py \
            tests/test_model_resolver.py \
            tests/test_model_resolver_dry_run.py \
            -v --tb=short 2>&1 | tee /tmp/pytest.log

      - name: Post failing Python tests as PR comment
        if: failure() && github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ ! -f /tmp/pytest.log ]; then
            echo "No pytest log"; exit 0
          fi
          {
            echo "### Python CI test failures (run $RUN_ID)"
            echo ""
            echo '```text'
            tail -120 /tmp/pytest.log
            echo '```'
          } > py_fail.md
          gh pr comment "$PR_NUMBER" --body-file py_fail.md || echo "gh failed"

  # ── PowerShell script syntax ──────────────────────────────────────────────────
  powershell-syntax:
    name: PowerShell — Script Syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check PS1 script syntax
        shell: pwsh
        run: |
          $failed = 0
          $paths = @(
            "LocalAIStack.ps1",
            "scripts/*.ps1",
            "scripts/steps/*.ps1"
          )
          $files = $paths | ForEach-Object { Get-ChildItem -Path $_ -ErrorAction SilentlyContinue }
          foreach ($f in $files) {
            $errs = $null
            [System.Management.Automation.PSParser]::Tokenize(
              (Get-Content $f.FullName -Raw), [ref]$errs
            ) | Out-Null
            if ($errs.Count -gt 0) {
              Write-Host "FAIL: $($f.FullName) — $($errs.Count) error(s)" -ForegroundColor Red
              $errs | ForEach-Object { Write-Host "  Line $($_.Token.StartLine): $_" }
              $failed++
            } else {
              Write-Host "PASS: $($f.FullName)" -ForegroundColor Green
            }
          }
          if ($failed -gt 0) { exit 1 }

  # ── Launcher smoke tests: consolidated LocalAIStack.ps1 layout ───────────────
  launcher-smoke:
    name: Launcher — Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify consolidated launcher structure
        shell: pwsh
        run: |
          $expected = @(
            "LocalAIStack.ps1",
            "scripts/steps/process.ps1",
            "scripts/steps/download.ps1",
            "scripts/steps/venvs.ps1",
            "scripts/steps/prereqs.ps1"
          )
          $missing = @()
          foreach ($p in $expected) {
            if (-not (Test-Path $p)) { $missing += $p }
          }
          if ($missing.Count -gt 0) {
            Write-Host "FAIL: missing launcher files:" -ForegroundColor Red
            $missing | ForEach-Object { Write-Host "  $_" }
            exit 1
          }
          Write-Host "All expected launcher files present."

          # The consolidated launcher must expose every documented subcommand
          # switch. -Help prints the user-facing guide; -Setup, -Start, -Stop,
          # -Build, -InitEnv, -CheckUpdates, -NoUpdateCheck are the others.
          # Use a single-quoted literal for the needle so PowerShell string
          # interpolation does not mangle the dollar sign.
          $src = Get-Content LocalAIStack.ps1 -Raw
          $required = @('Setup','Start','Stop','Build','InitEnv','CheckUpdates','Admin','Help','NoUpdateCheck','SkipModels','NoGui','SkipPrereqs')
          $missingSwitch = @()
          foreach ($name in $required) {
            $needle = '[switch]$' + $name
            if (-not $src.Contains($needle)) { $missingSwitch += "-$name" }
          }
          if ($missingSwitch.Count -gt 0) {
            Write-Host "FAIL: LocalAIStack.ps1 missing switches: $($missingSwitch -join ', ')" -ForegroundColor Red
            exit 1
          }
          Write-Host "All launcher subcommands declared."

      - name: Verify scripts/steps exports the process helpers
        shell: pwsh
        run: |
          $content = Get-Content scripts/steps/process.ps1 -Raw
          foreach ($fn in @('Start-TrackedProcess','Wait-HealthOk')) {
            if ($content -notmatch "function\s+$fn\b") {
              Write-Host "FAIL: scripts/steps/process.ps1 missing function $fn" -ForegroundColor Red
              exit 1
            }
          }
          $content = Get-Content scripts/steps/download.ps1 -Raw
          foreach ($fn in @('Invoke-DownloadQdrant','Invoke-DownloadLlamaServer')) {
            if ($content -notmatch "function\s+$fn\b") {
              Write-Host "FAIL: scripts/steps/download.ps1 missing function $fn" -ForegroundColor Red
              exit 1
            }
          }
          $content = Get-Content scripts/steps/venvs.ps1 -Raw
          if ($content -notmatch 'function\s+Invoke-CreateVenvs\b') {
            Write-Host "FAIL: scripts/steps/venvs.ps1 missing Invoke-CreateVenvs" -ForegroundColor Red
            exit 1
          }
          $content = Get-Content scripts/steps/prereqs.ps1 -Raw
          if ($content -notmatch 'function\s+Invoke-EnsurePrereqs\b') {
            Write-Host "FAIL: scripts/steps/prereqs.ps1 missing Invoke-EnsurePrereqs" -ForegroundColor Red
            exit 1
          }
          Write-Host "All step helpers are exported."

  # ── YAML lint: all config files parse cleanly ─────────────────────────────────
  yaml-lint:
    name: YAML — Config File Validity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate all YAML files
        run: |
          python - <<'EOF'
          import yaml, sys, pathlib

          files = [
            "config/models.yaml",
            "config/router.yaml",
            "config/vram.yaml",
            "config/tools.yaml",
            "config/ollama-models.yaml",
            "config/model-sources.yaml",
            "knowledge/sources.yaml",
          ]

          failed = []
          for path in files:
            p = pathlib.Path(path)
            if not p.exists():
              print(f"MISSING: {path}")
              failed.append(path)
              continue
            try:
              yaml.safe_load(p.read_text(encoding="utf-8"))
              print(f"OK:      {path}")
            except yaml.YAMLError as e:
              print(f"FAIL:    {path} — {e}")
              failed.append(path)

          if failed:
            sys.exit(1)
          EOF

  # ── model_resolver offline-mode smoke test (replaces Windows pwsh suite) ─────
  model-resolver:
    name: Model Resolver — Offline Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install resolver dependencies
        run: pip install pyyaml huggingface_hub httpx

      - name: Resolve tiers with OFFLINE=1 (must fall back to pinned)
        env:
          OFFLINE: "1"
        run: |
          python -m backend.model_resolver resolve --offline
          test -f data/resolved-models.json
          python - <<'EOF'
          import json, pathlib, sys
          data = json.loads(pathlib.Path("data/resolved-models.json").read_text())
          tiers = data.get("tiers", {})
          if not tiers:
              print("FAIL: no tiers resolved")
              sys.exit(1)
          for name, info in tiers.items():
              origin = info.get("origin")
              if origin != "pinned":
                  print(f"FAIL: tier {name} resolved to origin={origin}, expected pinned")
                  sys.exit(1)
          print(f"OK: {len(tiers)} tiers fell back to pinned")
          EOF
