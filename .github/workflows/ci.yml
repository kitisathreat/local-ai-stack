name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master, claude-code-integration]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Python static analysis: syntax, metadata, config consistency ─────────────
  python-tests:
    name: Python — Tools, Pipelines & Config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install \
            pytest pytest-asyncio \
            pyyaml pydantic httpx \
            aiosqlite bcrypt aiosmtplib \
            'python-jose[cryptography]' \
            fastapi 'uvicorn[standard]' \
            cryptography 'redis[hiredis]' \
            pypdf python-multipart \
            pynvml 'passlib[bcrypt]' \
            ddgs huggingface_hub

      - name: Run core Python tests
        run: |
          set -o pipefail
          # Collect test files that exist (supports both old and new layouts)
          TEST_FILES=""
          for f in \
            tests/test_tools.py \
            tests/test_config.py \
            tests/test_router.py \
            tests/test_vram_scheduler.py \
            tests/test_db.py \
            tests/test_auth.py \
            tests/test_tools_registry.py \
            tests/test_rag.py \
            tests/test_memory.py \
            tests/test_diagnostics.py \
            tests/test_main.py \
            tests/test_admin_endpoints.py \
            tests/test_host_gate.py \
            tests/test_model_resolver.py \
            tests/test_model_resolver_dry_run.py \
            tests/test_backend_startup.py \
            tests/test_model_loading.py \
            tests/test_cloudflare_setup.py \
          ; do
            [ -f "$f" ] && TEST_FILES="$TEST_FILES $f"
          done
          python3 -m pytest $TEST_FILES -v --tb=short 2>&1 | tee /tmp/pytest.log

      - name: Post failing Python tests as PR comment
        if: failure() && github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ ! -f /tmp/pytest.log ]; then
            echo "No pytest log"; exit 0
          fi
          {
            echo "### Python CI test failures (run $RUN_ID)"
            echo ""
            echo '```text'
            tail -120 /tmp/pytest.log
            echo '```'
          } > py_fail.md
          gh pr comment "$PR_NUMBER" --body-file py_fail.md || echo "gh failed"

  # ── PowerShell script syntax ──────────────────────────────────────────────────
  powershell-syntax:
    name: PowerShell — Script Syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check PS1 script syntax (native layout)
        shell: pwsh
        run: |
          $failed = 0
          $patterns = @(
            "LocalAIStack.ps1",
            "scripts/*.ps1",
            "scripts/steps/*.ps1",
            "tests/*.ps1"
          )
          $files = $patterns | ForEach-Object {
            Get-ChildItem -Path $_ -ErrorAction SilentlyContinue
          }
          if (-not $files) {
            Write-Host "No PS1 files found — skipping." -ForegroundColor Yellow
            exit 0
          }
          foreach ($f in $files) {
            $errs = $null
            [System.Management.Automation.PSParser]::Tokenize(
              (Get-Content $f.FullName -Raw), [ref]$errs
            ) | Out-Null
            if ($errs.Count -gt 0) {
              Write-Host "FAIL: $($f.FullName) — $($errs.Count) error(s)" -ForegroundColor Red
              $errs | ForEach-Object { Write-Host "  Line $($_.Token.StartLine): $_" }
              $failed++
            } else {
              Write-Host "PASS: $($f.FullName)" -ForegroundColor Green
            }
          }
          if ($failed -gt 0) { exit 1 }

  # ── Launcher smoke tests: native LocalAIStack.ps1 layout ─────────────────────
  launcher-smoke:
    name: Launcher — Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify native launcher structure
        shell: pwsh
        run: |
          $expected = @(
            "LocalAIStack.ps1",
            "scripts/steps/prereqs.ps1",
            "scripts/steps/download.ps1",
            "scripts/steps/process.ps1",
            "scripts/steps/venvs.ps1"
          )
          $missing = @()
          foreach ($p in $expected) {
            if (-not (Test-Path $p)) { $missing += $p }
          }
          if ($missing.Count -gt 0) {
            Write-Host "FAIL: missing native layout files:" -ForegroundColor Red
            $missing | ForEach-Object { Write-Host "  $_" }
            exit 1
          }
          Write-Host "All expected native layout files present."

          $stepFiles = Get-ChildItem "scripts/steps/*.ps1" -ErrorAction SilentlyContinue
          foreach ($f in $stepFiles) {
            $content = Get-Content $f.FullName -Raw
            if ($content -notmatch 'Write-Step|Write-Ok|Write-Warn2|Write-Err') {
              Write-Host "WARN: $($f.Name) has no Write-Step/Write-Ok calls" -ForegroundColor Yellow
            } else {
              Write-Host "PASS: $($f.Name)" -ForegroundColor Green
            }
          }

  # ── YAML lint: all config files parse cleanly ─────────────────────────────────
  yaml-lint:
    name: YAML — Config File Validity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate all YAML files
        run: |
          python - <<'EOF'
          import yaml, sys, pathlib

          # Always-required config files (present in both layouts)
          always_files = [
            "config/models.yaml",
            "config/router.yaml",
            "config/vram.yaml",
            "config/tools.yaml",
            "config/auth.yaml",
            "knowledge/sources.yaml",
          ]

          # Optional config files — validated only when present.
          optional_files = [
            "config/model-sources.yaml",
          ]

          failed = []
          for path in always_files:
            p = pathlib.Path(path)
            if not p.exists():
              print(f"MISSING: {path}")
              failed.append(path)
              continue
            try:
              yaml.safe_load(p.read_text(encoding="utf-8"))
              print(f"OK:      {path}")
            except yaml.YAMLError as e:
              print(f"FAIL:    {path} — {e}")
              failed.append(path)

          for path in optional_files:
            p = pathlib.Path(path)
            if not p.exists():
              print(f"SKIP:    {path} (not present in this layout)")
              continue
            try:
              yaml.safe_load(p.read_text(encoding="utf-8"))
              print(f"OK:      {path}")
            except yaml.YAMLError as e:
              print(f"FAIL:    {path} — {e}")
              failed.append(path)

          if failed:
            sys.exit(1)
          EOF

  # ── Windows integration tests ────────────────────────────────────────────────
  windows-integration:
    name: Run test suite (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install `
            pytest pytest-asyncio `
            pyyaml pydantic httpx `
            aiosqlite bcrypt aiosmtplib `
            'python-jose[cryptography]' `
            fastapi 'uvicorn[standard]' `
            cryptography 'redis[hiredis]' `
            pypdf python-multipart `
            pynvml 'passlib[bcrypt]' `
            ddgs huggingface_hub `
            openai

      - name: Create minimal .env for CI
        shell: pwsh
        run: |
          $key = python -c "import secrets; print(secrets.token_urlsafe(48))"
          "AUTH_SECRET_KEY=$key" | Out-File .env -Encoding utf8NoBOM
          "HISTORY_SECRET_KEY=$(python -c 'import secrets; print(secrets.token_urlsafe(48))')" | Out-File .env -Append -Encoding utf8NoBOM
          "OFFLINE=1" | Out-File .env -Append -Encoding utf8NoBOM
          "WEB_SEARCH_PROVIDER=none" | Out-File .env -Append -Encoding utf8NoBOM
          Write-Host "Wrote CI .env"

      - name: Run install-process smoke test (native layout)
        if: ${{ hashFiles('LocalAIStack.ps1') != '' }}
        shell: pwsh
        run: |
          Remove-Item .env -ErrorAction SilentlyContinue
          .\LocalAIStack.ps1 -InitEnv
          if (-not (Test-Path .env)) {
            Write-Host "FAIL: .env not created by -InitEnv" -ForegroundColor Red
            exit 1
          }
          $content = Get-Content .env -Raw
          foreach ($key in @("AUTH_SECRET_KEY", "CHAT_HOSTNAME", "WEB_SEARCH_PROVIDER", "MODEL_UPDATE_POLICY")) {
            if ($content -notmatch $key) {
              Write-Host "FAIL: .env missing key $key" -ForegroundColor Red
              exit 1
            }
          }
          Write-Host "PASS: -InitEnv wrote .env with all expected keys" -ForegroundColor Green

      - name: Run Python tests
        shell: pwsh
        run: |
          $testFiles = @()
          $candidates = @(
            "tests/test_tools.py",
            "tests/test_config.py",
            "tests/test_router.py",
            "tests/test_vram_scheduler.py",
            "tests/test_db.py",
            "tests/test_auth.py",
            "tests/test_tools_registry.py",
            "tests/test_rag.py",
            "tests/test_memory.py",
            "tests/test_diagnostics.py",
            "tests/test_main.py",
            "tests/test_admin_endpoints.py",
            "tests/test_host_gate.py",
            "tests/test_model_resolver.py",
            "tests/test_model_resolver_dry_run.py",
            "tests/test_backend_startup.py",
            "tests/test_model_loading.py",
            "tests/test_cloudflare_setup.py"
          )
          foreach ($f in $candidates) {
            if (Test-Path $f) { $testFiles += $f }
          }
          if ($testFiles.Count -eq 0) {
            Write-Host "No test files found" -ForegroundColor Yellow
            exit 0
          }
          python -m pytest @testFiles -v --tb=short 2>&1 | Tee-Object -FilePath tests/ci_results.txt
          exit $LASTEXITCODE

      - name: Print test log on failure
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path tests/ci_results.txt) {
            Write-Host "===== tests/ci_results.txt =====" -ForegroundColor Cyan
            Get-Content tests/ci_results.txt | ForEach-Object { Write-Host $_ }
          }

      - name: Post test results to PR comment
        if: failure() && github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set +e
          {
            echo "### Windows CI test log (run $RUN_ID)"
            echo ""
            echo '```text'
            if [ -f tests/ci_results.txt ]; then
              tr -d '\r' < tests/ci_results.txt | tail -100
            else
              echo "(tests/ci_results.txt not found)"
            fi
            echo '```'
          } > post_comment.md
          gh pr comment "$PR_NUMBER" --body-file post_comment.md
