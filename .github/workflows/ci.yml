name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master, claude-code-integration]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Python static analysis: syntax, metadata, config consistency ─────────────
  python-tests:
    name: Python — Tools, Pipelines & Config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pyyaml pydantic httpx

      - name: Run tool & pipeline tests
        run: python3 -m pytest tests/test_tools.py -v --tb=short

      - name: Run config & compose tests
        run: python3 -m pytest tests/test_config.py -v --tb=short

      - name: Run router tests
        run: python3 -m pytest tests/test_router.py -v --tb=short

      - name: Run VRAM scheduler tests
        run: python3 -m pytest tests/test_vram_scheduler.py -v --tb=short

  # ── PowerShell script syntax ──────────────────────────────────────────────────
  powershell-syntax:
    name: PowerShell — Script Syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check PS1 script syntax
        shell: pwsh
        run: |
          $failed = 0
          foreach ($f in Get-ChildItem "scripts/*.ps1") {
            $errs = $null
            [System.Management.Automation.PSParser]::Tokenize(
              (Get-Content $f.FullName -Raw), [ref]$errs
            ) | Out-Null
            if ($errs.Count -gt 0) {
              Write-Host "FAIL: $($f.Name) — $($errs.Count) error(s)" -ForegroundColor Red
              $errs | ForEach-Object { Write-Host "  Line $($_.Token.StartLine): $_" }
              $failed++
            } else {
              Write-Host "PASS: $($f.Name)" -ForegroundColor Green
            }
          }
          if ($failed -gt 0) { exit 1 }

  # ── YAML lint: all config files parse cleanly ─────────────────────────────────
  yaml-lint:
    name: YAML — Config File Validity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate all YAML files
        run: |
          python - <<'EOF'
          import yaml, sys, pathlib

          files = [
            "config/models.yaml",
            "config/router.yaml",
            "config/vram.yaml",
            "config/tools.yaml",
            "config/ollama-models.yaml",
            "config/searxng/settings.yml",
            "knowledge/sources.yaml",
            "docker-compose.yml",
          ]

          failed = []
          for path in files:
            p = pathlib.Path(path)
            if not p.exists():
              print(f"MISSING: {path}")
              failed.append(path)
              continue
            try:
              yaml.safe_load(p.read_text(encoding="utf-8"))
              print(f"OK:      {path}")
            except yaml.YAMLError as e:
              print(f"FAIL:    {path} — {e}")
              failed.append(path)

          if failed:
            sys.exit(1)
          EOF

  # ── PowerShell integration tests (Windows runner) ────────────────────────────
  test:
    name: Run test suite (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Proof-of-life comment (diagnostic)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Testing gh pr comment from bash shell on windows-latest"
          echo "PR=$PR_NUMBER RUN=$RUN_ID SHA=$COMMIT_SHA"
          which gh || echo "no gh in PATH"
          gh --version || echo "gh --version failed"
          echo "### CI diagnostic (run $RUN_ID, commit ${COMMIT_SHA:0:7})" > diag.md
          echo "bash shell is working on windows-latest." >> diag.md
          gh pr comment "$PR_NUMBER" --body-file diag.md || echo "gh pr comment failed"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install openai

      - name: Run tests (CI mode)
        shell: pwsh
        run: .\tests\run_tests.ps1 -CI

      - name: Print test log on failure
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path tests/ci_results.txt) {
            Write-Host "===== tests/ci_results.txt =====" -ForegroundColor Cyan
            Get-Content tests/ci_results.txt | ForEach-Object { Write-Host $_ }
          } else {
            Write-Host "No ci_results.txt found." -ForegroundColor Yellow
          }

      - name: Proof-of-life POST-test comment (diagnostic)
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "POST-TEST proof-of-life running"
          echo "### POST-TEST diagnostic (run $RUN_ID)" > post_diag.md
          echo "This step ran AFTER the test step failed. If this comment posts," >> post_diag.md
          echo "bash-in-failure-context works. If ls shows ci_results.txt, file persists." >> post_diag.md
          echo "" >> post_diag.md
          echo "\`\`\`" >> post_diag.md
          ls -la tests/ >> post_diag.md 2>&1 || echo "(ls failed)" >> post_diag.md
          echo "\`\`\`" >> post_diag.md
          gh pr comment "$PR_NUMBER" --body-file post_diag.md || echo "gh failed"

      - name: Post failing tests to PR comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "STEP STARTED: Post failing tests"
          echo "PWD: $(pwd)"
          ls -la tests/ 2>&1 | head -20 || true
          if [ ! -f tests/ci_results.txt ]; then
            echo "ci_results.txt missing — posting placeholder comment for visibility"
            echo "### Windows CI post-test diagnostic (run $RUN_ID)" > fail_comment.md
            echo "" >> fail_comment.md
            echo "The test step failed but tests/ci_results.txt was not written." >> fail_comment.md
            gh pr comment "$PR_NUMBER" --body-file fail_comment.md || echo "gh pr comment FAILED"
            exit 0
          fi
          fails=$(grep -E '^[[:space:]]*\[FAIL\]' tests/ci_results.txt || true)
          if [ -z "$fails" ]; then
            echo "No [FAIL] lines found in ci_results.txt"
            exit 0
          fi
          {
            echo "### Windows CI test failures (run $RUN_ID)"
            echo ""
            echo '```text'
            echo "$fails"
            echo '```'
          } > fail_comment.md
          echo "Calling gh pr comment..."
          gh pr comment "$PR_NUMBER" --body-file fail_comment.md
          echo "gh pr comment exit: $?"
