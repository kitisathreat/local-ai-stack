name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master, claude-code-integration]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Python static analysis: syntax, metadata, config consistency ─────────────
  python-tests:
    name: Python — Tools, Pipelines & Config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pyyaml pydantic httpx aiosqlite aiosmtplib 'python-jose[cryptography]'

      - name: Run tool & pipeline tests
        run: python3 -m pytest tests/test_tools.py -v --tb=short

      - name: Run config & compose tests
        run: python3 -m pytest tests/test_config.py -v --tb=short

      - name: Run router tests
        run: python3 -m pytest tests/test_router.py -v --tb=short

      - name: Run VRAM scheduler tests
        run: python3 -m pytest tests/test_vram_scheduler.py -v --tb=short

      - name: Run DB + auth tests (Phase 4)
        run: python3 -m pytest tests/test_db.py tests/test_auth.py -v --tb=short

      - name: Run tools registry + RAG + memory tests (Phase 5)
        run: python3 -m pytest tests/test_tools_registry.py tests/test_rag.py tests/test_memory.py -v --tb=short

  # ── PowerShell script syntax ──────────────────────────────────────────────────
  powershell-syntax:
    name: PowerShell — Script Syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check PS1 script syntax
        shell: pwsh
        run: |
          $failed = 0
          foreach ($f in Get-ChildItem "scripts/*.ps1") {
            $errs = $null
            [System.Management.Automation.PSParser]::Tokenize(
              (Get-Content $f.FullName -Raw), [ref]$errs
            ) | Out-Null
            if ($errs.Count -gt 0) {
              Write-Host "FAIL: $($f.Name) — $($errs.Count) error(s)" -ForegroundColor Red
              $errs | ForEach-Object { Write-Host "  Line $($_.Token.StartLine): $_" }
              $failed++
            } else {
              Write-Host "PASS: $($f.Name)" -ForegroundColor Green
            }
          }
          if ($failed -gt 0) { exit 1 }

  # ── YAML lint: all config files parse cleanly ─────────────────────────────────
  yaml-lint:
    name: YAML — Config File Validity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate all YAML files
        run: |
          python - <<'EOF'
          import yaml, sys, pathlib

          files = [
            "config/models.yaml",
            "config/router.yaml",
            "config/vram.yaml",
            "config/tools.yaml",
            "config/ollama-models.yaml",
            "config/searxng/settings.yml",
            "knowledge/sources.yaml",
            "docker-compose.yml",
          ]

          failed = []
          for path in files:
            p = pathlib.Path(path)
            if not p.exists():
              print(f"MISSING: {path}")
              failed.append(path)
              continue
            try:
              yaml.safe_load(p.read_text(encoding="utf-8"))
              print(f"OK:      {path}")
            except yaml.YAMLError as e:
              print(f"FAIL:    {path} — {e}")
              failed.append(path)

          if failed:
            sys.exit(1)
          EOF

  # ── PowerShell integration tests (Windows runner) ────────────────────────────
  test:
    name: Run test suite (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install openai

      - name: Run tests (CI mode)
        shell: pwsh
        run: .\tests\run_tests.ps1 -CI

      - name: Print test log on failure
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path tests/ci_results.txt) {
            Write-Host "===== tests/ci_results.txt =====" -ForegroundColor Cyan
            Get-Content tests/ci_results.txt | ForEach-Object { Write-Host $_ }
          } else {
            Write-Host "No ci_results.txt found." -ForegroundColor Yellow
          }

      - name: Post test results to PR comment
        if: failure() && github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set +e
          echo "STEP STARTED: Post test results"
          {
            echo "### Windows CI test log (run $RUN_ID)"
            echo ""
            echo '```text'
            if [ -f tests/ci_results.txt ]; then
              # Strip any non-printable including CR; keep it bounded.
              tr -d '\r' < tests/ci_results.txt | tail -100
            else
              echo "(tests/ci_results.txt not found)"
              ls -la tests/ 2>&1 | head -30
            fi
            echo '```'
          } > post_comment.md
          echo "---- body ----"
          cat post_comment.md
          echo "---- gh pr comment ----"
          gh pr comment "$PR_NUMBER" --body-file post_comment.md
          echo "exit: $?"
