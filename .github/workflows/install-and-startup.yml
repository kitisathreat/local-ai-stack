name: Install + Startup

# End-to-end verification that a fresh clone of the non-docker-dependent
# branch installs, detects model tiers, and boots the backend to a
# healthy state — without actually downloading the tens of GB of model
# weights. Pairs with the existing static-check matrix in ci.yml.
#
# Two jobs:
#   install-and-startup-windows  — real -Setup/-Start path on windows-latest
#   install-smoke-linux          — fast Python-dep + backend startup test

on:
  pull_request:
    branches: [non-docker-dependent, main, master]
  push:
    branches: [non-docker-dependent]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Windows end-to-end: clone → -Setup -SkipModels → -Start -NoGui → health ──
  install-and-startup-windows:
    name: Windows — Install + Startup
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Runner diagnostics
        shell: pwsh
        run: |
          # Emit enough info that an 18s early-exit failure is diagnosable
          # from $GITHUB_STEP_SUMMARY alone.
          $summary = $env:GITHUB_STEP_SUMMARY
          $lines = @(
            "### Windows runner diagnostics",
            "- runner image: $env:ImageOS / $env:ImageVersion",
            "- PSVersion: $($PSVersionTable.PSVersion)",
            "- PSEdition: $($PSVersionTable.PSEdition)",
            "- OS: $([System.Environment]::OSVersion.VersionString)",
            "- pwd: $(Get-Location)",
            "- python: $((Get-Command python -ErrorAction SilentlyContinue).Source)",
            "- git: $((Get-Command git -ErrorAction SilentlyContinue).Source)",
            "- LocalAIStack.ps1 exists: $([bool](Test-Path LocalAIStack.ps1))"
          )
          $lines | ForEach-Object { Write-Host $_ }
          if ($summary) { $lines | ForEach-Object { Add-Content -Path $summary -Value "$_`n" } }

      - name: Pre-install Ollama (standalone zip, no installer)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $summary = $env:GITHUB_STEP_SUMMARY
          function Note($msg) {
            Write-Host $msg
            if ($summary) { Add-Content -Path $summary -Value "$msg`n" }
          }

          $dest = Join-Path $env:RUNNER_TOOL_CACHE 'ollama'
          New-Item -ItemType Directory -Path $dest -Force | Out-Null
          $zip = Join-Path $env:RUNNER_TEMP 'ollama.zip'

          Note '==> Downloading ollama-windows-amd64.zip'
          # curl.exe (bundled on windows-latest) is faster + more reliable
          # for >1 GB downloads than Invoke-WebRequest.
          & curl.exe --fail --silent --show-error --location `
            --output $zip `
            'https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip'
          if ($LASTEXITCODE -ne 0) { throw "curl failed: $LASTEXITCODE" }
          $size = (Get-Item $zip).Length
          Note "downloaded $size bytes"

          Note "==> Extracting to $dest (via tar)"
          # tar on modern Windows (bsdtar) understands zip and is faster
          # than PowerShell's Expand-Archive on multi-GB archives.
          & tar.exe -xf $zip -C $dest
          if ($LASTEXITCODE -ne 0) { throw "tar failed: $LASTEXITCODE" }
          Remove-Item $zip -Force

          $exe = Get-ChildItem -Path $dest -Filter ollama.exe -Recurse | Select-Object -First 1
          if (-not $exe) {
            Note 'FAIL: ollama.exe not found in extracted archive'
            Note 'extracted tree:'
            Get-ChildItem -Path $dest -Recurse | Select-Object -First 20 FullName | ForEach-Object { Note "  $($_.FullName)" }
            throw 'ollama.exe missing'
          }
          $bindir = $exe.DirectoryName
          Add-Content -Path $env:GITHUB_PATH -Value $bindir
          $env:PATH = "$bindir;$env:PATH"
          Note "ollama at: $($exe.FullName)"
          & $exe.FullName --version

      - name: Initialize .env with CI secrets
        shell: pwsh
        run: |
          .\LocalAIStack.ps1 -InitEnv
          $bytes = New-Object byte[] 48
          [System.Security.Cryptography.RandomNumberGenerator]::Create().GetBytes($bytes)
          $secret = [Convert]::ToBase64String($bytes)
          (Get-Content .env -Raw) `
            -replace '(?m)^AUTH_SECRET_KEY=.*', "AUTH_SECRET_KEY=$secret" `
            -replace '(?m)^HISTORY_SECRET_KEY=.*', "HISTORY_SECRET_KEY=$secret" `
            -replace '(?m)^CHAT_HOSTNAME=.*', 'CHAT_HOSTNAME=localhost' `
            -replace '(?m)^ADMIN_API_ALLOWED_HOSTS=.*', 'ADMIN_API_ALLOWED_HOSTS=127.0.0.1,localhost' `
            -replace '(?m)^PUBLIC_BASE_URL=.*', 'PUBLIC_BASE_URL=http://127.0.0.1:18000' `
            | Set-Content .env -Encoding utf8NoBOM
          Write-Host '── .env (redacted) ──'
          Get-Content .env | ForEach-Object {
            if ($_ -match '^(AUTH_SECRET_KEY|HISTORY_SECRET_KEY)=') { $_ -replace '=.*$', '=<redacted>' }
            else { $_ }
          }

      # Ollama is deliberately NOT pre-installed. The launcher now soft-skips
      # `ollama serve` when the binary is missing (Ollama-backed tiers are
      # unavailable for the run, which is fine for a smoke test). This
      # avoids OllamaSetup.exe hangs that timed the job out at 30 min.

      - name: Setup (venvs + vendor binaries + dry-run pull; skip winget prereqs)
        shell: pwsh
        env:
          OFFLINE: "1"
        run: |
          # Tee output so the failure reason ends up in the artifact even
          # if the step fails partway through.
          New-Item -ItemType Directory -Path ci-logs -Force | Out-Null
          & .\LocalAIStack.ps1 -Setup -SkipModels -SkipPrereqs 2>&1 |
            Tee-Object -FilePath ci-logs/setup.log
          if ($LASTEXITCODE -ne 0) {
            throw "Setup failed with exit $LASTEXITCODE (see ci-logs/setup.log)"
          }

      - name: Verify tier detection wrote resolved-models.json
        shell: pwsh
        run: |
          if (-not (Test-Path data/resolved-models.json)) {
            throw 'resolved-models.json was not written — tier detection failed'
          }
          $j = Get-Content data/resolved-models.json -Raw | ConvertFrom-Json
          if (-not $j.tiers -or $j.tiers.PSObject.Properties.Count -eq 0) {
            throw 'resolved-models.json has no tiers'
          }
          $tierNames = $j.tiers.PSObject.Properties.Name
          Write-Host "Detected tiers: $($tierNames -join ', ')"

      - name: Verify pull machinery can initiate downloads (dry-run)
        shell: pwsh
        env:
          OFFLINE: "1"
        run: |
          $py = Join-Path (Get-Location) 'vendor\venv-backend\Scripts\python.exe'
          if (-not (Test-Path $py)) { throw "backend venv missing at $py" }
          & $py -m backend.model_resolver resolve --offline --pull --pull-hf --dry-run
          if ($LASTEXITCODE -ne 0) {
            throw "dry-run pull reported tier errors (exit $LASTEXITCODE)"
          }

      - name: Start + health + sanity + stop
        # Consolidated so the subprocess tree spawned by -Start stays
        # within one step's process group — GitHub Actions can kill
        # detached children when a step ends.
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $launcher = Join-Path (Get-Location) 'LocalAIStack.ps1'

          # -Start spawns services and runs its own Wait-HealthOk (120s
          # internal timeout) before returning. Non-fatal if ollama/qdrant
          # don't come up — the script only warns.
          & $launcher -Start -NoGui -Offline -NoUpdateCheck

          # Poll backend ourselves. The launcher's health check may have
          # warned out; we only require the backend to be reachable.
          $deadline = (Get-Date).AddSeconds(90)
          $ok = $false
          while ((Get-Date) -lt $deadline) {
            try {
              $r = Invoke-WebRequest -Uri 'http://127.0.0.1:18000/healthz' `
                -UseBasicParsing -TimeoutSec 4 -ErrorAction Stop
              if ($r.StatusCode -eq 200) {
                Write-Host "healthz ok — $($r.Content)"
                $ok = $true
                break
              }
            } catch { }
            Start-Sleep -Seconds 3
          }

          if (-not $ok) {
            Write-Host '── backend did not respond; dumping logs ──' -ForegroundColor Red
            # Also write to GITHUB_STEP_SUMMARY so the failure reason is
            # visible in the check-runs API output (we may not be able to
            # download artifacts or read raw job logs from outside).
            $summary = $env:GITHUB_STEP_SUMMARY
            if ($summary) {
              Add-Content -Path $summary -Value "### Windows install+startup — health check failed`n"
            }
            $logs = Join-Path $env:APPDATA 'LocalAIStack\logs'
            if (Test-Path $logs) {
              Get-ChildItem $logs -File | ForEach-Object {
                Write-Host "── $($_.Name) ──" -ForegroundColor Yellow
                $content = Get-Content $_.FullName -Tail 80 -Raw
                Write-Host $content
                if ($summary) {
                  Add-Content -Path $summary -Value "<details><summary>$($_.Name) (last 80 lines)</summary>`n`n``````text`n$content`n```````n</details>`n"
                }
              }
            } else {
              Write-Host "no logs at $logs"
              if ($summary) { Add-Content -Path $summary -Value "No logs at `$env:APPDATA\LocalAIStack\logs.`n" }
            }
            Write-Host '── pids.json ──' -ForegroundColor Yellow
            $pidf = Join-Path $env:APPDATA 'LocalAIStack\pids.json'
            if (Test-Path $pidf) {
              $pidc = Get-Content $pidf -Raw
              Write-Host $pidc
              if ($summary) { Add-Content -Path $summary -Value "**pids.json**: ``$pidc```n" }
            } else {
              Write-Host "missing"
            }
            # Port check — is anything listening on 18000?
            Write-Host '── netstat :18000 ──' -ForegroundColor Yellow
            $ns = (netstat -ano | Select-String ':18000') -join "`n"
            Write-Host $ns
            if ($summary) { Add-Content -Path $summary -Value "**netstat :18000**: ``$ns```n" }
            & $launcher -Stop
            exit 1
          }

          # Sanity-check /v1/models
          $r = Invoke-WebRequest -Uri 'http://127.0.0.1:18000/v1/models' `
            -UseBasicParsing -TimeoutSec 10
          if ($r.StatusCode -ne 200) {
            Write-Error "/v1/models returned $($r.StatusCode)"
            & $launcher -Stop
            exit 1
          }
          $body = $r.Content | ConvertFrom-Json
          if (-not $body.data -or $body.data.Count -eq 0) {
            Write-Error '/v1/models returned no tiers'
            & $launcher -Stop
            exit 1
          }
          Write-Host "Backend advertises $($body.data.Count) tiers"

          & $launcher -Stop

      - name: Collect logs for artifact (always)
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path 'ci-logs' -Force | Out-Null
          $logs = Join-Path $env:APPDATA 'LocalAIStack\logs'
          if (Test-Path $logs) {
            Copy-Item -Path (Join-Path $logs '*') -Destination 'ci-logs' -Recurse -Force -ErrorAction SilentlyContinue
          }
          $summary = $env:GITHUB_STEP_SUMMARY
          # Echo setup.log tail inline AND write to step summary so the
          # cause is surfaced in the check-runs API output field.
          if (Test-Path ci-logs/setup.log) {
            Write-Host '── setup.log (last 120 lines) ──' -ForegroundColor Yellow
            $tail = Get-Content ci-logs/setup.log -Tail 120 -Raw
            Write-Host $tail
            if ($summary) {
              Add-Content -Path $summary -Value "<details><summary>setup.log (last 120 lines)</summary>`n`n``````text`n$tail`n```````n</details>`n"
            }
          }
          # Also surface service logs in summary if they exist.
          if ($summary -and (Test-Path ci-logs)) {
            Get-ChildItem ci-logs -File | Where-Object { $_.Name -ne 'setup.log' } | ForEach-Object {
              $c = Get-Content $_.FullName -Tail 40 -Raw
              if ($c) {
                Add-Content -Path $summary -Value "<details><summary>$($_.Name) (last 40 lines)</summary>`n`n``````text`n$c`n```````n</details>`n"
              }
            }
          }

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-ai-stack-logs
          path: ci-logs/
          if-no-files-found: ignore

      - name: Post failure details as PR comment
        # The API-token MCP integration can't pull Actions logs/artifacts
        # or check-run output; PR comments ARE readable through the MCP
        # so the agent iterating on CI can see what failed.
        if: failure() && github.event_name == 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $body = "## Windows — Install + Startup failed`n`n"
          $body += "Run: $env:RUN_URL`n`n"

          # $GITHUB_STEP_SUMMARY accumulates across all steps in the job —
          # every earlier step's diagnostic output lives here, so it's
          # the best signal for figuring out which step failed when
          # setup.log isn't present.
          if ($env:GITHUB_STEP_SUMMARY -and (Test-Path $env:GITHUB_STEP_SUMMARY)) {
            $sum = Get-Content $env:GITHUB_STEP_SUMMARY -Raw
            if ($sum) {
              $body += "<details open><summary>step summary (all prior steps)</summary>`n`n$sum`n</details>`n`n"
            }
          }

          if (Test-Path ci-logs/setup.log) {
            $tail = Get-Content ci-logs/setup.log -Tail 120 -Raw
            $body += "<details open><summary>setup.log (last 120 lines)</summary>`n`n``````text`n$tail`n```````n</details>`n`n"
          } else {
            $body += "_setup.log missing — failure was before the Setup step._`n`n"
          }
          Get-ChildItem ci-logs -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -ne 'setup.log' } |
              ForEach-Object {
                $c = Get-Content $_.FullName -Tail 60 -Raw
                if ($c) {
                  $body += "<details><summary>$($_.Name) (last 60 lines)</summary>`n`n``````text`n$c`n```````n</details>`n`n"
                }
              }
          $file = Join-Path $env:RUNNER_TEMP 'pr-comment.md'
          Set-Content -Path $file -Value $body -Encoding utf8NoBOM
          & gh pr comment $env:PR_NUMBER --body-file $file
          if ($LASTEXITCODE -ne 0) {
            Write-Host "gh comment failed ($LASTEXITCODE); body preview:"
            Write-Host $body
          }

  # ── Linux fast-feedback: Python deps + backend boot + dry-run pull ──────────
  install-smoke-linux:
    name: Linux — Python Deps + Backend Boot
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create backend venv and install requirements
        run: |
          python -m venv .venv-backend
          .venv-backend/bin/pip install --upgrade pip
          .venv-backend/bin/pip install -r backend/requirements.txt

      - name: Install test dependencies
        run: .venv-backend/bin/pip install pytest pytest-asyncio

      - name: Dry-run pull test (proves pull code paths are wired)
        # Use `python -m pytest` so the repo root is on sys.path; the
        # console-script entrypoint does not add it and the import of
        # `backend` fails.
        run: .venv-backend/bin/python -m pytest tests/test_model_resolver_dry_run.py -v

      - name: Resolve tiers + dry-run pull via CLI
        env:
          OFFLINE: "1"
        run: |
          .venv-backend/bin/python -m backend.model_resolver \
            resolve --offline --pull --pull-hf --dry-run
          test -s data/resolved-models.json
          .venv-backend/bin/python - <<'PY'
          import json, sys
          d = json.load(open("data/resolved-models.json"))
          tiers = d.get("tiers") or {}
          assert tiers, "no tiers resolved"
          print("Detected tiers:", ", ".join(tiers))
          PY

      - name: Start backend headless
        env:
          OFFLINE: "1"
          AUTH_SECRET_KEY: ci-test-secret-key-padding-padding-padding
          HISTORY_SECRET_KEY: ci-test-secret-key-padding-padding-padding
          CHAT_HOSTNAME: localhost
          ADMIN_API_ALLOWED_HOSTS: "127.0.0.1,localhost"
          PUBLIC_BASE_URL: "http://127.0.0.1:18000"
          # Backend defaults CONFIG_DIR/DATA_DIR to /app/..., which only
          # exists inside the Docker image; on a Linux runner we point it
          # at the checkout. The launcher sets these on Windows for us.
          LAI_CONFIG_DIR: ${{ github.workspace }}/config
          LAI_DATA_DIR: ${{ github.workspace }}/data
          LAI_DB_PATH: ${{ github.workspace }}/data/lai.db
          LAI_HISTORY_DIR: ${{ github.workspace }}/data/history
        run: |
          mkdir -p data/history
          nohup .venv-backend/bin/python -m uvicorn backend.main:app \
            --host 127.0.0.1 --port 18000 > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for /healthz
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:18000/healthz >/dev/null; then
              echo "healthz ok on attempt $i"
              exit 0
            fi
            sleep 3
          done
          echo '--- backend.log ---'
          cat backend.log || true
          exit 1

      - name: Sanity-check /v1/models
        run: |
          curl -sf http://127.0.0.1:18000/v1/models | python -c '
          import json, sys
          d = json.load(sys.stdin)
          assert d.get("data"), "no tiers in /v1/models"
          print("tiers:", ", ".join(m.get("id","?") for m in d["data"]))'

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill "$(cat backend.pid)" 2>/dev/null || true
          fi

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log-linux
          path: backend.log
          if-no-files-found: ignore
