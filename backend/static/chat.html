    // conversation server-side (DELETE /chats/{id}/messages/{msgId})
    // and re-sends the corrected text via sendMessage(), so the model
    // re-extends from the edited turn forward.
    function beginEditMessage(box, originalText) {
      if (streaming) return;   // refuse mid-stream edits
      const bodyEl = box.querySelector('.body');
      const actionsEl = box.querySelector('.msg-actions');
      if (!bodyEl) return;
      const original = bodyEl.dataset.rawText || originalText || bodyEl.innerText;
      bodyEl.dataset.rawText = original;
      bodyEl.innerHTML = '';
      const ta = document.createElement('textarea');
      ta.className = 'edit-area';
      ta.value = original;
      const controls = document.createElement('div');
      controls.className = 'edit-controls';
      controls.innerHTML =
        '<button class="primary save" type="button">Save & rewind</button>' +
        '<button class="cancel" type="button">Cancel</button>' +
        '<span class="hint">Subsequent replies will be discarded.</span>';
      bodyEl.appendChild(ta);
      bodyEl.appendChild(controls);
      if (actionsEl) actionsEl.style.display = 'none';
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);

      const restore = () => {
        bodyEl.innerHTML = renderMarkdown(original);
        if (actionsEl) actionsEl.style.display = '';
      };
      controls.querySelector('.cancel').addEventListener('click', restore);
      controls.querySelector('.save').addEventListener('click', async () => {
        const newText = ta.value.trim();
        if (!newText || newText === original) { restore(); return; }
        await commitEditAndRewind(box, newText, restore);
      });
      ta.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { e.preventDefault(); restore(); }
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault(); controls.querySelector('.save').click();
        }
      });
    }

    async function commitEditAndRewind(box, newText, restoreFn) {
      const msgId = box.dataset.msgId;
      // Server-side truncate: drop this message and every later one.
      // For purely-local messages (no id yet — happens if the user
      // edits the freshly-sent turn before refreshMessageIds runs),
      // skip the network call and rely on the local rewind below.
      if (msgId && currentConversationId != null) {
        try {
          const r = await api(
            `/chats/${currentConversationId}/messages/${encodeURIComponent(msgId)}`,
            { method: 'DELETE' },
          );
          if (!r.ok && r.status !== 404) {
            // 404 is benign here — the message may already have been
            // truncated by a concurrent rewind. Anything else is a
            // hard failure: bail without touching the DOM so the user
            // can retry instead of losing their text.
            restoreFn();
            alert('Could not rewind conversation: ' + r.status);
            return;
          }
        } catch (e) {
          restoreFn();
          alert('Could not rewind conversation: ' + e);
          return;
        }
      }
      // Local rewind: drop the edited message + every following node
      // from the DOM, and trim `history` to match. The pivot is the
      // index of the corresponding user turn in `history` (counted by
      // walking the prior siblings).
      let userIdx = -1;
      for (const sib of logEl.children) {
        if (sib === box) break;
        if (sib.classList && sib.classList.contains('msg')) {
          // Each .msg corresponds 1:1 to a history entry, so map by
          // counting prior siblings.
          userIdx++;
        }
      }
      // userIdx is now the count of prior history entries; the edited
      // message is at position userIdx + 1 - 1 = userIdx (0-based).
      const cutAt = userIdx + 1;   // ← edited message itself + everything after
      // Remove DOM nodes from `box` onward.
      while (logEl.lastChild && logEl.lastChild !== box) {
        logEl.removeChild(logEl.lastChild);
      }
      logEl.removeChild(box);
      // Trim local history.
      if (cutAt - 1 >= 0 && cutAt - 1 < history.length) {
        history.length = cutAt - 1;
      }
      updateCtxIndicator();
      // Re-send the corrected text. composerEl is the source of truth
      // for sendMessage(), so prime it then dispatch.
      composerEl.value = newText;
      await sendMessage();
    }

    // After streaming completes, the freshly-stored user + assistant
    // rows have server-assigned ids that the SSE stream doesn't carry
    // back. Re-fetch the conversation and stamp data-msg-id onto each
    // .msg DOM node in order so subsequent edits know which row to
    // truncate from. Cheap GET, only fires when we're sure a row was
    // actually persisted (currentConversationId != null).
    async function refreshMessageIds() {
      if (currentConversationId == null) return;
      try {
        const r = await api('/chats/' + currentConversationId);
        if (!r.ok) return;
        const conv = await r.json();
        const msgs = (conv.messages || []).filter(
          m => m.role === 'user' || m.role === 'assistant'
        );
        const nodes = Array.from(logEl.querySelectorAll('.msg'));
        // Walk backwards: assistant streaming may have appended the
        // most recent .msg, but the message list is sorted by created_at
        // ascending. Pair from the right so off-by-one races (e.g. a
        // pending tool-call message in flight) don't misalign earlier
        // ids.
        const n = Math.min(nodes.length, msgs.length);
        for (let i = 0; i < n; i++) {
          const node = nodes[nodes.length - 1 - i];
          const m = msgs[msgs.length - 1 - i];
          if (m && m.id != null) node.dataset.msgId = String(m.id);
        }
      } catch (_) {}
    }

    composerEl.addEventListener('keydown', (e) => {
      // Forced-tool autocomplete intercepts arrow / tab / enter while
      // the suggestion list is open. Only "send" once the list is
      // closed so the user can pick a tool with Enter without firing
      // the message.
      const acOpen = !acEl.classList.contains('hidden') && acItems.length > 0;
      if (acOpen) {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          acIndex = (acIndex + 1) % acItems.length;
          refreshForcedToolUI();
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          acIndex = (acIndex - 1 + acItems.length) % acItems.length;
          refreshForcedToolUI();
          return;
        }
        if (e.key === 'Tab' || (e.key === 'Enter' && !e.shiftKey)) {
          e.preventDefault();
          acceptAutocomplete();
          return;
        }
        if (e.key === 'Escape') {
          e.preventDefault();
          acEl.classList.add('hidden');
          acItems = []; acIndex = -1;
          return;
        }
      }
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    sendEl.addEventListener('click', sendMessage);

    let streaming = false;
    // Parse a "*/<tool_name> <prompt>" prefix into a forced-tool
    // invocation. Returns {toolName, prompt} when the prefix is
    // recognised against the loaded registry, else null. The tool name
    // can be `<module>` (single-method modules) or `<module>.<method>`,
    // matching what /tools surfaces in toolState.
    //
    // Example: "*/web.search latest CUDA release notes"
    //   → { toolName: "web.search", prompt: "latest CUDA release notes" }
    function parseForcedToolPrefix(text) {
      if (!text || !text.startsWith('*/')) return null;
      const rest = text.slice(2);
      // Split on the first whitespace; everything before is the tool
      // identifier. Allow letters, digits, underscore, dot, hyphen so
      // both `module` and `module.method` parse cleanly.
      const m = rest.match(/^([A-Za-z0-9_.\-]+)(?:\s+([\s\S]*))?$/);
      if (!m) return null;
      const toolName = m[1];
      const prompt = (m[2] || '').trim();
      // Resolve against the registry — only force when the name is
      // actually registered. Unknown names fall through to a normal
      // prompt so a stray "*/foo" typed in chat doesn't silently break.
      if (!toolState.has(toolName)) return null;
      return { toolName, prompt };
    }

    // ── Forced-tool composer hint + autocomplete ─────────────────────
    // While the textarea begins with "*/", surface a hint chip and an
    // autocomplete list of matching tool names from the loaded
    // registry. Arrow-up/down moves the highlight, Tab/Enter accepts.
    const forcedHintEl = $('forced-tool-hint');
    const acEl = $('tool-autocomplete');
    let acItems = [];
    let acIndex = -1;

    function currentForcedQuery() {
      const v = composerEl.value;
      if (!v.startsWith('*/')) return null;
      const rest = v.slice(2);
      // Whatever's typed before the first whitespace is the partial
      // tool name. Once the user types whitespace, autocomplete closes
      // and we just show the resolved-tool hint chip.
      const wsIdx = rest.search(/\s/);
      if (wsIdx === -1) return { partial: rest, locked: false };
      return { partial: rest.slice(0, wsIdx), locked: true };
    }

    function refreshForcedToolUI() {
      const q = currentForcedQuery();
      if (!q) {
        forcedHintEl.classList.add('hidden');
        acEl.classList.add('hidden');
        acItems = []; acIndex = -1;
        return;
      }
      // Resolve hint: exact match → green chip; partial match → muted.
      if (toolState.has(q.partial)) {
        forcedHintEl.classList.remove('hidden', 'unknown');
        forcedHintEl.textContent = `↳ Forcing tool: ${q.partial}`;
      } else if (q.locked) {
        forcedHintEl.classList.remove('hidden');
        forcedHintEl.classList.add('unknown');
        forcedHintEl.textContent = `↳ Unknown tool "${q.partial}" — message will be sent as a normal prompt.`;
      } else {
        forcedHintEl.classList.add('hidden');
      }
      // Autocomplete is shown only while the user is still typing the
      // tool identifier (no whitespace yet) and there's a partial.
      if (!q.locked && q.partial.length > 0) {
        const ql = q.partial.toLowerCase();
        const matches = [];
        toolState.forEach((_v, name) => {
          if (name.toLowerCase().includes(ql)) matches.push(name);
        });
        // Prefer prefix matches over substring matches; cap at 8.
        matches.sort((a, b) => {
          const ap = a.toLowerCase().startsWith(ql) ? 0 : 1;
          const bp = b.toLowerCase().startsWith(ql) ? 0 : 1;
          return ap - bp || a.localeCompare(b);
        });
        acItems = matches.slice(0, 8);
        if (acIndex >= acItems.length) acIndex = acItems.length - 1;
        if (acIndex < 0 && acItems.length > 0) acIndex = 0;
        if (acItems.length === 0) {
          acEl.classList.add('hidden');
        } else {
          acEl.classList.remove('hidden');
          acEl.innerHTML = acItems.map((name, i) =>
            `<div class="ac-row${i === acIndex ? ' active' : ''}" data-i="${i}">`
            + escapeHtml(name) + '</div>'
          ).join('');
        }
      } else {
        acEl.classList.add('hidden');
        acItems = []; acIndex = -1;
      }
    }

    function acceptAutocomplete(i) {
      if (i == null) i = acIndex;
      if (i < 0 || i >= acItems.length) return;
      const name = acItems[i];
      // Replace the partial with the full name + a trailing space so
      // the user can immediately type the prompt.
      composerEl.value = '*/' + name + ' ';
      acEl.classList.add('hidden');
      acItems = []; acIndex = -1;
      composerEl.focus();
      refreshForcedToolUI();
    }

    composerEl.addEventListener('input', refreshForcedToolUI);
    acEl.addEventListener('mousedown', (e) => {
      // mousedown (not click) so we beat the textarea's blur and don't
      // lose focus before accepting.
      const row = e.target.closest('.ac-row');
      if (!row) return;
      e.preventDefault();
      acceptAutocomplete(parseInt(row.dataset.i, 10));
    });

    async function sendMessage() {
      if (streaming) return;
      const rawText = composerEl.value.trim();
      if (!rawText && attached.length === 0) return;
      // Detect & strip the "*/<tool_name>" manual-invocation prefix.
      // When present, we force enabled_tools to just that one tool +
      // tool_choice={function:{name}} so the model is required to call
      // it on this turn. The user-visible bubble keeps the original
      // text (so the conversation is self-documenting) but the message
      // sent to the model has the prefix stripped.
      const forced = parseForcedToolPrefix(rawText);
      const text = forced ? forced.prompt : rawText;
      composerEl.value = '';
      refreshForcedToolUI();   // hide the prefix hint chip + autocomplete

      // Upload any attached files first. Each call returns an
      // attachment_id we hand to /v1/chat/completions; the backend
      // inlines text content / forwards images to the vision tier.
      const attachmentIds = [];
      const uploadList = attached.splice(0, attached.length);
      renderAttached();
      for (const a of uploadList) {
        try {
          const fd = new FormData();
          fd.append('file', a.file, a.name);
          const ur = await fetch('/api/chat/upload', {
            method: 'POST', credentials: 'include', body: fd,
          });
          if (ur.ok) {
            const j = await ur.json();
            if (j.id) attachmentIds.push(j.id);
          }
        } catch (_) {}
      }

      // Surface attachments inline in the user message bubble so the
      // chat history is self-explanatory. For forced-tool turns we
      // keep the original "*/tool_name …" rendering visible so the
      // user can see at a glance which tool was pinned.
      const visibleText = rawText + (uploadList.length
        ? '\n\n_attached: ' + uploadList.map(a => a.name).join(', ') + '_'
        : '');
      // For the message *sent to the model*, drop the "*/tool_name"
      // prefix — the model only needs the underlying request, with
      // tool_choice doing the actual pinning.
      history.push({ role: 'user', content: text || '(attachment only)' });
      updateCtxIndicator();
      appendMsg('user', visibleText);
      const targetBody = appendMsg('assistant', '');
      // Initial "thinking" state — replaced by streamed tokens or by
      // backend status events (queue position, model spawn, etc.).
      // The pulsing dot animates without JS via the @keyframes below.
      targetBody.innerHTML = '<span class="thinking">Thinking<span class="dots"></span></span>';
      streaming = true;
      sendEl.disabled = true;
      let buffered = '';
      let firstTokenSeen = false;
      try {
        // Per-request enabled tools: only send the names the user
        // toggled on. Empty array means "no tools this turn"; null
        // (no key) means "use registry defaults". The "preload all"
        // master switch overrides the toggles and sends every
        // registered tool name regardless — see setPreloadAll above.
        const toolNames = [];
        if (preloadAllTools) {
          toolState.forEach((_on, name) => toolNames.push(name));
        } else {
          toolState.forEach((on, name) => { if (on) toolNames.push(name); });
        }
        // Lazy-create the conversation row on first send so its tier
        // matches whichever the user picked. Subsequent turns reuse
        // the same conversation_id.
        if (currentConversationId === null) {
          try {
            const cr = await api('/chats', {
              method: 'POST',
              body: JSON.stringify({
                title: text.slice(0, 60) || 'New chat',
                tier: modelEl.value.replace(/^tier\./, ''),
              }),
            });
            if (cr.ok) {
              const conv = await cr.json();
              currentConversationId = conv.id;
              loadConversations();
            }
          } catch (_) {}
        }
        const body = {
          model: modelEl.value,
          stream: true,
          messages: history,
          think: thinkEl.checked || undefined,
          conversation_id: currentConversationId || undefined,
        };
        // Only attach the field when it differs from default; this
        // preserves backwards compat with handlers that don't know
        // about it yet.
        if (toolState.size > 0) body.enabled_tools = toolNames;
        // "*/tool_name" manual invocation overrides the toggle list:
        // we narrow enabled_tools to just that one tool AND set
        // tool_choice to OpenAI's "force this function" shape so the
        // model is required to call it (rather than describing it).
        // Backend already honors tool_choice (see main.py:1127).
        if (forced) {
          body.enabled_tools = [forced.toolName];
          body.tool_choice = {
            type: 'function',
            function: { name: forced.toolName },
          };
        }
        if (attachmentIds.length) body.attachment_ids = attachmentIds;
        // Variant sub-selector: only forward when a non-default value
        // is picked AND the variant select is visible for the current
        // tier (otherwise the field is meaningless and would be a no-op
        // on the backend anyway).
        const variantsForTier = tierVariants.get(modelEl.value);
        if (variantsForTier && variantEl.value && variantEl.style.display !== 'none') {
          const def = variantsForTier.default;
          if (variantEl.value !== def) body.variant = variantEl.value;
        }

        const r = await fetch('/v1/chat/completions', {
          method: 'POST',
          credentials: 'include',
          headers: { 'content-type': 'application/json', 'accept': 'text/event-stream' },
          body: JSON.stringify(body),
        });
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        const reader = r.body.getReader();
        const dec = new TextDecoder();
        let carry = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          carry += dec.decode(value, { stream: true });
          const lines = carry.split('\n');
          carry = lines.pop() || '';
          // Track the SSE event type across lines. Backend sends both
          // OpenAI-style `data:` chunks AND `event: agent`/`data: {...}`
          // status pairs (route.decision, queue.update, model.spawn,
          // error). We surface human-readable status while the model
          // is starting up so the user knows their message wasn't lost.
          let currentEvent = null;
          for (const line of lines) {
            if (line.startsWith('event:')) {
              currentEvent = line.slice(6).trim();
              continue;
            }
            if (!line.startsWith('data:')) {
              if (line === '') currentEvent = null;
              continue;
            }
            const body = line.slice(5).trim();
            if (body === '[DONE]') continue;
            try {
              const chunk = JSON.parse(body);
              if (currentEvent === 'agent' && !firstTokenSeen) {
                // Pre-stream status update from the orchestrator.
                // Status labels are crafted to NOT imply "loading the
                // wrong model first" — when the routed tier matches
                // what the user picked, we just say "Connecting…";
                // when an auto-route specialised it, we surface the
                // reason explicitly.
                const t = chunk.type || '';
                const userPickedTier = (modelEl.value || '').replace(/^tier\./, '');
                let label = null;
                if (t === 'route.decision') {
                  const tier = chunk.data && chunk.data.tier;
                  const reason = chunk.data && chunk.data.specialist_reason;
                  if (!tier || tier === userPickedTier) {
                    label = 'Connecting to model…';
                  } else if (reason) {
                    const reasonText = {
                      image_in_message: 'image attached',
                      code_block_present: 'code block detected',
                    }[reason] || reason;
                    label = `Auto-routed to ${tierLabel(tier)} (${reasonText})…`;
                  } else {
                    label = `Routing to ${tierLabel(tier)}…`;
                  }
                } else if (t === 'queue' || t === 'queue.update') {
                  const d = chunk.data || {};
                  const pos = d.position ?? d.ahead ?? d.queue_position;
                  label = pos != null
                    ? `Queued (${pos} request${pos == 1 ? '' : 's'} ahead)…`
                    : 'Queued for VRAM slot…';
                } else if (t === 'tier.loading' || t === 'model.spawn') {
                  const tag = chunk.data && (chunk.data.model_tag || chunk.data.tier_id);
                  label = tag
                    ? `Loading ${tag} into VRAM (first request takes 5–30s)…`
                    : 'Loading model into VRAM (first request takes 5–30s)…';
                  // Surface the proportional progress bar above the
                  // composer. Cleared by the first streamed token (see
                  // firstTokenSeen branch below) or by the error/finally
                  // paths so it never gets stuck visible.
                  ModelLoading.start(chunk.data || {});
                } else if (t === 'vram.making_room') {
                  const tag = chunk.data && chunk.data.tier_id;
                  label = tag
                    ? `Unloading idle models to make room for ${tag}…`
                    : 'Unloading idle models to make VRAM room…';
                } else if (t === 'tool.call') {
                  const name = chunk.data && chunk.data.name;
                  label = name ? `Calling tool: ${name}…` : 'Calling tool…';
                } else if (t === 'error') {
                  const msg = (chunk.data && chunk.data.message) || 'Unknown error';
                  targetBody.innerHTML = '<em style="color:#c44;">Error: ' + escapeHtml(msg) + '</em>';
                  firstTokenSeen = true;   // suppress further status
                  ModelLoading.cancel();
                  continue;
                }
                if (label) {
                  targetBody.innerHTML = '<span class="thinking">'
                    + escapeHtml(label) + '<span class="dots"></span></span>';
                }
                continue;
              }
              for (const ch of (chunk.choices || [])) {
                const delta = (ch.delta || {}).content;
                if (delta) {
                  if (!firstTokenSeen) {
                    firstTokenSeen = true;
                    targetBody.innerHTML = '';
                    ModelLoading.finish();
                  }
                  buffered += delta;
                  targetBody.innerHTML = renderMarkdown(buffered);
                  logEl.scrollTop = logEl.scrollHeight;
                }
              }
            } catch (_) {}
          }
        }
        history.push({ role: 'assistant', content: buffered });
        updateCtxIndicator();
        // Stamp data-msg-id onto the freshly-rendered .msg nodes so
        // the edit-and-rewind flow has server ids to call DELETE with.
        // _finalize_conversation runs as a background task after the
        // stream closes, so wait a beat before re-fetching.
        setTimeout(refreshMessageIds, 800);
        // First assistant turn in this conversation triggers a backend
        // auto-title pass. Refresh the sidebar after a short delay so
        // the freshly-generated title replaces the "New chat" sentinel.
        // Conservative timing: ~5 s covers the title-gen latency on
        // tier.fast (~1-3 s with think:false). No-op if the title
        // wasn't replaced (re-render is cheap).
        const userTurnsSoFar = history.filter(m => m.role === 'user').length;
        if (userTurnsSoFar === 1 && currentConversationId) {
          setTimeout(loadConversations, 5000);
        }
      } catch (err) {
        // Connection-style failures (TypeError "Failed to fetch", or
        // 502/503 from cloudflared while the backend restarts) are the
        // signature of a refresh-in-progress. Hand off to the
        // RefreshMonitor so the user sees a banner with an ETA instead
        // of a confusing "Error: Failed to fetch" inline.
        const errStr = String(err);
        const isConnFail = (err instanceof TypeError) ||
                           /\b50[23]\b/.test(errStr) ||
                           /NetworkError|Failed to fetch|net::/i.test(errStr);
        if (isConnFail && typeof RefreshMonitor !== 'undefined') {
          RefreshMonitor.reportOutage();
          targetBody.innerHTML =
            '<em style="color:#b85c00;">Backend appears to be refreshing — ' +
            'see banner above. Resend your message in a moment.</em>';
        } else {
          targetBody.innerHTML = '<em style="color:#c44;">Error: ' + escapeHtml(errStr) + '</em>';
        }
      } finally {
        streaming = false;
        sendEl.disabled = false;
        ModelLoading.cancel();
      }
    }

    // ── Admin dashboard ──────────────────────────────────────────────
    // Web equivalent of the Qt AdminWindow. Surfaces the same /admin/*
    // endpoints that gate by is_admin server-side, so non-admin users
    // get 403 even if they bypass the CSS-gated button. Tabs render a
    // pragmatic subset: Overview (counters), Users (read-only list),
    // Tools (count + link), Airgap (state + toggle), Errors (recent).
    // Heavier admin operations (user CRUD, marketplaces, model pulls)
    // remain in the desktop Qt window.
    const dashboardEl = $('dashboard');
    const adminBtn = $('admin-btn');
    const composerFooter = document.querySelector('footer');
    let dashboardOpen = false;
    let dashboardActiveTab = 'overview';

    function showDashboard() {
      if (dashboardOpen) return;
      dashboardOpen = true;
      logEl.classList.add('hidden');
      composerFooter.classList.add('hidden');
      dashboardEl.classList.remove('hidden');
      renderDashboardShell();
      switchDashboardTab(dashboardActiveTab);
    }

    function hideDashboard() {
      dashboardOpen = false;
      dashboardEl.classList.add('hidden');
      dashboardEl.innerHTML = '';
      logEl.classList.remove('hidden');
      composerFooter.classList.remove('hidden');
    }

    adminBtn.addEventListener('click', () => {
      if (dashboardOpen) hideDashboard();
      else showDashboard();
    });

    function renderDashboardShell() {
      dashboardEl.innerHTML = `
        <h2>Backend dashboard</h2>
        <div class="dash-tabs">
          <button class="dash-tab" data-tab="overview">Overview</button>
          <button class="dash-tab" data-tab="users">Users</button>
          <button class="dash-tab" data-tab="tools">Tools</button>
          <button class="dash-tab" data-tab="airgap">Airgap</button>
          <button class="dash-tab" data-tab="errors">Errors</button>
        </div>
        <div id="dash-pane-overview" class="dash-pane"></div>
        <div id="dash-pane-users" class="dash-pane"></div>
        <div id="dash-pane-tools" class="dash-pane"></div>
        <div id="dash-pane-airgap" class="dash-pane"></div>
        <div id="dash-pane-errors" class="dash-pane"></div>
      `;
      dashboardEl.querySelectorAll('.dash-tab').forEach(btn => {
        btn.addEventListener('click', () => switchDashboardTab(btn.dataset.tab));
      });
    }

    function switchDashboardTab(tab) {
      dashboardActiveTab = tab;
      dashboardEl.querySelectorAll('.dash-tab').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tab);
      });
      dashboardEl.querySelectorAll('.dash-pane').forEach(p => {
        p.classList.toggle('active', p.id === 'dash-pane-' + tab);
      });
      const loaders = {
        overview: loadDashOverview,
        users: loadDashUsers,
        tools: loadDashTools,
        airgap: loadDashAirgap,
        errors: loadDashErrors,
      };
      const fn = loaders[tab];
      if (fn) fn();
    }

    function fmtBytes(n) {
      if (!n) return '0 B';
      const u = ['B', 'KB', 'MB', 'GB', 'TB'];
      let i = 0; let v = n;
      while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
      return `${v.toFixed(i ? 1 : 0)} ${u[i]}`;
    }

    function fmtTs(ts) {
      if (!ts) return '';
      const d = typeof ts === 'number' ? new Date(ts * 1000) : new Date(ts);
      if (isNaN(d.getTime())) return String(ts);
      return d.toLocaleString(undefined, {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
      });
    }

    async function loadDashOverview() {
      const pane = $('dash-pane-overview');
      pane.innerHTML = '<div class="dash-empty">Loading overview…</div>';
      try {
        const r = await api('/admin/overview');
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        const o = await r.json();
        const cards = [
          ['Requests (24h)', o.requests],
          ['Active users', o.active_users],
          ['Tokens in', o.tokens_in],
          ['Tokens out', o.tokens_out],
          ['Avg latency', `${Math.round(o.latency_ms_avg)} ms`],
          ['Errors', o.errors],
          ['Total users', o.total_users],
          ['Conversations', o.total_conversations],
          ['Messages', o.total_messages],
          ['RAG docs', `${o.total_rag_docs} (${fmtBytes(o.total_rag_bytes)})`],
          ['Memories', o.total_memories],
        ];
        pane.innerHTML = '<div class="dash-cards">'
          + cards.map(([l, v]) =>
              `<div class="dash-card"><div class="lbl">${escapeHtml(l)}</div>`
              + `<div class="val">${escapeHtml(String(v))}</div></div>`
            ).join('')
          + '</div>';
      } catch (e) {
        pane.innerHTML = `<div class="dash-empty">Failed to load overview: ${escapeHtml(String(e))}</div>`;
      }
    }

    async function loadDashUsers() {
      const pane = $('dash-pane-users');
      pane.innerHTML = '<div class="dash-empty">Loading users…</div>';
      try {
        const r = await api('/admin/users');
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        const j = await r.json();
        const users = j.data || [];
        if (users.length === 0) {
          pane.innerHTML = '<div class="dash-empty">No users.</div>';
          return;
        }
        const rows = users.map(u => `
          <tr>
            <td class="num">${u.id}</td>
            <td>${escapeHtml(u.username || '')}</td>
            <td>${escapeHtml(u.email || '')}</td>
            <td>${u.is_admin ? '<span class="pill admin">admin</span>' : ''}</td>
            <td class="num">${u.conversations || 0}</td>
            <td>${escapeHtml(fmtTs(u.last_login_at))}</td>
          </tr>
        `).join('');
        pane.innerHTML = `
          <div class="dash-banner">User CRUD (create / edit / delete) lives in the desktop admin window. This view is read-only.</div>
          <table class="dash-table">
            <thead><tr>
              <th>ID</th><th>Username</th><th>Email</th><th>Role</th>
              <th>Chats</th><th>Last login</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      } catch (e) {
        pane.innerHTML = `<div class="dash-empty">Failed to load users: ${escapeHtml(String(e))}</div>`;
      }
    }

    async function loadDashTools() {
      const pane = $('dash-pane-tools');
      pane.innerHTML = '<div class="dash-empty">Loading tools…</div>';
      try {
        const r = await api('/admin/tools');
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        const j = await r.json();
        const tools = j.data || [];
        const enabled = tools.filter(t => t.enabled).length;
        const blocked = tools.filter(t => t.airgap_blocked).length;
        const cards = [
          ['Total tools', tools.length],
          ['Enabled', enabled],
          ['Disabled', tools.length - enabled],
          ['Airgap-blocked', blocked],
        ];
        const rows = tools.slice(0, 100).map(t => `
          <tr>
            <td>${escapeHtml(t.name || '')}</td>
            <td>${t.enabled ? '<span class="pill admin">on</span>' : '<span class="pill">off</span>'}</td>
            <td>${escapeHtml((t.description || '').slice(0, 120))}</td>
          </tr>
        `).join('');
        pane.innerHTML = '<div class="dash-cards">'
          + cards.map(([l, v]) =>
              `<div class="dash-card"><div class="lbl">${escapeHtml(l)}</div>`
              + `<div class="val">${escapeHtml(String(v))}</div></div>`
            ).join('')
          + '</div>'
          + '<div class="dash-banner">Per-tool toggles live in the desktop admin window. The chat composer\'s 🔧 Tools popover toggles for the next request only.</div>'
          + (tools.length === 0 ? '<div class="dash-empty">No tools registered.</div>'
              : `<table class="dash-table">
                  <thead><tr><th>Name</th><th>State</th><th>Description</th></tr></thead>
                  <tbody>${rows}</tbody>
                </table>`)
          + (tools.length > 100 ? `<div class="dash-empty">Showing first 100 of ${tools.length}.</div>` : '');
      } catch (e) {
        pane.innerHTML = `<div class="dash-empty">Failed to load tools: ${escapeHtml(String(e))}</div>`;
      }
    }

    async function loadDashAirgap() {
      const pane = $('dash-pane-airgap');
      pane.innerHTML = '<div class="dash-empty">Loading airgap state…</div>';
      try {
        const r = await api('/admin/airgap');
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        const a = await r.json();
        const on = !!a.enabled;
        pane.innerHTML = `
          <div class="dash-banner ${on ? 'warn' : ''}">
            Airgap mode is currently <strong>${on ? 'ON' : 'OFF'}</strong>.
          </div>
          <p style="color:var(--muted); max-width:640px;">${escapeHtml(a.description || '')}</p>
          <div class="dash-actions">
            <button id="airgap-toggle" class="${on ? '' : 'primary'}">${on ? 'Disable airgap' : 'Enable airgap'}</button>
            <button id="airgap-refresh">Refresh</button>
          </div>
          <table class="dash-table">
            <thead><tr><th>Field</th><th>Value</th></tr></thead>
            <tbody>
              <tr><td>Enabled since</td><td>${escapeHtml(fmtTs(a.changed_at))}</td></tr>
              <tr><td>Changed by</td><td>${escapeHtml(a.changed_by || '')}</td></tr>
            </tbody>
          </table>
        `;
        $('airgap-toggle').addEventListener('click', async () => {
          if (!confirm(on
            ? 'Disable airgap mode? Outbound search and external tools will be re-allowed.'
            : 'Enable airgap mode? Outbound web search and external tools will be blocked.')
          ) return;
          try {
            const tr = await api('/admin/airgap', {
              method: 'PATCH',
              body: JSON.stringify({ enabled: !on }),
            });
            if (!tr.ok) throw new Error(`${tr.status} ${tr.statusText}`);
            loadDashAirgap();
          } catch (e) {
            alert('Failed to toggle airgap: ' + e);
          }
        });
        $('airgap-refresh').addEventListener('click', loadDashAirgap);
      } catch (e) {
        pane.innerHTML = `<div class="dash-empty">Failed to load airgap state: ${escapeHtml(String(e))}</div>`;
      }
    }

    async function loadDashErrors() {
      const pane = $('dash-pane-errors');
      pane.innerHTML = '<div class="dash-empty">Loading errors…</div>';
      try {
        const r = await api('/admin/errors');
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        const j = await r.json();
        const errs = j.data || [];
        if (errs.length === 0) {
          pane.innerHTML = '<div class="dash-empty">No recent errors.</div>';
          return;
        }
        const rows = errs.map(e => `
          <tr>
            <td>${escapeHtml(fmtTs(e.ts))}</td>
            <td>${escapeHtml(e.tier || '')}</td>
            <td class="num">${e.user_id ?? ''}</td>
            <td>${escapeHtml((e.error || '').slice(0, 200))}</td>
          </tr>
        `).join('');
        pane.innerHTML = `
          <table class="dash-table">
            <thead><tr><th>Time</th><th>Tier</th><th>User</th><th>Error</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      } catch (e) {
        pane.innerHTML = `<div class="dash-empty">Failed to load errors: ${escapeHtml(String(e))}</div>`;
      }
    }

    bootstrap();
  </script>
</body>
</html>
