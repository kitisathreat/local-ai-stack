<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <title>Local AI Stack — Chat</title>
  <style>
    :root {
      --bg: #0f1014;
      --panel: #181a21;
      --fg: #e8e8e8;
      --muted: #888;
      --border: #2a2d36;
      --accent: #3794ff;
      --danger: #c44;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg); color: var(--fg);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header .brand { font-weight: 600; }
    header select, header button {
      background: #22252e; color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px;
      font: inherit;
    }
    header button { cursor: pointer; }
    header button:hover { background: #2a2d36; }
    header .spacer { flex: 1; }
    /* Status indicators in the header — Claude Code-style proportional
       torus rings. Hover/tap reveals a popover with the per-component
       breakdown (loaded models, per-role token spend, etc.). The ring
       is an SVG circle whose stroke-dasharray is animated; the colour
       moves green → yellow → red as the fill fraction crosses
       0.7 / 0.9 thresholds.

       Each .stat is positioned (relative) so its breakdown popover can
       absolutely-anchor below it without escaping the header. */
    .stat {
      position: relative;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2px 8px; cursor: pointer;
      font-size: 11px;
      color: var(--muted);
      font-family: 'Cascadia Code', Consolas, monospace;
      white-space: nowrap;
      border-radius: 6px;
      user-select: none;
    }
    .stat:hover, .stat.open { background: #22252e; }
    .stat .lbl { text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
    .stat .val { color: var(--fg); }
    .stat.warn .val { color: #e0c060; }
    .stat.crit .val { color: var(--danger); }
    .stat.warn .ring-fill { stroke: #e0c060; }
    .stat.crit .ring-fill { stroke: var(--danger); }
    .ring {
      width: 24px; height: 24px; flex: 0 0 24px;
      transform: rotate(-90deg);
    }
    .ring .ring-track { fill: none; stroke: #2a2d36; stroke-width: 4; }
    .ring .ring-fill {
      fill: none; stroke: #4caf50; stroke-width: 4;
      stroke-linecap: round;
      transition: stroke-dasharray .3s ease, stroke .3s ease;
    }
    .stat-popover {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px;
      min-width: 240px; max-width: 320px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px; color: var(--fg);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      z-index: 50;
      display: none;
      white-space: normal;
    }
    .stat.open .stat-popover { display: block; }
    .stat-popover h4 {
      margin: 0 0 6px 0; font-size: 12px; font-weight: 600;
      color: var(--fg); text-transform: none; letter-spacing: 0;
    }
    .stat-popover .row {
      display: flex; justify-content: space-between; gap: 12px;
      padding: 2px 0; color: var(--muted);
    }
    .stat-popover .row .k { color: var(--muted); }
    .stat-popover .row .v { color: var(--fg); font-family: 'Cascadia Code', Consolas, monospace; }
    .stat-popover .row.total {
      border-top: 1px solid var(--border); margin-top: 4px; padding-top: 4px;
    }
    .stat-popover .empty { color: var(--muted); font-style: italic; }
    /* Composer-area model loading progress bar. Lives just above the
       composer; visible while a tier is spawning so the user has a
       proportional indication of how much weight has streamed into
       VRAM. Falls back to a time-based estimate when no actual
       byte-progress signal is available. */
    #model-loading {
      max-width: 960px; margin: 0 auto; width: 100%;
      padding: 4px 16px 0; font-size: 11px; color: var(--muted);
      display: none;
    }
    #model-loading.visible { display: block; }
    #model-loading .ml-bar {
      height: 4px; background: #22252e; border-radius: 2px;
      overflow: hidden; margin-top: 3px;
    }
    #model-loading .ml-fill {
      height: 100%; width: 0%; background: var(--accent);
      transition: width .25s ease;
    }
    #model-loading .ml-fill.indeterminate {
      width: 35%;
      animation: ml-slide 1.4s ease-in-out infinite;
    }
    @keyframes ml-slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(285%); }
    }
    /* Forced-tool prefix UI. When the user types "*/" the textarea
       grows a hint chip that confirms which registered tool will be
       pinned (or warns when the partial name doesn't resolve), plus an
       inline autocomplete list so the user can pick by tab/click
       instead of typing the full module.method. */
    #forced-tool-hint {
      padding: 4px 10px; font-size: 11px; color: #4caf50;
      border-top: 1px solid var(--border);
      font-family: 'Cascadia Code', Consolas, monospace;
    }
    #forced-tool-hint.unknown { color: var(--danger); }
    #forced-tool-hint.hidden { display: none; }
    #tool-autocomplete {
      max-height: 160px; overflow-y: auto;
      border-top: 1px solid var(--border);
      font-family: 'Cascadia Code', Consolas, monospace; font-size: 12px;
    }
    #tool-autocomplete.hidden { display: none; }
    #tool-autocomplete .ac-row {
      padding: 4px 10px; cursor: pointer; color: var(--fg);
      border-bottom: 1px solid var(--border);
    }
    #tool-autocomplete .ac-row:last-child { border-bottom: none; }
    #tool-autocomplete .ac-row:hover,
    #tool-autocomplete .ac-row.active {
      background: #2a2d36; color: var(--accent);
    }
    #tool-autocomplete .ac-row .ac-hint {
      color: var(--muted); font-size: 11px; margin-left: 8px;
    }
    /* Per-message edit affordance. The pencil shows on hover for user
       turns and lets the user rewrite a previous prompt — committing the
       edit truncates the conversation back to that point and re-sends
       the new text, mirroring Claude / ChatGPT-style "edit & resubmit". */
    .msg { position: relative; }
    .msg .msg-actions {
      position: absolute; top: 0; right: 0;
      display: none; gap: 4px;
    }
    .msg.user:hover .msg-actions, .msg .msg-actions.force { display: flex; }
    .msg .msg-actions button {
      background: transparent; color: var(--muted); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 6px; font-size: 11px; cursor: pointer;
      font-family: inherit;
    }
    .msg .msg-actions button:hover { color: var(--fg); background: #22252e; }
    .msg .edit-area {
      width: 100%; min-height: 80px;
      background: #22252e; color: var(--fg);
      border: 1px solid var(--accent); border-radius: 6px;
      padding: 8px 10px; font: inherit; resize: vertical;
      outline: none;
    }
    .msg .edit-controls {
      display: flex; gap: 6px; margin-top: 6px; align-items: center;
    }
    .msg .edit-controls .hint {
      color: var(--muted); font-size: 11px; margin-left: auto;
    }
    .msg .edit-controls button {
      background: #22252e; color: var(--fg); border: 1px solid var(--border);
      border-radius: 4px; padding: 4px 10px; font: inherit; font-size: 12px;
      cursor: pointer;
    }
    .msg .edit-controls button.primary {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    #main { flex: 1; display: flex; overflow: hidden; }
    #log { flex: 1; overflow: auto; padding: 16px; max-width: 860px; margin: 0 auto; width: 100%; }
    .msg { margin: 0 0 16px 0; line-height: 1.5; }
    .msg.user { color: #d0e4ff; }
    .msg.assistant { color: var(--fg); }
    .msg pre {
      background: #1a1b20; border: 1px solid var(--border);
      border-radius: 6px; padding: 10px; overflow-x: auto;
      font-family: 'Cascadia Code', Consolas, monospace; font-size: 12.5px;
    }
    .msg code { background: #22252e; padding: 1px 4px; border-radius: 3px; }
    .msg a { color: var(--accent); }
    .role { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    /* "Thinking…" placeholder shown while the assistant message is
       still streaming nothing — replaced by the first real token. */
    .thinking { color: var(--muted); font-style: italic; }
    .thinking .dots::after {
      content: '';
      display: inline-block;
      width: 1.2em;
      animation: dots 1.4s steps(4, end) infinite;
      content: '';
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }
    /* The browser doesn't actually animate `content` via @keyframes —
       use a bouncy span instead. Replace with three pulsing dots: */
    .thinking .dots {
      display: inline-block;
      margin-left: 2px;
    }
    .thinking .dots::before {
      content: '...';
      letter-spacing: 1px;
      display: inline-block;
      animation: pulse-dots 1.4s ease-in-out infinite;
    }
    @keyframes pulse-dots {
      0%, 100% { opacity: 0.2; }
      50%      { opacity: 1.0; }
    }
    footer {
      border-top: 1px solid var(--border); padding: 10px 16px;
      background: var(--panel); display: flex; gap: 8px;
      max-width: 960px; margin: 0 auto; width: 100%;
    }
    #composer-wrap {
      flex: 1; position: relative; display: flex; flex-direction: column;
      background: #22252e; border: 1px solid var(--border); border-radius: 6px;
    }
    #composer {
      resize: none; background: transparent; color: var(--fg);
      border: 0; padding: 8px 10px 4px 10px;
      font: inherit; min-height: 44px; max-height: 200px;
      outline: none;
    }
    .composer-tools {
      display: flex; align-items: center; gap: 4px;
      padding: 0 6px 6px 6px;
      /* Anchor for #tools-popover (position: absolute). Without this
         the popover escapes to <body> and renders off-screen / behind
         other UI — symptom: "no tools dropdown" on desktop AND mobile. */
      position: relative;
    }
    .icon-btn {
      background: transparent; color: var(--muted);
      border: 1px solid transparent; border-radius: 4px;
      padding: 4px 8px; cursor: pointer; font: inherit; font-size: 12px;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .icon-btn:hover { color: var(--fg); border-color: var(--border); }
    #attach-input { display: none; }
    #attached-list {
      display: flex; flex-wrap: wrap; gap: 4px;
      padding: 0 6px;
    }
    .chip {
      background: #2a2d36; border: 1px solid var(--border);
      border-radius: 12px; padding: 2px 8px; font-size: 11px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .chip .x { cursor: pointer; color: var(--muted); }
    .chip .x:hover { color: var(--danger); }
    #tools-popover {
      position: absolute; bottom: 100%; left: 0; margin-bottom: 6px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px; min-width: 360px; max-width: 480px;
      max-height: 480px;
      overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.4); z-index: 10;
    }
    #tools-popover.hidden { display: none; }
    #tools-popover .tool-row {
      display: flex; align-items: center; gap: 8px; padding: 3px 2px;
      font-size: 12.5px;
    }
    #tools-popover .tool-row label {
      flex: 1; cursor: pointer; color: var(--fg);
    }
    #tools-popover .tool-search {
      width: 100%; background: #22252e; color: var(--fg);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 6px; margin-bottom: 6px; font: inherit; font-size: 12px;
    }
    /* Tree groupings */
    #tools-popover .tier-block { margin-bottom: 8px; }
    #tools-popover .tier-header,
    #tools-popover .group-header,
    #tools-popover .subgroup-header {
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; user-select: none;
      color: var(--fg);
    }
    #tools-popover .tier-header {
      font-size: 12px; font-weight: 600; color: #cfd2d8;
      padding: 4px 2px; background: #1f222a; border-radius: 4px;
      margin-bottom: 2px;
    }
    #tools-popover .group-header {
      font-size: 12.5px; font-weight: 500;
      padding: 3px 4px 3px 14px; color: #c0c3c9;
    }
    #tools-popover .subgroup-header {
      font-size: 12px; padding: 2px 4px 2px 26px; color: var(--muted);
    }
    #tools-popover .tier-header .caret,
    #tools-popover .group-header .caret,
    #tools-popover .subgroup-header .caret {
      width: 10px; text-align: center; font-size: 9px;
      transition: transform 0.15s;
    }
    #tools-popover .collapsed > .caret { transform: rotate(-90deg); }
    #tools-popover .header-title { flex: 1; }
    #tools-popover .header-count { color: var(--muted); font-size: 11px; }
    #tools-popover .tool-row { padding-left: 38px; }
    #tools-popover .group-body.hidden,
    #tools-popover .subgroup-body.hidden,
    #tools-popover .tier-body.hidden { display: none; }
    /* Master toggle (per tier/group/subgroup) — same look as the per-tool one */
    #tools-popover .header-toggle { flex-shrink: 0; }
    #tools-popover .preload-row {
      padding: 8px 10px; border-bottom: 1px solid var(--border);
      background: #1c1f27;
    }
    #tools-popover .preload-row label {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; font-size: 12px; color: var(--fg);
    }
    #tools-popover .preload-row label > span:first-child { flex: 1; }
    #tools-popover .preload-hint {
      margin-top: 4px; font-size: 11px; color: var(--muted);
      line-height: 1.3;
    }
    #tools-popover .preload-row.on .preload-hint { color: #e0c060; }
    /* iOS-style toggle switch */
    .toggle {
      position: relative; width: 30px; height: 16px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0; background: #44474f; border-radius: 16px;
      cursor: pointer; transition: background .15s;
    }
    .toggle .slider::before {
      content: ''; position: absolute; left: 2px; top: 2px;
      width: 12px; height: 12px; background: white; border-radius: 50%;
      transition: transform .15s;
    }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(14px); }
    .toggle input:disabled + .slider { opacity: 0.4; cursor: not-allowed; }
    #send {
      background: var(--accent); color: white; border: 0;
      border-radius: 6px; padding: 0 18px; cursor: pointer;
      font: inherit;
    }
    #send:disabled { opacity: 0.6; cursor: not-allowed; }
    #signin {
      max-width: 360px; margin: 10vh auto; padding: 24px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    }
    #signin h1 { font-size: 18px; margin: 0 0 16px 0; }
    #signin label { display: block; font-size: 12px; color: var(--muted); margin-top: 10px; }
    #signin input {
      width: 100%; background: #22252e; color: var(--fg);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 10px; font: inherit; margin-top: 4px;
    }
    #signin button {
      width: 100%; margin-top: 16px; background: var(--accent);
      color: white; border: 0; border-radius: 6px; padding: 10px;
      font: inherit; cursor: pointer;
    }
    #signin-err { color: var(--danger); margin-top: 10px; font-size: 13px; min-height: 18px; }
    .hidden { display: none !important; }
    /* Admin dashboard — shown only after a sign-in where /admin/me
       reports is_admin=true. Replaces the chat log pane in place; the
       composer is hidden while it's active. Closing returns the user to
       the chat with their conversation history intact. */
    #admin-btn { display: none; }
    body.is-admin #admin-btn { display: inline-block; }
    #dashboard {
      flex: 1; overflow: auto; padding: 18px 20px; max-width: 1100px;
      margin: 0 auto; width: 100%;
    }
    #dashboard h2 { margin: 0 0 14px 0; font-size: 18px; font-weight: 600; }
    .dash-tabs {
      display: flex; gap: 4px; border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .dash-tab {
      background: transparent; color: var(--muted);
      border: 0; border-bottom: 2px solid transparent;
      padding: 8px 14px; cursor: pointer; font: inherit; font-size: 13px;
    }
    .dash-tab:hover { color: var(--fg); }
    .dash-tab.active { color: var(--fg); border-bottom-color: var(--accent); }
    .dash-pane { display: none; }
    .dash-pane.active { display: block; }
    .dash-cards {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px; margin-bottom: 18px;
    }
    .dash-card {
      background: #1a1c23; border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 12px;
    }
    .dash-card .lbl {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .dash-card .val {
      font-size: 20px; font-weight: 600; margin-top: 4px;
      font-family: 'Cascadia Code', Consolas, monospace;
    }
    .dash-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
      margin-top: 8px;
    }
    .dash-table th, .dash-table td {
      text-align: left; padding: 6px 8px;
      border-bottom: 1px solid var(--border);
    }
    .dash-table th {
      background: #1a1c23; color: var(--muted);
      font-weight: 500; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .dash-table td.num { font-family: 'Cascadia Code', Consolas, monospace; }
    .dash-table .pill {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 11px; background: #2a2d36;
    }
    .dash-table .pill.admin { background: #3a4a6a; color: #cfe1ff; }
    .dash-actions {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .dash-actions button {
      background: #22252e; color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 12px; font: inherit; font-size: 13px;
      cursor: pointer;
    }
    .dash-actions button:hover { background: #2a2d36; }
    .dash-actions button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .dash-actions button.primary:hover { background: #2d7fdb; }
    .dash-empty { color: var(--muted); padding: 20px 0; font-style: italic; }
    .dash-banner {
      padding: 10px 12px; border-radius: 6px;
      background: #1f2a3a; border: 1px solid #3a4a6a;
      color: #cfe1ff; font-size: 13px; margin-bottom: 14px;
    }
    .dash-banner.warn { background: #2a2415; border-color: #6a5a3a; color: #e0c060; }
    /* Conversation sidebar — lists the user's past chats. Click an
       item to resume; the chat history is repopulated and subsequent
       sends include conversation_id so the backend persists messages
       to the existing row. */
    #sidebar {
      width: 240px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--panel);
      display: flex; flex-direction: column;
    }
    #sidebar header {
      border-right: 0; border-bottom: 1px solid var(--border);
      justify-content: space-between;
    }
    #conv-list { flex: 1; overflow-y: auto; padding: 6px; }
    .conv-item {
      padding: 8px 10px; border-radius: 6px; cursor: pointer;
      font-size: 13px; color: var(--fg);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .conv-item:hover { background: #22252e; }
    .conv-item.active { background: #2a2d36; border-left: 2px solid var(--accent); padding-left: 8px; }
    .conv-item .conv-title { font-weight: 500; }
    .conv-item .conv-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    /* Per-row archive / delete buttons. Hidden until hover so the
       sidebar stays clean; click event bubbles are captured to avoid
       opening the chat when the user clicks the action. */
    .conv-item { position: relative; padding-right: 56px; }
    .conv-item .conv-actions {
      position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
      display: none; gap: 2px;
    }
    .conv-item:hover .conv-actions { display: flex; }
    .conv-item .conv-actions button {
      background: transparent; color: var(--muted); border: none;
      cursor: pointer; padding: 2px 4px; font-size: 13px; line-height: 1;
      border-radius: 3px;
    }
    .conv-item .conv-actions button:hover { background: #2f323b; color: #fff; }
    .conv-item .conv-actions button.delete:hover { color: var(--danger); }
    /* Archived view marker on conv items */
    .conv-item.archived .conv-title { font-style: italic; color: var(--muted); }
    /* Archived-view toggle button */
    #archived-toggle {
      width: 100%; background: transparent; color: var(--muted); border: none;
      cursor: pointer; padding: 6px 10px; font-size: 12px; text-align: left;
      border-top: 1px solid var(--border);
    }
    #archived-toggle:hover { color: #fff; background: #22252e; }
    #archived-toggle.active { color: var(--accent); }
    #new-conv-btn {
      margin: 6px; padding: 8px;
      background: var(--accent); color: white; border: 0;
      border-radius: 6px; cursor: pointer; font: inherit; font-size: 13px;
    }
    /* ── Mobile / phone layout ──────────────────────────────────────
       Two triggers wear this hat: the CSS @media query (viewport
       width) and the JS-applied `body.is-phone` class (UA + touch +
       coarse pointer). The media query handles small desktop windows
       too; the class lets us also adapt iPad-sized phones in landscape
       and force the touch-friendly layout on real phones regardless of
       a user-zoom that would otherwise cross 640px. */
    #menu-btn { display: none; }
    #drawer-backdrop { display: none; }
    @media (max-width: 640px), (pointer: coarse) and (max-width: 900px) {
      header { padding: 8px 10px; gap: 6px; flex-wrap: wrap; }
      header .brand { font-size: 13px; }
      header select { max-width: 140px; font-size: 13px; }
      /* The username eats space on a phone — hide it; the user can pull
         up /admin in a separate tab. The VRAM and CTX torus indicators
         stay visible (they collapse to ring-only, with the numeric
         label hidden) because monitoring fill is the whole point on a
         phone where a runaway tier still kills the chat. The breakdown
         popover is reachable by tap. */
      #who { display: none; }
      #vram-stat .lbl, #ctx-stat .lbl,
      #vram-stat .val, #ctx-stat .val { display: none; }
      #vram-stat, #ctx-stat { padding: 2px 4px; }
      .stat-popover {
        right: auto; left: 50%; transform: translateX(-50%);
        max-width: 80vw;
      }
      header label { font-size: 12px; }
      #menu-btn {
        display: inline-flex; align-items: center; justify-content: center;
        background: transparent; color: var(--fg);
        border: 1px solid var(--border); border-radius: 6px;
        width: 36px; height: 36px; cursor: pointer; padding: 0;
        font-size: 18px;
      }
      header button#logout { padding: 6px 8px; font-size: 12px; }
      /* Sidebar becomes an off-canvas drawer. Slides in from the left
         when #menu-btn is tapped; tap the backdrop or a conv item to
         dismiss. Width capped so the chat peek behind it stays
         visible. */
      #sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        width: min(280px, 80vw); z-index: 30;
        transform: translateX(-100%);
        transition: transform .2s ease-out;
        border-right: 1px solid var(--border);
      }
      body.drawer-open #sidebar { transform: translateX(0); }
      #drawer-backdrop {
        display: block; position: fixed; inset: 0;
        background: rgba(0,0,0,0.5); z-index: 20;
        opacity: 0; pointer-events: none;
        transition: opacity .2s;
      }
      body.drawer-open #drawer-backdrop {
        opacity: 1; pointer-events: auto;
      }
      #log { padding: 10px; }
      .msg { font-size: 15px; }   /* slightly larger for touch reading */
      /* Stack the composer above the send button so the send button
         spans full-width — easier thumb target than a narrow side button. */
      footer {
        flex-direction: column; padding: 8px;
        /* Respect the iOS home-indicator safe area. */
        padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
        gap: 6px;
      }
      #composer { min-height: 48px; font-size: 16px; }   /* 16px prevents iOS zoom-on-focus */
      #send {
        width: 100%; padding: 12px; min-height: 44px;
        font-size: 15px;
      }
      .icon-btn { padding: 8px 10px; font-size: 13px; }
      /* Tools popover on a tiny screen: span more of the width and
         scroll inside instead of overflowing. */
      #tools-popover {
        left: 0; right: 0; min-width: 0; max-height: 50vh;
      }
    }
    /* Refresh banner — shown when /healthz fails (typical cause: backend
       restart triggered by post-merge hook after a `git pull`). Polls
       /healthz on a tight schedule and reveals what's happening + ETA so
       users don't think the chat is dead. */
    #refresh-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: #b85c00; color: #fff;
      padding: 10px 14px; font-size: 13px; line-height: 1.4;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      display: none;
    }
    #refresh-banner.visible { display: block; }
    #refresh-banner strong { font-weight: 600; }
    #refresh-banner .dots::after {
      content: ''; display: inline-block; width: 0;
      animation: refresh-dots 1.2s steps(4,end) infinite;
    }
    @keyframes refresh-dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }
  </style>
</head>
<body>
  <div id="refresh-banner" role="status" aria-live="polite">
    <strong>Backend unreachable</strong>
    <span id="refresh-banner-msg">— checking<span class="dots"></span></span>
  </div>
  <div id="signin">
    <h1>Local AI Stack</h1>
    <form id="signin-form">
      <label for="username">Username</label>
      <input id="username" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
      <div id="signin-err"></div>
    </form>
  </div>

  <div id="chatapp" class="hidden" style="display:flex; flex-direction:row; flex:1; width:100%;">
    <div id="drawer-backdrop"></div>
    <aside id="sidebar">
      <button id="new-conv-btn">+ New chat</button>
      <div id="conv-list"></div>
      <button id="archived-toggle" type="button" title="Show archived chats">📦 Show archived</button>
    </aside>
    <div style="display:flex; flex-direction:column; flex:1; min-width:0;">
      <header>
        <button id="menu-btn" type="button" aria-label="Open conversations" title="Conversations">☰</button>
        <span class="brand">Local AI Stack</span>
        <select id="model"></select>
        <select id="model-variant" title="Model variant" style="display:none;"></select>
        <label><input type="checkbox" id="think"> Think</label>
        <span class="spacer"></span>
        <span id="vram-stat" class="stat" title="GPU VRAM usage — click for breakdown" tabindex="0" role="button" aria-label="VRAM usage">
          <svg class="ring" viewBox="0 0 36 36" aria-hidden="true">
            <circle class="ring-track" cx="18" cy="18" r="15"></circle>
            <circle class="ring-fill"  cx="18" cy="18" r="15"
                    stroke-dasharray="0 100" pathLength="100"></circle>
          </svg>
          <span class="lbl">VRAM</span> <span class="val" id="vram-val">—</span>
          <div class="stat-popover" id="vram-popover" role="dialog" aria-label="VRAM breakdown"></div>
        </span>
        <span id="ctx-stat" class="stat" title="Context window usage — click for breakdown" tabindex="0" role="button" aria-label="Context window usage">
          <svg class="ring" viewBox="0 0 36 36" aria-hidden="true">
            <circle class="ring-track" cx="18" cy="18" r="15"></circle>
            <circle class="ring-fill"  cx="18" cy="18" r="15"
                    stroke-dasharray="0 100" pathLength="100"></circle>
          </svg>
          <span class="lbl">CTX</span> <span class="val" id="ctx-val">—</span>
          <div class="stat-popover" id="ctx-popover" role="dialog" aria-label="Context breakdown"></div>
        </span>
        <span id="who" style="color:var(--muted);"></span>
        <button id="admin-btn" type="button" title="Open backend dashboard">⚙ Admin</button>
        <button id="logout">Sign out</button>
      </header>
      <div id="main">
        <div id="log"></div>
        <div id="dashboard" class="hidden"></div>
      </div>
    <div id="model-loading" role="status" aria-live="polite">
      <span id="ml-label">Loading model into VRAM…</span>
      <div class="ml-bar"><div class="ml-fill" id="ml-fill"></div></div>
    </div>
    <footer>
      <div id="composer-wrap">
        <textarea id="composer" placeholder="Type a message. Enter to send, Shift+Enter for newline. Prefix with */tool_name to force a specific tool." rows="1"></textarea>
        <div id="forced-tool-hint" class="hidden"></div>
        <div id="tool-autocomplete" class="hidden"></div>
        <div id="attached-list"></div>
        <div class="composer-tools">
          <button class="icon-btn" id="tools-btn" title="Enable tools">🔧 Tools <span id="tools-count" style="color:var(--muted);"></span></button>
          <button class="icon-btn" id="attach-btn" title="Attach files">📎 Attach</button>
          <input type="file" id="attach-input" multiple>
          <div id="tools-popover" class="hidden">
            <div class="preload-row">
              <label for="preload-all" title="When on, every registered tool is sent to the model on every turn — without modifying the individual toggles below. Off by default; the model only sees tools you've explicitly enabled.">
                <span>Preload all tools</span>
                <span class="toggle"><input type="checkbox" id="preload-all"><span class="slider"></span></span>
              </label>
              <div class="preload-hint" id="preload-hint">Off — only tools you toggle below are sent to the model.</div>
            </div>
            <input type="text" class="tool-search" id="tool-search" placeholder="Filter tools…">
            <div id="tools-list"></div>
          </div>
        </div>
      </div>
      <button id="send">Send</button>
    </footer>
    </div>
  </div>

  <script>
    // Minimal markdown renderer — escapes HTML, handles fenced code,
    // inline code, bold, italic, links, line breaks. Avoids a CDN
    // dependency; good enough for chat output.
    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }
    function renderMarkdown(src) {
      let out = '';
      const fenceRe = /```([a-zA-Z0-9_-]*)\n([\s\S]*?)```/g;
      let last = 0, m;
      while ((m = fenceRe.exec(src))) {
        out += inline(src.slice(last, m.index));
        out += '<pre><code>' + escapeHtml(m[2]) + '</code></pre>';
        last = fenceRe.lastIndex;
      }
      out += inline(src.slice(last));
      return out;
    }
    function inline(s) {
      s = escapeHtml(s);
      s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
      s = s.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/(?<!\w)\*([^\*\n]+)\*(?!\w)/g, '<em>$1</em>');
      s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,
        '<a href="$2" target="_blank" rel="noopener">$1</a>');
      s = s.replace(/\n/g, '<br>');
      return s;
    }

    const $ = id => document.getElementById(id);

    // ── Phone browser detection ─────────────────────────────────────
    // Cheap multi-signal check: UA hints, coarse pointer, narrow
    // viewport. Any two of three counts as a phone. Pure UA sniffing
    // is unreliable (desktop "request mobile site" sets mobile UA on
    // a wide screen; iPad pretends to be a Mac). Pure viewport breaks
    // when a desktop user shrinks the window. Combining them avoids
    // both failure modes.
    function detectPhone() {
      const ua = (navigator.userAgent || '').toLowerCase();
      const uaPhone = /iphone|ipod|android.*mobile|windows phone|blackberry|bb10|iemobile|opera mini/.test(ua);
      const coarse  = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
      const narrow  = window.innerWidth <= 640;
      // iPadOS 13+ reports "Macintosh"; disambiguate by touch + screen.
      const ipadOS  = /macintosh/.test(ua) && navigator.maxTouchPoints > 1;
      const score = (uaPhone ? 1 : 0) + (coarse ? 1 : 0) + (narrow ? 1 : 0);
      return score >= 2 || ipadOS && narrow;
    }
    function applyPhoneClass() {
      document.body.classList.toggle('is-phone', detectPhone());
    }
    applyPhoneClass();
    // Re-check on rotation / resize so the layout follows the device.
    // matchMedia change events would also work but resize covers
    // user-zoom and split-screen transitions on iPadOS.
    let _phoneResizeT = null;
    window.addEventListener('resize', () => {
      clearTimeout(_phoneResizeT);
      _phoneResizeT = setTimeout(applyPhoneClass, 100);
    });

    // ── Sidebar drawer (phone) ──────────────────────────────────────
    // The sidebar is permanently visible on desktop. On phones the CSS
    // turns it into an off-canvas panel; these handlers toggle the
    // body.drawer-open class that drives the slide-in transform.
    const menuBtn = $('menu-btn');
    const drawerBackdrop = $('drawer-backdrop');
    function closeDrawer() { document.body.classList.remove('drawer-open'); }
    function openDrawer()  { document.body.classList.add('drawer-open'); }
    if (menuBtn) {
      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        document.body.classList.toggle('drawer-open');
      });
    }
    if (drawerBackdrop) drawerBackdrop.addEventListener('click', closeDrawer);
    // Tapping a conversation or "+ New chat" should close the drawer
    // so the user lands on the chat view immediately.
    document.addEventListener('click', (e) => {
      if (!document.body.classList.contains('drawer-open')) return;
      const t = e.target;
      if (t.closest && (t.closest('.conv-item') || t.closest('#new-conv-btn'))) {
        closeDrawer();
      }
    });
    // Escape closes the drawer, mirroring desktop modal conventions.
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDrawer();
    });

    const logEl = $('log');
    const modelEl = $('model');
    const thinkEl = $('think');
    const composerEl = $('composer');
    const sendEl = $('send');
    const whoEl = $('who');
    const signinBox = $('signin');
    const app = $('chatapp');
    const history = [];

    async function api(path, opts = {}) {
      opts.credentials = 'include';
      opts.headers = Object.assign({ 'content-type': 'application/json' }, opts.headers || {});
      const r = await fetch(path, opts);
      return r;
    }

    // Pre-warm is intentionally a no-op now: the backend's default warm
    // set is empty, and on a 24 GB card auto-loading versatile on every
    // login + page-mount + visibility-change ate ~20 GB of VRAM before
    // the user even targeted a model. Models cold-spawn on first chat
    // message instead. Operators on bigger cards can still hit
    // POST /api/warm with an explicit `{"tiers":[...]}` body.
    async function warmChatTiers() { /* no-op */ }

    async function bootstrap() {
      try {
        const r = await api('/admin/me');
        if (r.ok) {
          const me = await r.json();
          whoEl.textContent = me.username;
          applyAdminFlag(me.is_admin);
          await loadModels();
          await loadTools();
          await loadConversations();
          pollVram();
          signinBox.classList.add('hidden');
          app.classList.remove('hidden');
        }
      } catch (_) {}
    }

    // Toggle the body.is-admin class so the ⚙ Admin button (CSS-gated)
    // becomes visible. /admin/me is the source of truth — the same
    // endpoint that gates every other /admin/* route by is_admin server
    // side, so the UI can't fake itself into the dashboard.
    function applyAdminFlag(isAdmin) {
      document.body.classList.toggle('is-admin', !!isAdmin);
    }

    $('signin-form').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const err = $('signin-err');
      err.textContent = 'Signing in…';
      const r = await api('/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          username: $('username').value.trim(),
          password: $('password').value,
        }),
      });
      if (!r.ok) {
        err.textContent = 'Invalid username or password.';
        return;
      }
      const info = await r.json();
      whoEl.textContent = info.username;
      applyAdminFlag(info.is_admin);
      await loadModels();
      await loadTools();
      await loadConversations();
      pollVram();
      err.textContent = '';
      signinBox.classList.add('hidden');
      app.classList.remove('hidden');
    });

    $('logout').addEventListener('click', async () => {
      await api('/auth/logout', { method: 'POST' });
      history.length = 0;
      logEl.innerHTML = '';
      applyAdminFlag(false);
      hideDashboard();
      app.classList.add('hidden');
      signinBox.classList.remove('hidden');
    });

    // ── Conversation list (sidebar) ─────────────────────────────────
    // The backend persists every signed-in chat to SQLite, indexed by
    // conversation_id. The sidebar is the user's surface to resume
    // those — clicking an item refills `history` from the server's
    // stored messages and sets `currentConversationId` so subsequent
    // sends append to the same row.
    let currentConversationId = null;
    const convListEl = $('conv-list');

    // Sidebar mode: 'active' = non-archived only (default), 'archived'
    // = archived only. Toggled via the 📦 button at the bottom of the
    // sidebar.
    let convViewMode = 'active';

    async function loadConversations() {
      try {
        const path = convViewMode === 'archived'
          ? '/chats?archived_only=true'
          : '/chats';
        const r = await api(path);
        if (!r.ok) return;
        const j = await r.json();
        const items = j.data || [];
        convListEl.innerHTML = '';
        items.forEach(c => renderConvItem(c));
        if (items.length === 0) {
          const msg = convViewMode === 'archived'
            ? 'No archived chats.'
            : 'No previous chats.';
          convListEl.innerHTML =
            `<div style="padding:10px; color:var(--muted); font-size:12px;">${msg}</div>`;
        }
      } catch (_) {}
    }

    function renderConvItem(c) {
      const div = document.createElement('div');
      div.className = 'conv-item'
        + (c.id === currentConversationId ? ' active' : '')
        + (c.archived ? ' archived' : '');
      div.dataset.id = c.id;
      const title = c.title || 'Untitled';
      const ts = c.updated_at || c.created_at;
      const when = ts ? new Date(ts * 1000).toLocaleString(undefined, {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
      }) : '';
      const archiveLabel = c.archived ? '↩' : '📦';
      const archiveTitle = c.archived ? 'Unarchive' : 'Archive';
      div.innerHTML =
        `<div class="conv-title">${escapeHtml(title)}</div>`
        + (when ? `<div class="conv-meta">${escapeHtml(when)}${c.tier ? ' • ' + escapeHtml(c.tier) : ''}</div>` : '')
        + `<div class="conv-actions">`
        + `  <button class="archive" title="${archiveTitle}">${archiveLabel}</button>`
        + `  <button class="delete" title="Delete (keeps a memory summary)">🗑</button>`
        + `</div>`;
      div.addEventListener('click', (ev) => {
        // Action buttons handle their own clicks; ignore bubbles.
        if (ev.target.closest('.conv-actions')) return;
        loadConversation(c.id);
      });
      div.querySelector('.archive').addEventListener('click', async (ev) => {
        ev.stopPropagation();
        await api('/chats/' + c.id, {
          method: 'PATCH',
          body: JSON.stringify({ archived: !c.archived }),
        });
        if (c.id === currentConversationId && !c.archived) {
          // Archiving the open chat — return to a fresh blank state.
          currentConversationId = null;
          history.length = 0;
          logEl.innerHTML = '';
        }
        loadConversations();
      });
      div.querySelector('.delete').addEventListener('click', async (ev) => {
        ev.stopPropagation();
        if (!confirm(
          `Delete "${title}"?\n\n`
          + 'A short summary of this conversation will be kept in your '
          + "memory so the model still remembers the gist. The full chat "
          + 'transcript will be removed and cannot be recovered.'
        )) return;
        await api('/chats/' + c.id + '?keep_summary=true', { method: 'DELETE' });
        if (c.id === currentConversationId) {
          currentConversationId = null;
          history.length = 0;
          logEl.innerHTML = '';
        }
        loadConversations();
      });
      convListEl.appendChild(div);
    }

    // Wire the archived-view toggle once the page is set up.
    function _wireArchivedToggle() {
      const btn = document.getElementById('archived-toggle');
      if (!btn) return;
      btn.addEventListener('click', () => {
        convViewMode = convViewMode === 'archived' ? 'active' : 'archived';
        btn.classList.toggle('active', convViewMode === 'archived');
        btn.textContent = convViewMode === 'archived'
          ? '↩ Back to active'
          : '📦 Show archived';
        loadConversations();
      });
    }
    _wireArchivedToggle();

    async function loadConversation(convId) {
      // Pull the full message history for this conversation and
      // populate the chat log. Doesn't touch the model dropdown's
      // current selection — the scheduler decides whether the tier
      // is already resident and skips reload automatically.
      try {
        const r = await api('/chats/' + convId);
        if (!r.ok) return;
        const conv = await r.json();
        currentConversationId = conv.id;
        history.length = 0;
        logEl.innerHTML = '';
        for (const m of (conv.messages || [])) {
          if (m.role === 'user' || m.role === 'assistant') {
            history.push({ role: m.role, content: m.content });
            appendMsg(m.role, m.content, m.id);
          }
        }
        // Sync the dropdown to the conversation's tier if available.
        if (conv.tier) {
          const want = conv.tier.startsWith('tier.') ? conv.tier : 'tier.' + conv.tier;
          const opt = Array.from(modelEl.options).find(o => o.value === want && !o.disabled);
          if (opt) {
            modelEl.value = want;
            lastSelectedModel = want;
          }
        }
        // Refresh sidebar to mark the active item.
        loadConversations();
        updateCtxIndicator();
      } catch (_) {}
    }

    async function newConversation() {
      // Lazy-create on first send: just clear the local state. The
      // backend will create a row when the chat handler sees no
      // conversation_id but a signed-in user — see _finalize_conversation.
      currentConversationId = null;
      history.length = 0;
      logEl.innerHTML = '';
      Array.from(convListEl.querySelectorAll('.conv-item.active')).forEach(
        el => el.classList.remove('active')
      );
      updateCtxIndicator();
    }

    $('new-conv-btn').addEventListener('click', newConversation);

    // Pretty-name a tier id: "highest_quality" → "Highest quality"
    function tierLabel(id) {
      const stripped = id.replace(/^tier[._-]/i, '');
      return stripped.charAt(0).toUpperCase() + stripped.slice(1).replace(/_/g, ' ');
    }
    // Pull a clean model name out of an HF repo or filename:
    //   "bartowski/Qwen2.5-72B-Instruct-GGUF" → "Qwen2.5-72B-Instruct"
    //   "Qwen2.5-72B-Instruct-Q4_K_M.gguf"   → "Qwen2.5-72B-Instruct"
    function specificModel(info) {
      const repo = info && (info.repo || info.model_id);
      const file = info && info.filename;
      let s = '';
      if (repo) {
        s = repo.split('/').pop() || repo;
      } else if (file) {
        s = file;
      } else {
        return '';
      }
      return s
        .replace(/\.gguf$/i, '')
        .replace(/-?GGUF$/i, '')
        .replace(/[-_.]?Q[0-9]+(_K(_[A-Z]+)?|_[01])?$/i, '');
    }

    // ── Header indicators (VRAM + context window) ───────────────────
    // Per-tier context window in tokens; populated by loadModels() from
    // /v1/models. Used by updateCtxIndicator() to compute the "X / Y"
    // display.
    const tierContext = new Map();   // tier_id → context_window
    const vramStatEl = $('vram-stat');
    const vramValEl  = $('vram-val');
    const ctxStatEl  = $('ctx-stat');
    const ctxValEl   = $('ctx-val');

    function setStatLevel(el, frac) {
      // 0–0.7 normal (green), 0.7–0.9 warn (yellow), ≥0.9 crit (red).
      el.classList.remove('warn', 'crit');
      if (frac >= 0.9) el.classList.add('crit');
      else if (frac >= 0.7) el.classList.add('warn');
    }
    function setRing(statEl, frac) {
      // pathLength=100 means the dasharray is in percentages: a value
      // of N draws an arc covering N% of the circle. Clamp to [0,100]
      // so a runaway estimator doesn't render a broken arc.
      const fill = statEl.querySelector('.ring-fill');
      if (!fill) return;
      const pct = Math.max(0, Math.min(100, frac * 100));
      fill.setAttribute('stroke-dasharray', `${pct.toFixed(1)} ${(100 - pct).toFixed(1)}`);
    }
    function fmtTokens(n) {
      n = Math.round(n || 0);
      return n >= 1000 ? `${(n / 1000).toFixed(1)}k` : `${n}`;
    }
    function tierShortName(tierId) {
      // tier.versatile → Versatile. Falls back to the raw id.
      if (!tierId) return '';
      const stripped = String(tierId).replace(/^tier[._-]/i, '');
      return stripped.charAt(0).toUpperCase() + stripped.slice(1).replace(/_/g, ' ');
    }

    // Cache the most recent /vram payload so the popover can render
    // the per-tier breakdown without an extra round trip on hover.
    let lastVramSnapshot = null;

    function renderVramPopover() {
      const pop = document.getElementById('vram-popover');
      if (!pop) return;
      const v = lastVramSnapshot;
      if (!v || !(v.total_vram_gb > 0)) {
        pop.innerHTML = '<div class="empty">No GPU detected (CPU-only or driver missing).</div>';
        return;
      }
      const total = v.total_vram_gb;
      const free  = v.free_vram_gb_actual ?? v.free_vram_gb_projected ?? total;
      const used  = Math.max(0, total - free);
      let html = '<h4>VRAM</h4>';
      html += `<div class="row"><span class="k">Total</span><span class="v">${total.toFixed(1)} GB</span></div>`;
      html += `<div class="row"><span class="k">Used</span><span class="v">${used.toFixed(1)} GB</span></div>`;
      html += `<div class="row"><span class="k">Free</span><span class="v">${free.toFixed(1)} GB</span></div>`;
      const loaded = Array.isArray(v.loaded) ? v.loaded : [];
      if (loaded.length) {
        html += '<h4 style="margin-top:8px;">Loaded models</h4>';
        for (const m of loaded) {
          const cost = (m.observed_cost_gb && m.observed_cost_gb > 0)
            ? m.observed_cost_gb : (m.vram_cost_gb || 0);
          const tag  = tierShortName(m.tier_id);
          const refs = m.refcount > 0 ? ` (in use ×${m.refcount})` : '';
          html += `<div class="row"><span class="k">${escapeHtml(tag)}${refs}</span>`
                + `<span class="v">${cost.toFixed(1)} GB</span></div>`;
        }
      } else {
        html += '<div class="empty" style="margin-top:6px;">No models resident.</div>';
      }
      pop.innerHTML = html;
    }

    async function pollVram() {
      // Polls /vram every 15s. Backend's `free_vram_gb_actual` reads
      // NVML; falls back to projected when NVML isn't available.
      try {
        const r = await api('/vram');
        if (!r.ok) return;
        const v = await r.json();
        lastVramSnapshot = v;
        const total = v.total_vram_gb || 0;
        const free  = v.free_vram_gb_actual ?? v.free_vram_gb_projected ?? total;
        if (total <= 0) {
          vramValEl.textContent = 'n/a';
          setRing(vramStatEl, 0);
          renderVramPopover();
          return;
        }
        const used = Math.max(0, total - free);
        const frac = used / total;
        vramValEl.textContent = `${used.toFixed(1)} / ${total.toFixed(0)} GB`;
        setStatLevel(vramStatEl, frac);
        setRing(vramStatEl, frac);
        renderVramPopover();
        // Drive the model-loading progress bar from the residency
        // delta when a load is in flight.
        ModelLoading.observeFreeGb(free);
      } catch (_) {
        vramValEl.textContent = '—';
      }
    }

    function estimateTokens(text) {
      // Rough char→token estimate. Real tokenization varies per model
      // (Qwen ~3.5 chars/tok English, ~2 cn/jp); 4 char/tok is the
      // standard "good enough" approximation widely used by chat UIs.
      return Math.ceil((text || '').length / 4);
    }

    function updateCtxIndicator() {
      const ctx = tierContext.get(modelEl.value);
      const pop = document.getElementById('ctx-popover');
      if (!ctx) {
        ctxValEl.textContent = '—';
        setRing(ctxStatEl, 0);
        if (pop) pop.innerHTML = '<div class="empty">Pick a model to see its context-window usage.</div>';
        return;
      }
      const overheadPerTurn = 8;
      let userTok = 0, asstTok = 0, overheadTok = 0;
      for (const m of history) {
        const t = estimateTokens(m.content);
        if (m.role === 'user') userTok += t;
        else if (m.role === 'assistant') asstTok += t;
        overheadTok += overheadPerTurn;
      }
      const used = userTok + asstTok + overheadTok;
      const remaining = Math.max(0, ctx - used);
      const frac = used / ctx;
      ctxValEl.textContent = `${fmtTokens(used)} / ${fmtTokens(ctx)}`;
      setStatLevel(ctxStatEl, frac);
      setRing(ctxStatEl, frac);
      if (pop) {
        const tier = tierShortName(modelEl.value);
        let html = `<h4>Context window — ${escapeHtml(tier)}</h4>`;
        html += `<div class="row"><span class="k">Window size</span><span class="v">${fmtTokens(ctx)} tok</span></div>`;
        html += `<div class="row"><span class="k">Your messages</span><span class="v">${fmtTokens(userTok)} tok</span></div>`;
        html += `<div class="row"><span class="k">Model replies</span><span class="v">${fmtTokens(asstTok)} tok</span></div>`;
        html += `<div class="row"><span class="k">Template overhead</span><span class="v">${fmtTokens(overheadTok)} tok</span></div>`;
        html += `<div class="row total"><span class="k">Used</span><span class="v">${fmtTokens(used)} tok (${(frac*100).toFixed(0)}%)</span></div>`;
        html += `<div class="row"><span class="k">Remaining</span><span class="v">${fmtTokens(remaining)} tok</span></div>`;
        pop.innerHTML = html;
      }
    }

    // Wire popover open/close. Click on the .stat toggles the popover;
    // click outside closes any open popover. Tap-friendly on mobile
    // because there's no hover state on touchscreens.
    function wireStatPopover(stat) {
      stat.addEventListener('click', (e) => {
        e.stopPropagation();
        const wasOpen = stat.classList.contains('open');
        document.querySelectorAll('.stat.open').forEach(s => s.classList.remove('open'));
        if (!wasOpen) stat.classList.add('open');
      });
      stat.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); stat.click(); }
        if (e.key === 'Escape') stat.classList.remove('open');
      });
    }
    wireStatPopover(vramStatEl);
    wireStatPopover(ctxStatEl);
    document.addEventListener('click', () => {
      document.querySelectorAll('.stat.open').forEach(s => s.classList.remove('open'));
    });

    // ── Model loading progress bar ───────────────────────────────────
    // Driven by SSE events (tier.loading sets it, the first streamed
    // token clears it) and by VRAM polling (the free-GB drop during
    // load gives us a real "X of Y GB resident" signal). When no VRAM
    // delta is observable yet, fall back to a slow time-based estimate
    // so the bar still moves rather than sitting at 0%.
    const ModelLoading = (() => {
      const el = document.getElementById('model-loading');
      const fill = document.getElementById('ml-fill');
      const label = document.getElementById('ml-label');
      let startedAt = 0;
      let baselineFreeGb = null;
      let targetGb = 0;
      let tierId = null;
      let tickHandle = null;
      let active = false;

      function paint(frac) {
        const pct = Math.max(0, Math.min(1, frac)) * 100;
        fill.classList.remove('indeterminate');
        fill.style.width = pct.toFixed(1) + '%';
      }
      function tickTimeBased() {
        if (!active) return;
        // No usable VRAM delta yet — fade up to ~85% over the typical
        // 5-30s window. The remaining 15% is reserved for the actual
        // first-token confirmation.
        const elapsed = (Date.now() - startedAt) / 1000;
        // Asymptote at 0.85, half-life ~12s.
        const frac = 0.85 * (1 - Math.exp(-elapsed / 12));
        paint(frac);
      }
      return {
        start(evt) {
          // evt = {tier_id, model_tag, vram_estimate_gb?}
          active = true;
          tierId = evt && evt.tier_id || null;
          targetGb = (evt && evt.vram_estimate_gb) || 0;
          baselineFreeGb = (lastVramSnapshot
            && (lastVramSnapshot.free_vram_gb_actual
                ?? lastVramSnapshot.free_vram_gb_projected)) || null;
          startedAt = Date.now();
          const tag = (evt && (evt.model_tag || evt.tier_id)) || 'model';
          label.textContent = `Loading ${tag} into VRAM…`;
          el.classList.add('visible');
          fill.classList.add('indeterminate');
          fill.style.width = '';
          if (tickHandle) clearInterval(tickHandle);
          tickHandle = setInterval(tickTimeBased, 400);
          // Speed up VRAM polling while a load is in flight so the bar
          // tracks actual residency growth.
          pollVram();
        },
        observeFreeGb(freeGb) {
          if (!active || baselineFreeGb == null || !targetGb) return;
          const consumed = Math.max(0, baselineFreeGb - freeGb);
          // Cap at 0.95 so the user sees the bar finish at first-token.
          const frac = Math.min(0.95, consumed / targetGb);
          if (frac > 0.02) paint(frac);
        },
        finish() {
          if (!active) return;
          active = false;
          paint(1.0);
          if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
          // Brief 100% pause before hiding so the user sees completion.
          setTimeout(() => { el.classList.remove('visible'); paint(0); }, 350);
        },
        cancel() {
          active = false;
          if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
          el.classList.remove('visible'); paint(0);
        },
      };
    })();

    // Per-tier variant info from /v1/models, keyed by tier_id like "tier.coding".
    // Each value: {variants: [{id, name, available, vram_estimate_gb}], default: "30b"}.
    // Used by the variant selector beside the model dropdown.
    const tierVariants = new Map();
    const variantEl = $('model-variant');
    // User's chosen variant per tier (sticky across tier switches).
    // tier_id → variant_id. Undefined means "use the tier's default".
    const variantPick = new Map();

    function applyVariantSelector(tierId) {
      const meta = tierVariants.get(tierId);
      if (!meta || !meta.variants || meta.variants.length === 0) {
        variantEl.style.display = 'none';
        variantEl.innerHTML = '';
        return;
      }
      const previous = variantPick.get(tierId) || meta.default || meta.variants[0].id;
      variantEl.innerHTML = '';
      meta.variants.forEach(v => {
        const o = document.createElement('option');
        o.value = v.id;
        const label = v.name || v.id;
        if (v.available === false) {
          o.textContent = `${label} (downloading…)`;
          o.disabled = true;
        } else {
          o.textContent = label;
        }
        if (v.id === previous && !o.disabled) {
          o.selected = true;
        }
        variantEl.appendChild(o);
      });
      variantEl.style.display = '';
      variantPick.set(tierId, variantEl.value);
    }

    variantEl.addEventListener('change', () => {
      const tierId = modelEl.value;
      if (tierId) variantPick.set(tierId, variantEl.value);
    });

    async function loadModels() {
      // Fetch /v1/models for the available tier list and /resolved-models
      // for the per-tier specific model name + on-disk availability.
      // Labels render as "Category: Specific Model" with a "(downloading…)"
      // suffix on tiers whose GGUF isn't on disk yet — those options
      // are disabled so the user can't pick a tier that would 404.
      let resolved = {};
      try {
        const rr = await api('/resolved-models');
        if (rr.ok) {
          const j = await rr.json();
          resolved = j.tiers || {};
        }
      } catch (_) {}
      try {
        const r = await api('/v1/models');
        const { data } = await r.json();
        // Preserve the user's current selection across the 30-second
        // auto-refresh. Without this, switching browser tabs and
        // returning would silently snap the dropdown back to the first
        // tier in the list ("Highest quality") because innerHTML='' +
        // re-populate resets the value to the first option by default.
        const previousValue = modelEl.value;
        modelEl.innerHTML = '';
        let firstAvailableValue = null;
        let previousIsAvailable = false;
        tierContext.clear();
        tierVariants.clear();
        (data || []).forEach(m => {
          const o = document.createElement('option');
          o.value = m.id;
          // Stash per-tier context window so the CTX indicator can
          // show the right "X / Y" denominator even after a tier swap.
          if (m.context_window) tierContext.set(m.id, m.context_window);
          // Stash per-tier variant choices for the secondary dropdown.
          if (Array.isArray(m.variants) && m.variants.length > 0) {
            tierVariants.set(m.id, {
              variants: m.variants,
              default: m.default_variant || (m.variants[0] && m.variants[0].id),
            });
          }
          const key = m.id.replace(/^tier\./, '');
          const info = resolved[key] || resolved[m.id] || {};
          const cat = tierLabel(key);
          const model = specificModel(info);
          const base = model ? `${cat}: ${model}` : cat;
          // info.available is true only when the GGUF file exists on
          // disk. Until the resolver finishes pulling, it's false.
          if (info.available === false) {
            o.textContent = `${base}  (downloading…)`;
            o.disabled = true;
          } else {
            o.textContent = base;
            if (firstAvailableValue === null) firstAvailableValue = m.id;
            if (m.id === previousValue) previousIsAvailable = true;
          }
          modelEl.appendChild(o);
        });
        if (previousValue && previousIsAvailable) {
          // Re-apply the user's previous selection if it's still
          // available. Updates lastSelectedModel below stays in sync.
          modelEl.value = previousValue;
        } else if (firstAvailableValue !== null) {
          // Default-select the first usable tier on first load (or if
          // the previously selected tier became unavailable mid-flight).
          modelEl.value = firstAvailableValue;
        }
        lastSelectedModel = modelEl.value;
        applyVariantSelector(modelEl.value);
        updateCtxIndicator();
      } catch (_) {}
    }

    // Tracks the last tier the user actively chose (or the page's
    // default seed). Used by the change-handler to detect mid-chat
    // tier swaps and to revert if the user cancels the confirm dialog.
    let lastSelectedModel = null;
    modelEl.addEventListener('change', () => {
      const newVal = modelEl.value;
      if (history.length > 0 && lastSelectedModel && lastSelectedModel !== newVal) {
        // The user is mid-conversation. Switching tiers cold-spawns
        // a different llama-server (loading a multi-GB model into
        // VRAM ≈ 5–30s for fast/versatile, much longer for the 72B
        // and 80B-A3B tiers). Warn them so they don't think the
        // first reply after the swap is hung.
        const ok = window.confirm(
          "Switching models mid-conversation will load a different model into VRAM. " +
          "The next reply may take 5–30 seconds for small tiers, longer for 72B / 80B-A3B " +
          "(and unloads whatever was previously resident).\n\n" +
          "Continue with the switch?"
        );
        if (!ok) {
          modelEl.value = lastSelectedModel;
          return;
        }
      }
      lastSelectedModel = newVal;
      // Re-render the variant sub-selector for the newly-picked tier.
      applyVariantSelector(newVal);
    });

    // Refresh the tier list every 30 s so download-completed tiers
    // light up without a full page reload. Cheap GET — no streaming.
    setInterval(() => { if (!app.classList.contains('hidden')) loadModels(); }, 30000);

    // Poll VRAM every 15 s. Cheap; just reads scheduler.status() in-memory.
    setInterval(() => { if (!app.classList.contains('hidden')) pollVram(); }, 15000);

    // ── Refresh-aware health monitor ─────────────────────────────────
    // /healthz fails when the backend is restarting (post-merge hook
    // bouncing the stack after a `git pull`). Surface a banner with an
    // ETA so users don't think the chat is dead. Restarts typically take
    // 15–30s; if it's still down past 60s we soften the message rather
    // than promising recovery that may not come.
    const RefreshMonitor = (() => {
      const banner = document.getElementById('refresh-banner');
      const msgEl = document.getElementById('refresh-banner-msg');
      const HEARTBEAT_MS = 30000;     // baseline ping when we think we're up
      const OUTAGE_POLL_MS = 2000;    // tight poll while we believe we're down
      let outageStartMs = null;
      let outageHandle = null;
      let heartbeatHandle = null;

      function setMessage(html) { msgEl.innerHTML = html; }

      function show(html) {
        setMessage(html);
        banner.classList.add('visible');
      }

      function hide() {
        banner.classList.remove('visible');
      }

      async function probe() {
        try {
          const r = await fetch('/healthz', {
            method: 'GET', cache: 'no-store',
            // AbortSignal.timeout isn't on every browser yet; fall back
            // to no timeout when missing (the fetch will resolve fast or
            // reject on its own).
            signal: typeof AbortSignal?.timeout === 'function'
              ? AbortSignal.timeout(2500) : undefined,
          });
          return r.ok;
        } catch (_) {
          return false;
        }
      }

      function elapsedSec() {
        return outageStartMs ? Math.round((Date.now() - outageStartMs) / 1000) : 0;
      }

      function renderOutageMessage() {
        const e = elapsedSec();
        if (e < 5) {
          return '— checking<span class="dots"></span>';
        }
        if (e < 35) {
          const eta = Math.max(0, 30 - e);
          return `is refreshing (typical: 15–30s). Resuming in ~${eta}s<span class="dots"></span>`;
        }
        if (e < 90) {
          return `has been unreachable for ${e}s. Still trying<span class="dots"></span>`;
        }
        return `has been down for ${e}s — may need operator attention. Still polling<span class="dots"></span>`;
      }

      async function outageTick() {
        const ok = await probe();
        if (ok) {
          outageStartMs = null;
          if (outageHandle) { clearInterval(outageHandle); outageHandle = null; }
          hide();
          startHeartbeat();
          return;
        }
        show(renderOutageMessage());
      }

      async function heartbeatTick() {
        const ok = await probe();
        if (!ok) reportOutage();
      }

      function startHeartbeat() {
        if (heartbeatHandle) clearInterval(heartbeatHandle);
        heartbeatHandle = setInterval(heartbeatTick, HEARTBEAT_MS);
      }

      function reportOutage() {
        if (outageStartMs) return;
        if (heartbeatHandle) { clearInterval(heartbeatHandle); heartbeatHandle = null; }
        outageStartMs = Date.now();
        show('— checking<span class="dots"></span>');
        outageTick();
        outageHandle = setInterval(outageTick, OUTAGE_POLL_MS);
      }

      startHeartbeat();
      return { reportOutage };
    })();

    // Update the CTX indicator on tier change too — different tier
    // means a different denominator. (mid-chat swap is rare but the
    // bar should reflect reality immediately when it happens.)
    modelEl.addEventListener('change', updateCtxIndicator);

    // ── Tools popover ─────────────────────────────────────────────────
    const toolsBtn = $('tools-btn');
    const toolsPop = $('tools-popover');
    const toolsList = $('tools-list');
    const toolsCount = $('tools-count');
    const toolSearch = $('tool-search');
    const toolState = new Map();   // name → enabled (boolean)
    let toolsTaxonomy = [];        // [{tier, title, groups: [{group, title, subgroups: [{subgroup, title, tools}]}]}]

    // Surfaces a human-readable error inside the tools popover instead
    // of leaving it visually empty when /tools fails. The previous
    // behaviour ("silent return on !r.ok") looked identical to a real
    // empty registry on the user's side, so the dropdown just looked
    // broken on every host where /tools was 403'd or 500'd.
    function renderToolsError(msg) {
      toolsList.innerHTML =
        '<div class="tool-row" style="padding-left:8px;color:var(--danger);'
        + 'white-space:normal;line-height:1.4;">'
        + escapeHtml(msg) + '</div>';
    }

    let _toolsRetryTimer = null;

    async function loadTools(attempt = 0) {
      // Default every tool to OFF. Auto-enabling default-enabled tools
      // pushes the request body past llama-server's per-slot context
      // window once the registry has 200+ entries (28k+ tokens of
      // schemas alone). The 🔧 popover is the explicit opt-in surface;
      // the user toggles only what they need for that turn.
      let r;
      try {
        r = await api('/tools');
      } catch (e) {
        // Network-level failure (offline, DNS, CORS preflight reject).
        // Schedule one retry — the chat UI's first paint can race the
        // backend lifespan during a refresh-after-pull.
        renderToolsError('Could not reach /tools: ' + String(e)
          + (attempt < 2 ? ' — retrying…' : ''));
        if (attempt < 2) {
          clearTimeout(_toolsRetryTimer);
          _toolsRetryTimer = setTimeout(() => loadTools(attempt + 1),
            (attempt + 1) * 2000);
        }
        return;
      }
      if (!r.ok) {
        // Most common cases: 403 from HostGate (CHAT_HOSTNAME mismatch)
        // and 500 from a not-yet-initialised state.tools (lifespan
        // race). Surface the status so the user can self-diagnose
        // instead of staring at a blank popover.
        let detail = '';
        try { detail = (await r.text()).slice(0, 200); } catch (_) {}
        renderToolsError(`Failed to load tools (${r.status}): ${detail}`
          + (attempt < 2 ? ' — retrying…' : ''));
        if (r.status >= 500 && attempt < 2) {
          clearTimeout(_toolsRetryTimer);
          _toolsRetryTimer = setTimeout(() => loadTools(attempt + 1),
            (attempt + 1) * 2000);
        }
        return;
      }
      try {
        const j = await r.json();
        toolState.clear();
        (j.data || []).forEach(t => {
          toolState.set(t.name, false);
        });
        toolsTaxonomy = j.groups || [];
        // Restore the user's persisted enabled-tool set from server-side
        // preferences, so toggles survive page reloads / new chats /
        // sign-out + sign-in. Falls through silently when not signed in.
        try {
          const pr = await api('/me/preferences');
          if (pr.ok) {
            const data = await pr.json();
            const enabled = (data.preferences && data.preferences.enabled_tools) || [];
            enabled.forEach(name => {
              if (toolState.has(name)) toolState.set(name, true);
            });
            // Restore the preload-all-tools master switch state.
            preloadAllTools = !!(data.preferences && data.preferences.preload_all_tools);
          }
        } catch (_) {}
        applyPreloadAllUI();
        updateToolsCount();
        renderTools();
      } catch (e) {
        renderToolsError('Tool registry response was malformed: ' + String(e));
      }
    }

    // Debounced PATCH to persist toggle state. Bounces rapid bulk-
    // toggles (group/tier headers flip many at once) into one round
    // trip rather than hammering the API.
    let _prefSaveTimer = null;
    function persistToolPrefs() {
      clearTimeout(_prefSaveTimer);
      _prefSaveTimer = setTimeout(async () => {
        const enabled = [];
        toolState.forEach((on, name) => { if (on) enabled.push(name); });
        try {
          await api('/me/preferences', {
            method: 'PATCH',
            body: JSON.stringify({ enabled_tools: enabled }),
          });
        } catch (_) {}
      }, 400);
    }

    // True if any descendant tool name passes the current search filter.
    function nodeMatches(toolNames, query) {
      if (!query) return true;
      return toolNames.some(n => n.toLowerCase().includes(query));
    }

    // Three-state aggregation: 'all' | 'some' | 'none'.
    function aggState(toolNames) {
      let on = 0;
      toolNames.forEach(n => { if (toolState.get(n)) on++; });
      if (on === 0) return 'none';
      if (on === toolNames.length) return 'all';
      return 'some';
    }

    function setMany(names, enabled) {
      names.forEach(n => toolState.set(n, enabled));
      updateToolsCount();
      renderTools();   // Re-render so master toggles update.
      persistToolPrefs();
    }

    function makeHeader(cls, title, toolNames, level) {
      const wrap = document.createElement('div');
      wrap.className = cls;
      const state = aggState(toolNames);
      wrap.innerHTML = `
        <span class="caret">▾</span>
        <span class="header-title">${escapeHtml(title)}</span>
        <span class="header-count">${toolNames.length}</span>
        <span class="toggle header-toggle"><input type="checkbox"><span class="slider"></span></span>
      `;
      const cb = wrap.querySelector('input');
      cb.checked = state === 'all';
      cb.indeterminate = state === 'some';
      cb.addEventListener('click', (e) => {
        e.stopPropagation();
        setMany(toolNames, cb.checked);
      });
      return wrap;
    }

    function renderTools() {
      const q = (toolSearch.value || '').toLowerCase();
      toolsList.innerHTML = '';

      if (toolsTaxonomy.length === 0) {
        toolsList.innerHTML = '<div class="tool-row" style="padding-left:2px;color:var(--muted);">No tools registered.</div>';
        return;
      }

      toolsTaxonomy.forEach(tier => {
        const tierTools = tier.groups.flatMap(g => g.subgroups.flatMap(s => s.tools));
        if (!nodeMatches(tierTools, q)) return;

        const tierBlock = document.createElement('div');
        tierBlock.className = 'tier-block';
        const tierHeader = makeHeader('tier-header', tier.title, tierTools, 0);
        const tierBody = document.createElement('div');
        tierBody.className = 'tier-body';
        tierHeader.addEventListener('click', () => {
          tierBody.classList.toggle('hidden');
          tierHeader.classList.toggle('collapsed');
        });
        tierBlock.appendChild(tierHeader);
        tierBlock.appendChild(tierBody);

        tier.groups.forEach(group => {
          const groupTools = group.subgroups.flatMap(s => s.tools);
          if (!nodeMatches(groupTools, q)) return;

          const groupHeader = makeHeader('group-header', group.title, groupTools, 1);
          const groupBody = document.createElement('div');
          groupBody.className = 'group-body';
          groupHeader.addEventListener('click', () => {
            groupBody.classList.toggle('hidden');
            groupHeader.classList.toggle('collapsed');
          });
          tierBody.appendChild(groupHeader);
          tierBody.appendChild(groupBody);

          group.subgroups.forEach(sub => {
            if (!nodeMatches(sub.tools, q)) return;

            const subHeader = makeHeader('subgroup-header', sub.title, sub.tools, 2);
            const subBody = document.createElement('div');
            subBody.className = 'subgroup-body';
            subHeader.addEventListener('click', () => {
              subBody.classList.toggle('hidden');
              subHeader.classList.toggle('collapsed');
            });
            groupBody.appendChild(subHeader);
            groupBody.appendChild(subBody);

            sub.tools.forEach(name => {
              if (q && !name.toLowerCase().includes(q)) return;
              const row = document.createElement('div');
              row.className = 'tool-row';
              const enabled = !!toolState.get(name);
              row.innerHTML = `
                <label for="tool-${cssId(name)}" title="${escapeHtml(name)}">${escapeHtml(name)}</label>
                <span class="toggle"><input type="checkbox" id="tool-${cssId(name)}" ${enabled ? 'checked' : ''}><span class="slider"></span></span>
              `;
              const cb = row.querySelector('input');
              cb.addEventListener('change', () => {
                toolState.set(name, cb.checked);
                renderTools();
                persistToolPrefs();
              });
              subBody.appendChild(row);
            });
          });
        });
      });

      updateToolsCount();
    }
    function cssId(s) { return s.replace(/[^a-zA-Z0-9_-]/g, '_'); }
    function updateToolsCount() {
      let n = 0; toolState.forEach(v => { if (v) n++; });
      toolsCount.textContent = n ? `(${n})` : '';
    }

    // ── "Preload all tools" master switch ────────────────────────────
    // When ON, every registered tool name is sent to the model on
    // every turn — independent of which checkboxes the user toggled
    // below. Useful for "I'm not sure which tool fits, let the model
    // pick" mode, at the cost of a much fatter request body. Persisted
    // in /me/preferences so it survives page reloads.
    let preloadAllTools = false;
    const preloadAllEl = $('preload-all');
    const preloadHintEl = $('preload-hint');
    const preloadRowEl = preloadAllEl && preloadAllEl.closest('.preload-row');

    function applyPreloadAllUI() {
      preloadAllEl.checked = preloadAllTools;
      if (preloadRowEl) preloadRowEl.classList.toggle('on', preloadAllTools);
      if (preloadHintEl) {
        preloadHintEl.textContent = preloadAllTools
          ? `On — all ${toolState.size} registered tools will be sent to the model every turn.`
          : 'Off — only tools you toggle below are sent to the model.';
      }
    }

    async function setPreloadAll(on) {
      preloadAllTools = !!on;
      applyPreloadAllUI();
      try {
        await api('/me/preferences', {
          method: 'PATCH',
          body: JSON.stringify({ preload_all_tools: preloadAllTools }),
        });
      } catch (_) {}
    }

    if (preloadAllEl) {
      preloadAllEl.addEventListener('change', () => setPreloadAll(preloadAllEl.checked));
    }

    toolsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toolsPop.classList.toggle('hidden');
    });
    toolSearch.addEventListener('input', renderTools);
    document.addEventListener('click', (e) => {
      if (!toolsPop.contains(e.target) && e.target !== toolsBtn) {
        toolsPop.classList.add('hidden');
      }
    });

    // ── Attach files ─────────────────────────────────────────────────
    const attachBtn = $('attach-btn');
    const attachInput = $('attach-input');
    const attachedList = $('attached-list');
    const attached = [];   // [{name, size, file}]

    attachBtn.addEventListener('click', () => attachInput.click());
    attachInput.addEventListener('change', () => {
      for (const f of attachInput.files) {
        attached.push({ name: f.name, size: f.size, file: f });
      }
      attachInput.value = '';
      renderAttached();
    });
    function renderAttached() {
      attachedList.innerHTML = '';
      attached.forEach((a, i) => {
        const c = document.createElement('span');
        c.className = 'chip';
        c.innerHTML = `${escapeHtml(a.name)} <span class="x" data-i="${i}">×</span>`;
        c.querySelector('.x').addEventListener('click', () => {
          attached.splice(i, 1);
          renderAttached();
        });
        attachedList.appendChild(c);
      });
    }

    function appendMsg(role, text, msgId) {
      const box = document.createElement('div');
      box.className = 'msg ' + role;
      if (msgId != null) box.dataset.msgId = String(msgId);
      let actions = '';
      // Only user turns get the edit affordance — editing an assistant
      // reply doesn't have well-defined semantics in a generative chat
      // (the "rewind to here and rerun the model" flow only makes sense
      // when the user is changing their own input).
      if (role === 'user') {
        actions = '<div class="msg-actions"><button class="edit-btn" type="button" title="Edit and resend">✎ Edit</button></div>';
      }
      box.innerHTML = `<div class="role">${role}</div>${actions}<div class="body">${renderMarkdown(text)}</div>`;
      logEl.appendChild(box);
      const editBtn = box.querySelector('.edit-btn');
      if (editBtn) editBtn.addEventListener('click', () => beginEditMessage(box, text));
      logEl.scrollTop = logEl.scrollHeight;
      return box.querySelector('.body');
    }

    // ── Edit & rewind ────────────────────────────────────────────────
    // Swap a user message for a textarea. Saving truncates the
