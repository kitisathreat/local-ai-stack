services:
  # ── Local AI Stack backend — tier router, VRAM scheduler, multi-agent ─────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lai-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - LLAMACPP_URL=http://llama-server:8001/v1
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    depends_on:
      - ollama
      # llama-server is optional; scheduler handles unavailability
    restart: unless-stopped

  # ── Open WebUI — chat UI (Phase 1: still used; replaced in Phase 4) ───────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - WEBUI_AUTH=False

      # ── Backend is the single OpenAI-compatible endpoint ──────────────────────
      - OPENAI_API_BASE_URLS=http://backend:8000/v1
      - OPENAI_API_KEYS=local-ai-stack

      # ── Ollama listed directly so raw-tag access is available to admins ───────
      - OLLAMA_BASE_URL=http://ollama:11434

      # ── Vector database ───────────────────────────────────────────────────────
      - VECTOR_DB=qdrant
      - QDRANT_URL=http://qdrant:6333

      # ── Embeddings via Ollama (no longer depends on LM Studio) ────────────────
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text

      # ── Web search ────────────────────────────────────────────────────────────
      - ENABLE_RAG_WEB_SEARCH=True
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
      - RAG_WEB_SEARCH_RESULT_COUNT=5
      - RAG_WEB_SEARCH_CONCURRENT_REQUESTS=10

      # ── Code interpreter: Jupyter ─────────────────────────────────────────────
      - CODE_EXECUTION_ENGINE=jupyter
      - CODE_EXECUTION_JUPYTER_URL=http://jupyter:8888
      - CODE_EXECUTION_JUPYTER_AUTH=token
      - CODE_EXECUTION_JUPYTER_AUTH_TOKEN=local-ai-stack-token

      # ── Misc ──────────────────────────────────────────────────────────────────
      - ENABLE_IMAGE_GENERATION=False
      - ENABLE_COMMUNITY_SHARING=False
      - ENABLE_MESSAGE_RATING=True
      - DEFAULT_MODELS=tier.versatile
    restart: always
    depends_on:
      - backend
      - jupyter
      - qdrant
      - searxng

  # ── Ollama — primary inference backend ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-3}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-3}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: always

  # ── llama.cpp server — Vision tier (Qwen3.6 35B + mmproj) ─────────────────────
  #
  # Requires the vision GGUF + mmproj files in ./models/. Download via
  # scripts/setup-models.sh. Service stays idle (failed-start) if files are
  # missing — the backend's VRAM scheduler won't route to it in that case.
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    ports:
      - "8001:8001"
    volumes:
      - ./models:/models:ro
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "-m"
      - "/models/qwen3.6-35b-a3b-Q4_K_M.gguf"
      - "--mmproj"
      - "/models/mmproj-qwen3.6-35b-F16.gguf"
      - "-c"
      - "16384"
      - "-ngl"
      - "999"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: unless-stopped

  # ── Jupyter: code interpreter ─────────────────────────────────────────────────
  jupyter:
    image: quay.io/jupyter/scipy-notebook:latest
    container_name: jupyter
    environment:
      - JUPYTER_TOKEN=local-ai-stack-token
      - JUPYTER_ENABLE_LAB=yes
    volumes:
      - jupyter-data:/home/jovyan/work
    ports:
      - "8888:8888"
    restart: always

  # ── Qdrant: vector database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: always

  # ── SearXNG: meta-search engine for web search tools ──────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "4000:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:4000
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: always

  # ── n8n: optional workflow automation ────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=http://localhost:5678
      - N8N_RUNNERS_ENABLED=true
    restart: always

volumes:
  open-webui:
  jupyter-data:
  qdrant-data:
  ollama-data:
  n8n-data:
