services:
  # ── FastAPI backend — tier router, VRAM scheduler, multi-agent, auth ─────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lai-backend
    expose:
      - "8000"
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - LLAMACPP_URL=http://llama-server:8001/v1
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:3000}
      # ── Auth secrets — set via .env.local (see .env.example) ──────────────────
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY}
      # Optional: separate KEK for the encrypted chat-history store. When
      # unset, history_store.py falls back to AUTH_SECRET_KEY. Set this
      # explicitly if you want to rotate session keys without invalidating
      # existing encrypted history files.
      - HISTORY_SECRET_KEY=${HISTORY_SECRET_KEY:-}
      - AUTH_EMAIL_FROM=${AUTH_EMAIL_FROM:-noreply@localaistack.local}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_STARTTLS=${SMTP_STARTTLS:-true}
      # ── Concurrency — multi-worker + cross-worker Redis coordination ──────────
      # BACKEND_WORKERS controls Uvicorn's --workers flag. Each worker runs its
      # own asyncio event loop; rate limiting is shared through REDIS_URL. If
      # REDIS_URL is unset or the redis service is unreachable, the rate
      # limiter falls back to per-worker in-memory counters.
      - BACKEND_WORKERS=${BACKEND_WORKERS:-1}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    depends_on:
      ollama:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis — cross-worker rate-limit counters (optional but recommended) ──────
  # Ship as an always-on service so the default multi-worker config (set
  # BACKEND_WORKERS > 1 in .env.local) Just Works. Disable by unsetting
  # REDIS_URL in the backend service and removing the depends_on entry.
  redis:
    image: redis:7-alpine
    container_name: lai-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Frontend (static Preact bundle served by nginx) ──────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Cloudflare Tunnel — public HTTPS access without opening router ports ─────
  # Users run `bash scripts/setup-cloudflared.sh` once to provision a tunnel.
  # When CLOUDFLARE_TUNNEL_TOKEN is unset, docker compose skips the service so
  # local-only users aren't forced to set up Cloudflare.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: lai-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN in .env.local or omit this service}
    depends_on:
      - frontend
    restart: unless-stopped
    profiles:
      - public                          # opt-in: `docker compose --profile public up`

  # ── Ollama — primary inference backend ────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-3}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-3}
      # Flash Attention 2: faster prefill + reduced KV-cache VRAM on Ampere+.
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: always

  # ── llama.cpp server — Vision tier (Qwen3.6 35B + mmproj) ─────────────────────
  #
  # Requires the vision GGUF + mmproj files in ./models/. Download via
  # scripts/setup-models.sh. Service stays idle (failed-start) if files are
  # missing — the backend's VRAM scheduler won't route to it in that case.
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    ports:
      - "8001:8001"
    volumes:
      - ./models:/models:ro
    # NOTE: -c is the *total* KV budget; --parallel splits it into slots, so
    # each concurrent user gets (c / parallel) tokens. Keep --parallel in
    # sync with tiers.vision.parallel_slots in config/models.yaml.
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8001"
      - "-m"
      - "/models/qwen3.6-35b-a3b-Q4_K_M.gguf"
      - "--mmproj"
      - "/models/mmproj-qwen3.6-35b-F16.gguf"
      - "-c"
      - "16384"
      - "--parallel"
      - "2"
      - "-ngl"
      - "999"
      # Flash Attention 2: faster attention + lower VRAM on CUDA builds.
      - "--flash-attn"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: unless-stopped

  # ── Jupyter: code interpreter ─────────────────────────────────────────────────
  # pytorch-notebook is a superset of scipy-notebook: it includes NumPy, SciPy,
  # Matplotlib, etc., plus PyTorch. With the NVIDIA device reservation below,
  # PyTorch (and any other CUDA library installed at runtime) can use the GPU
  # directly — enabling GPU-accelerated ML/DL workloads inside notebooks.
  jupyter:
    image: quay.io/jupyter/pytorch-notebook:latest
    container_name: jupyter
    environment:
      - JUPYTER_TOKEN=local-ai-stack-token
      - JUPYTER_ENABLE_LAB=yes
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - jupyter-data:/home/jovyan/work
    ports:
      - "8888:8888"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: always

  # ── Qdrant: vector database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: always

  # ── SearXNG: meta-search engine for web search tools ──────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "4000:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:4000
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: always

  # ── n8n: optional workflow automation ────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=http://localhost:5678
      - N8N_RUNNERS_ENABLED=true
    restart: always

volumes:
  jupyter-data:
  qdrant-data:
  ollama-data:
  n8n-data:
  redis-data:
