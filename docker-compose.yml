services:
  # ── Custom chat UI ───────────────────────────────────────────────────────────
  web:
    build: ./web
    container_name: web
    depends_on:
      - api
    environment:
      - API_URL=http://api:8787
    expose:
      - "3001"
    ports:
      - "3001:3001"
    restart: always

  # ── Chat API: routes chats, stores sqlite, streams telemetry ────────────────
  api:
    build: ./api
    container_name: api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - api-data:/app/data
      - ./config:/app/config:ro
    environment:
      - PORT=8787
      - DB_PATH=/app/data/local-ai-stack.db
      - UPLOAD_DIR=/app/data/uploads
      - MODELS_YAML=/app/config/models.yaml
      - LMSTUDIO_URL=http://host.docker.internal:1234/v1
      - GPU_AGENT_URL=http://host.docker.internal:8788/
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN:-}
      - CF_ACCESS_AUD=${CF_ACCESS_AUD:-}
      - DEV_TRUSTED_EMAIL=${DEV_TRUSTED_EMAIL:-}
    expose:
      - "8787"
    ports:
      - "8787:8787"
    depends_on:
      - qdrant
    restart: always

  # ── Cloudflare Tunnel: public URL with Access magic-link auth ───────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflare:/etc/cloudflared:ro
      - cloudflared-data:/home/nonroot/.cloudflared
    depends_on:
      - web
      - api
    restart: always

  # ── Jupyter: code execution for assistant ────────────────────────────────────
  jupyter:
    image: quay.io/jupyter/scipy-notebook:latest
    container_name: jupyter
    environment:
      - JUPYTER_TOKEN=local-ai-stack-token
      - JUPYTER_ENABLE_LAB=yes
    volumes:
      - jupyter-data:/home/jovyan/work
    expose:
      - "8888"
    restart: always

  # ── Pipelines: function-calling, filters, RAG pipelines ──────────────────────
  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: pipelines
    ports:
      - "9099:9099"
    volumes:
      - pipelines-data:/app/pipelines
      - ./pipelines:/app/pipelines/custom:ro
    environment:
      - PIPELINES_API_KEY=0p3n-w3bu!
    restart: always

  # ── Qdrant: vector database for RAG ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: always

  # ── SearXNG: self-hosted meta-search (web search for the assistant) ─────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "4000:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:4000
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: always

  # ── Ollama: fallback local model hub ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: always

  # ── n8n: low-code workflow automation ────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=http://localhost:5678
      - N8N_RUNNERS_ENABLED=true
    restart: always

volumes:
  api-data:
  jupyter-data:
  pipelines-data:
  qdrant-data:
  ollama-data:
  n8n-data:
  cloudflared-data:
