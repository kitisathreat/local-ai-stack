# Ollama Model Registry
# Models pulled via: .\scripts\setup-ollama-models.ps1
# Browse all available models at: https://ollama.com/library
#
# Ollama runs at: http://localhost:11434
# Open WebUI connects automatically via OLLAMA_BASE_URL

# Models to auto-pull on setup (name: pull tag)
auto_pull:
  # ── Tier models (required by backend/config/models.yaml) ────────────────
  - qwen3:72b-q3_k_m                                       # Highest Quality tier
  - qwen3.6:35b-a3b                                        # Versatile tier (orchestrator)
  - qwen3.5:9b                                             # Fast tier (parallel workers)
  - qwen2.5-coder:32b                                      # Coding tier fallback
  # - hf.co/bartowski/Qwen_Qwen3-Next-80B-A3B-Thinking-GGUF:Q4_K_XL  # Coding tier primary
  #   Uncomment when available. Pulled on-demand by the scheduler otherwise.

  # ── Supporting ──────────────────────────────────────────────────────────
  - nomic-embed-text                                       # RAG embeddings

# Full model catalog (for reference / manual pull)
models:
  # ── Qwen3 family — the 5 backend tiers ───────────────────────────────────────
  qwen3-72b:
    tag: "qwen3:72b-q3_k_m"
    description: "Qwen3 72B dense @ Q3_K_M — Highest Quality tier. ~15-20 t/s with RAM spillover."
    size_gb: 33.0
    use_case: "Hardest reasoning, multi-step problems, nuanced long-form output"

  qwen36-35b-a3b:
    tag: "qwen3.6:35b-a3b"
    description: "Qwen3.6 35B-A3B MoE (3B active) — Versatile tier / multi-agent orchestrator."
    size_gb: 21.0
    use_case: "Default chat, planning, synthesis, general reasoning at ~120 t/s"

  qwen35-9b:
    tag: "qwen3.5:9b"
    description: "Qwen3.5 9B dense — Fast tier. Fits 3× in 24GB for parallel workers."
    size_gb: 7.0
    use_case: "Quick responses, parallel subtask workers in multi-agent mode"

  qwen3-coder-next:
    tag: "hf.co/bartowski/Qwen_Qwen3-Next-80B-A3B-Thinking-GGUF:Q4_K_XL"
    description: "Qwen3-Coder-Next 80B-A3B — Coding tier primary. 71.3% SWE-bench Verified."
    size_gb: 48.5
    use_case: "Repository-level coding, SWE-bench-style tasks, native tool calling"

  qwen25-coder-32b:
    tag: "qwen2.5-coder:32b"
    description: "Qwen2.5 Coder 32B — Coding tier fallback. Fully GPU-offloaded at Q4."
    size_gb: 19.0
    use_case: "Code generation, review, debugging when Coder-Next unavailable"

  # ── General Purpose ──────────────────────────────────────────────────────────
  llama3.2:
    tag: "llama3.2:3b"
    description: "Meta Llama 3.2 3B — lightweight, fast, strong instruction following"
    size_gb: 2.0
    use_case: "Quick chat, drafting, summarization"

  llama3.2-vision:
    tag: "llama3.2-vision:11b"
    description: "Meta Llama 3.2 Vision 11B — multimodal image + text understanding"
    size_gb: 7.9
    use_case: "Image analysis, visual Q&A, document OCR"

  phi4-mini:
    tag: "phi4-mini:latest"
    description: "Microsoft Phi-4 Mini — highly efficient small model"
    size_gb: 2.5
    use_case: "Fast responses, mobile-friendly workloads"

  phi4:
    tag: "phi4:14b"
    description: "Microsoft Phi-4 14B — strong reasoning in smaller footprint"
    size_gb: 8.9
    use_case: "Reasoning, math, science"

  mistral:
    tag: "mistral:7b"
    description: "Mistral 7B — balanced speed and capability"
    size_gb: 4.1
    use_case: "General assistant, writing, analysis"

  mistral-nemo:
    tag: "mistral-nemo:12b"
    description: "Mistral NeMo 12B — extended context, strong multilingual"
    size_gb: 7.1
    use_case: "Long documents, multilingual tasks"

  # ── Coding ───────────────────────────────────────────────────────────────────
  codellama:
    tag: "codellama:7b"
    description: "Meta Code Llama 7B — code generation and completion"
    size_gb: 3.8
    use_case: "Code generation, debugging, refactoring"

  deepseek-coder-v2:
    tag: "deepseek-coder-v2:16b"
    description: "DeepSeek Coder V2 16B MoE — state-of-the-art coding"
    size_gb: 8.9
    use_case: "Advanced code generation, multi-language support"

  qwen2.5-coder:
    tag: "qwen2.5-coder:7b"
    description: "Qwen 2.5 Coder 7B — strong coding with tool use"
    size_gb: 4.7
    use_case: "Code completion, code review, debugging"

  # ── Vision / Multimodal ───────────────────────────────────────────────────────
  llava:
    tag: "llava:7b"
    description: "LLaVA 7B — vision-language model for image understanding"
    size_gb: 4.5
    use_case: "Image captioning, visual Q&A, chart reading"

  llava-llama3:
    tag: "llava-llama3:8b"
    description: "LLaVA on Llama 3 8B — improved multimodal reasoning"
    size_gb: 5.5
    use_case: "Advanced image analysis, document understanding"

  moondream:
    tag: "moondream:1.8b"
    description: "Moondream 1.8B — tiny but capable vision model"
    size_gb: 1.1
    use_case: "Fast image descriptions, edge device use"

  # ── Embeddings (for RAG) ──────────────────────────────────────────────────────
  nomic-embed-text:
    tag: "nomic-embed-text:latest"
    description: "Nomic Embed Text — high-quality text embeddings for RAG"
    size_gb: 0.3
    use_case: "Document embedding, semantic search, RAG"

  mxbai-embed-large:
    tag: "mxbai-embed-large:latest"
    description: "MixedBread AI Large Embedding — state-of-the-art retrieval"
    size_gb: 0.7
    use_case: "High-accuracy semantic search and RAG"

  # ── Specialized ───────────────────────────────────────────────────────────────
  gemma3:
    tag: "gemma3:4b"
    description: "Google Gemma 3 4B — strong multilingual and reasoning"
    size_gb: 3.3
    use_case: "Multilingual tasks, structured output, Q&A"

  gemma3:12b:
    tag: "gemma3:12b"
    description: "Google Gemma 3 12B — higher capability version"
    size_gb: 8.1
    use_case: "Complex reasoning, research assistance"

  orca-mini:
    tag: "orca-mini:3b"
    description: "Orca Mini 3B — instruction-tuned small model"
    size_gb: 1.9
    use_case: "Fast Q&A, lightweight assistant"

  neural-chat:
    tag: "neural-chat:7b"
    description: "Intel Neural Chat 7B — optimized conversational AI"
    size_gb: 4.1
    use_case: "Natural conversation, customer-facing chat"

  stablelm2:
    tag: "stablelm2:1.6b"
    description: "Stability AI StableLM 2 1.6B — ultra-compact model"
    size_gb: 1.0
    use_case: "Embedded AI, very fast responses"

# Pull groups — run setup-ollama-models.ps1 -Group <name>
groups:
  tiers:                              # primary group — everything the backend needs
    - qwen3:72b-q3_k_m
    - qwen3.6:35b-a3b
    - qwen3.5:9b
    - qwen2.5-coder:32b
    - nomic-embed-text

  minimal:
    - qwen3.5:9b                      # only Fast tier — ~7GB
    - nomic-embed-text

  standard:
    - llama3.2:3b
    - phi4-mini:latest
    - nomic-embed-text
    - llava:7b

  full:
    - llama3.2:3b
    - phi4:14b
    - mistral:7b
    - codellama:7b
    - llava:7b
    - nomic-embed-text
    - mxbai-embed-large

  coding:
    - codellama:7b
    - deepseek-coder-v2:16b
    - qwen2.5-coder:7b

  vision:
    - llava:7b
    - llava-llama3:8b
    - moondream:1.8b
    - llama3.2-vision:11b
