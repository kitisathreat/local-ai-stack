# Model tier registry — llama.cpp-only.
#
# The backend (FastAPI at /backend) reads this and:
#   - exposes each chat tier as a virtual model id (tier.<name>) to the frontend
#   - dispatches requests to a per-tier llama-server subprocess managed by the
#     VRAMScheduler (vision + embedding are pre-spawned by the launcher and
#     pinned)
#   - passes per-tier inference params (temperature, top_p, ...) on each call
#   - launches the per-tier llama-server with --ctx-size, --parallel,
#     --n-gpu-layers, -fa, --cache-type-k/v, optional --rope-scaling yarn
#
# Old 9-profile schema (fast/quality/coding/large/creative/analyst/balanced/
# roleplay/summarizer) is preserved via the `aliases:` block at the bottom.

default: versatile

tiers:
  # ── Highest Quality — Qwen3 72B dense, hardest reasoning ────────────────────
  highest_quality:
    name: "Highest Quality (Qwen3 32B)"
    description: "Frontier dense Qwen3 model that fits in 24 GB VRAM at full GPU offload. Use for hardest problems."
    backend: llama_cpp
    port: 8010
    model_tag: "qwen3-32b"
    # Was Qwen3-72B with halved context (16k) + f16 KV trying to work
    # around partial CPU/GPU offload corruption. Switched to 32B which
    # fits fully on GPU at 32k context with q8 KV — back to the
    # original spec values and stable output.
    context_window: 32768
    think_default: false                 # Qwen3 emits long reasoning_content
                                         # the web UI silently drops, making
                                         # responses appear stuck. User can still
                                         # opt in via the Think checkbox.
    think_supported: true
    params:
      temperature: 0.7
      top_p: 0.9
      top_k: 20
      repeat_penalty: 1.0
      num_predict: 8192
    vram_estimate_gb: 22                 # ~20 GB weights + ~2 GB for KV+compute
    parallel_slots: 1
    n_gpu_layers: -1
    flash_attention: true
    cache_type_k: q8_0
    cache_type_v: q8_0

  # ── Versatile — Qwen3.6 35B-A3B MoE, default + orchestrator ─────────────────
  versatile:
    name: "Versatile (Qwen3.6 35B-A3B)"
    description: "MoE with 3B active params. Fast (~120+ t/s) and capable. Default tier + multi-agent orchestrator."
    backend: llama_cpp
    port: 8011
    model_tag: "qwen3.6-35b-a3b"
    context_window: 65536                # was 16384; YaRN-extended
    think_default: false
    think_supported: true
    preserve_thinking: true             # Qwen3.6 feature — carries reasoning across agent turns
    params:
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      repeat_penalty: 1.0
      num_predict: 4096
    vram_estimate_gb: 21
    is_orchestrator: true
    parallel_slots: 2
    n_gpu_layers: -1
    flash_attention: true
    cache_type_k: q8_0
    cache_type_v: q8_0
    rope_scaling:
      type: yarn
      factor: 2.0
      orig_ctx: 32768

  # ── Fast — Qwen3.5 9B dense, parallel workers ───────────────────────────────
  fast:
    name: "Fast (Qwen3.5 9B)"
    description: "Small, fully GPU-offloaded. Multiple instances share VRAM via --parallel — used as multi-agent workers."
    backend: llama_cpp
    port: 8012
    model_tag: "qwen3.5-9b"
    context_window: 65536                # was 4096; native 128k
    think_default: false
    think_supported: true
    params:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      repeat_penalty: 1.0
      num_predict: 2048
    vram_estimate_gb: 7
    parallel_workers_max: 3
    parallel_slots: 4
    n_gpu_layers: -1
    flash_attention: true
    cache_type_k: q8_0
    cache_type_v: q8_0

  # ── Coding — Qwen3-Coder-Next 80B-A3B, RL-trained on PRs ────────────────────
  # Was Qwen3-Coder-Next-80B-A3B which couldn't fit on a 24 GB GPU
  # (same partial-offload corruption that hit the 72B). Now using
  # Qwen3-Coder-30B-A3B-Instruct (MoE, 3B active params, ~18 GB at
  # Q4_K_M) which sits comfortably below the VRAM ceiling.
  coding:
    name: "Coding (Qwen3-Coder 30B-A3B)"
    description: "Qwen3 coder MoE (3B active params). Native tool calling."
    backend: llama_cpp
    port: 8013
    model_tag: "qwen3-coder-30b-a3b"
    fallback_tag: "qwen2.5-coder-32b"
    context_window: 65536               # 30B-A3B fits 64k ctx in 24 GB VRAM
                                        # alongside the model. The 80B variant's
                                        # 256k YaRN context isn't reachable here.
    think_default: false                # was true (80B); 30B coder is faster and
                                        # users typically don't want reasoning
                                        # blocks on simple coding turns. User
                                        # can opt in via Think checkbox.
    think_supported: true
    params:
      temperature: 1.0                  # official recommendation for agentic coding
      top_p: 0.95
      top_k: 20
      min_p: 0.0
      repeat_penalty: 1.0
      num_predict: 8192
    vram_estimate_gb: 20                # ~18 GB weights + ~2 GB KV/compute
    reasoning_format: none              # strip <think> tags from API output
    parallel_slots: 1
    n_gpu_layers: -1
    flash_attention: true
    cache_type_k: q8_0
    cache_type_v: q8_0
    rope_scaling:
      type: yarn
      factor: 4.0
      orig_ctx: 32768

  # ── Vision — Qwen3.6 35B-A3B + mmproj via llama.cpp ─────────────────────────
  vision:
    name: "Vision (Qwen3.6 35B + mmproj)"
    description: "Multimodal via llama.cpp with mmproj-F16.gguf. Charts, screenshots, UI, documents."
    backend: llama_cpp
    port: 8001
    model_tag: "qwen3.6-35b-a3b"
    mmproj_path: "data/models/vision.mmproj.gguf"
    context_window: 16384
    think_default: false
    think_supported: true
    chat_template_kwargs:
      enable_thinking: false
    params:
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      num_predict: 4096
    vram_estimate_gb: 21
    # Was `pinned: true` — but at 21 GB, pinning vision on a 24 GB GPU
    # leaves only ~2 GB for every other chat tier, blocking versatile
    # (21 GB), highest_quality (24 GB), and coding (24 GB) from ever
    # loading. Cold-spawn on demand instead; vision sees real use only
    # when an image is in the message and the auto-route kicks in.
    pinned: false
    parallel_slots: 2
    n_gpu_layers: -1
    flash_attention: true
    cache_type_k: q8_0
    cache_type_v: q8_0

  # ── Embedding — nomic-embed-text-v1.5, pre-spawned, pinned ──────────────────
  embedding:
    name: "Embedding (nomic-embed-text-v1.5)"
    description: "Always-on embedding server for RAG and memory distillation."
    backend: llama_cpp
    role: embedding
    port: 8090
    model_tag: "nomic-embed-text-v1.5"
    context_window: 8192
    think_supported: false
    vram_estimate_gb: 1
    pinned: true                        # pre-spawned by the launcher; never evicted
    parallel_slots: 4
    n_gpu_layers: -1
    flash_attention: false              # nomic-embed is unstable with -fa in some builds
    cache_type_k: f16
    cache_type_v: f16
    extra_args:
      - "--embedding"
      - "--pooling"
      - "mean"

# Backwards compat — map old profile names to new tiers
aliases:
  quality: highest_quality
  large: highest_quality
  balanced: versatile
  analyst: versatile
  creative: fast
  roleplay: fast
  summarizer: fast
  # `fast` and `coding` keep their names; no alias entry needed
