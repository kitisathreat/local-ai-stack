aliases:
  quality: highest_quality
  large: highest_quality
  balanced: versatile
  analyst: versatile
  creative: fast
  roleplay: fast
  summarizer: fast
  reasoning: reasoning_max
  oss: reasoning_max
  # `fast` and `coding` keep their names; no alias entry needed
