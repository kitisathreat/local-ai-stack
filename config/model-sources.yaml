# Model source tracking for native llama.cpp mode.
#
# On every `LocalAIStack.exe -Start`, backend.model_resolver polls
# Hugging Face for each tier declared below, picks the GGUF file to
# download, and writes data/resolved-models.json (consumed by config.py
# at backend startup).
#
# Fields:
#   source   huggingface — only HF is supported now (Ollama removed)
#   repo     repository id, e.g. "bartowski/Qwen3-72B-GGUF"
#   file     preferred GGUF filename pattern, e.g. "*Q4_K_M.gguf"
#   mmproj   (optional) glob for the mmproj-F16.gguf companion
#   tracking latest | pinned — when "pinned", the pinned revision/digest is
#            always used; when "latest", the resolver polls and falls back
#            to pinned on any network failure, rate-limit, or validation
#            failure.
#   pinned   fallback spec used when tracking=pinned OR upstream unreachable
#
# Resolution policy:
#   - Results are cached for 24 h in data/model-cache.json. `-Setup` and
#     `-CheckUpdates` force a refresh.
#   - MODEL_UPDATE_POLICY (env) controls what happens when an update is
#     detected:
#       auto    → download immediately
#       prompt  → native GUI shows a "new revision available — download N GB?" dialog
#       skip    → detected-but-not-downloaded updates stay queued until next -Setup
#   - OFFLINE=1 (env) skips all polling and uses pinned versions only.
#
# The downloaded file is renamed to data/models/<tier>.gguf so that
# config/models.yaml does not need to track exact filenames.

tiers:
  # Qwen3-Next 80B-A3B Thinking — MoE w/ hybrid attention.
  # Replaces the old Qwen3-72B dense + mradermacher i1 setup.
  # Unsloth's GGUF release ships UD-Q4_K_XL with critical layers
  # (attention, embed, output) at 8-bit even in the 4-bit file — this
  # is what keeps coherence intact when the experts spill to RAM.
  #
  # File size: ~45 GB on disk. VRAM resident: ~12-14 GB. RAM resident
  # (experts): ~33 GB. Active per token: 3B → DDR5-bandwidth-bound,
  # not compute-bound, so the 70W TDP of the RTX Pro 4000 SFF doesn't
  # matter much here.
  #
  # If Unsloth hasn't published a UD-Q4_K_XL of the Thinking variant
  # yet, the resolver falls back to the pinned filename below; if that
  # also misses, it'll try bartowski's mirror automatically.
  highest_quality:
    source: huggingface
    repo: "unsloth/Qwen3-Next-80B-A3B-Thinking-GGUF"
    file: "*UD-Q4_K_XL.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3-Next-80B-A3B-Thinking-UD-Q4_K_XL.gguf"

  # Qwen3.6 35B-A3B (MoE) — default + orchestrator. Unsloth UD-Q4_K_XL
  # keeps attention/embed/output layers at 8-bit even in the 4-bit file
  # — measurably better than plain Q4_K_M on MoE coherence under load.
  versatile:
    source: huggingface
    repo: "unsloth/Qwen3.6-35B-A3B-GGUF"
    file: "*UD-Q4_K_XL.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf"

  # Qwen3.5 9B — multi-agent workers. Unsloth UD-Q4_K_XL.
  fast:
    source: huggingface
    repo: "unsloth/Qwen3.5-9B-GGUF"
    file: "*UD-Q4_K_XL.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3.5-9B-UD-Q4_K_XL.gguf"

  # Qwen3-Coder-Next 80B-A3B — SWE-bench trained. unsloth's release.
  # Note: the official Qwen/Qwen3-Coder-Next-GGUF ships sharded
  # (00001-of-00004 ... 00004-of-00004), which the resolver doesn't
  # yet stitch — we use unsloth's single-file build.
  # Qwen3-Coder-30B-A3B (MoE, 3B active) — fits cleanly on a 24 GB GPU.
  #
  # Originally targeted Qwen3-Coder-Next-80B-A3B (~50 GB), but at that
  # size llama.cpp's partial CPU/GPU offload would only fit ~30 of 80
  # layers on GPU and produce numerically corrupted attention (same
  # symptom that broke Qwen3-72B as the highest_quality tier).
  # The 30B-A3B variant is the larger Qwen3 coder model that still
  # has full-VRAM headroom for stable output.
  coding:
    source: huggingface
    repo: "unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF"
    file: "*UD-Q4_K_XL.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf"

  # Qwen3-Coder-Next 80B-A3B — optional "big" variant for the coding
  # tier. Selectable at request time via `/coder big`. Same architecture
  # (MoE, 3B active, standard attention) as the 30B default; just
  # bigger, slower, more capable on long-context refactors. Now feasible
  # on 24 GB hardware because the -ot expert offload pattern (added in
  # the patch series) keeps VRAM at ~14 GB even for the 80B file.
  # Default tier remains the 30B; users opt into the 80B per turn.
  coding_80b:
    source: huggingface
    repo: "unsloth/Qwen3-Coder-Next-80B-A3B-Instruct-GGUF"
    file: "*UD-Q4_K_XL.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3-Coder-Next-80B-A3B-Instruct-UD-Q4_K_XL.gguf"

  # Qwen3.6 35B + mmproj — images / charts. Same base weights as the
  # versatile tier (Unsloth UD-Q4_K_XL); the runtime spawns a separate
  # llama-server with the mmproj attached so it can process vision input.
  vision:
    source: huggingface
    repo: "unsloth/Qwen3.6-35B-A3B-GGUF"
    file: "*UD-Q4_K_XL.gguf"
    mmproj: "mmproj-*BF16.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf"
      mmproj: "mmproj-Qwen3.6-35B-A3B-BF16.gguf"

  embedding:
    source: huggingface
    repo: "nomic-ai/nomic-embed-text-v1.5-GGUF"
    file: "*Q8_0.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "nomic-embed-text-v1.5.Q8_0.gguf"

  # GPT-OSS-120B — opt-in highest-reasoning tier (reasoning_max). Heavy-
  # weight MoE (5.1 B active out of 117 B) trained on reasoning, RL'd on
  # tool use. Native MXFP4 release (lossless 4-bit), but llama.cpp on
  # b8992 doesn't support MXFP4 yet — use the bartowski Q4_K_M GGUF. ~58
  # GB on disk. VRAM with -ot expert offload: ~14 GB. RAM: ~50 GB. Slower
  # than Qwen3-Next-80B-A3B-Thinking (~1.7x — 5.1 B active vs 3 B), but
  # higher peak quality on hard reasoning. No speculative draft because
  # GPT-OSS uses OpenAI's o200k_harmony tokenizer which is incompatible
  # with the Qwen3 family draft.
  reasoning_max:
    source: huggingface
    repo: "bartowski/openai_gpt-oss-120b-GGUF"
    file: "*Q4_K_M.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "openai_gpt-oss-120b-Q4_K_M.gguf"

  # Qwen3-0.6B-Instruct — universal speculative-decode draft for every
  # Qwen3-family chat tier (highest_quality, versatile, fast, coding, vision).
  # Speculative decoding requires the draft and target to share a tokenizer,
  # otherwise rejection sampling is undefined. All Qwen3 family models
  # (and Qwen3-Coder) share vocab 151936 — a single 0.6B draft works for
  # every tier. ~600 MB on disk at UD-Q4_K_XL; ~0.5 GB extra VRAM at
  # spawn time. NOT compatible with reasoning_max (GPT-OSS uses a different
  # tokenizer family) — that tier intentionally has no draft.
  draft_qwen3_06b:
    source: huggingface
    repo: "unsloth/Qwen3-0.6B-Instruct-GGUF"
    file: "*UD-Q4_K_XL.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3-0.6B-Instruct-UD-Q4_K_XL.gguf"
