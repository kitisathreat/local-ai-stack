# Model source tracking for native llama.cpp mode.
#
# On every `LocalAIStack.exe -Start`, backend.model_resolver polls
# Hugging Face for each tier declared below, picks the GGUF file to
# download, and writes data/resolved-models.json (consumed by config.py
# at backend startup).
#
# Fields:
#   source   huggingface — only HF is supported now (Ollama removed)
#   repo     repository id, e.g. "bartowski/Qwen3-72B-GGUF"
#   file     preferred GGUF filename pattern, e.g. "*Q4_K_M.gguf"
#   mmproj   (optional) glob for the mmproj-F16.gguf companion
#   tracking latest | pinned — when "pinned", the pinned revision/digest is
#            always used; when "latest", the resolver polls and falls back
#            to pinned on any network failure, rate-limit, or validation
#            failure.
#   pinned   fallback spec used when tracking=pinned OR upstream unreachable
#
# Resolution policy:
#   - Results are cached for 24 h in data/model-cache.json. `-Setup` and
#     `-CheckUpdates` force a refresh.
#   - MODEL_UPDATE_POLICY (env) controls what happens when an update is
#     detected:
#       auto    → download immediately
#       prompt  → native GUI shows a "new revision available — download N GB?" dialog
#       skip    → detected-but-not-downloaded updates stay queued until next -Setup
#   - OFFLINE=1 (env) skips all polling and uses pinned versions only.
#
# The downloaded file is renamed to data/models/<tier>.gguf so that
# config/models.yaml does not need to track exact filenames.

tiers:
  # Qwen3 72B at IQ4_XS — preserved 72B for hardest-reasoning tier
  # using stability overrides that make partial CPU/GPU offload work
  # on a 24 GB GPU.
  #
  # Three things working together vs. the Q4_K_M attempt that produced
  # garbage output:
  #   1. IQ4_XS (~37 GB) instead of Q4_K_M (~46 GB) — about 50 of 80
  #      layers fit on GPU instead of 35; the smaller CPU residue is
  #      less likely to corrupt attention numerics at the boundary.
  #   2. mradermacher's i1-GGUF (imatrix-calibrated) instead of plain
  #      quants — imatrix uses calibration data to keep activations
  #      in a tighter distribution per quant block, measurably more
  #      numerically stable than the naive variants.
  #   3. Runtime flags (in config/models.yaml): --no-mmap + --mlock
  #      pin the CPU-resident layers in real RAM (no disk paging
  #      latency); flash_attention: false avoids the FA boundary
  #      bug between GPU and CPU layers.
  #
  # Tradeoff vs. the 32B option: ~5-10 t/s instead of ~30 t/s, and
  # needs ~50 GB system RAM. Quality is 72B-class.
  highest_quality:
    source: huggingface
    repo: "mradermacher/Qwen3-72B-Instruct-i1-GGUF"
    file: "*i1-IQ4_XS.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3-72B-Instruct.i1-IQ4_XS.gguf"

  # Qwen3.6 35B-A3B (MoE) — default + orchestrator. Unsloth UD-Q4_K_XL
  # keeps attention/embed/output layers at 8-bit even in the 4-bit file
  # — measurably better than plain Q4_K_M on MoE coherence under load.
  versatile:
    source: huggingface
    repo: "unsloth/Qwen3.6-35B-A3B-GGUF"
    file: "*UD-Q4_K_XL.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf"

  # Qwen3.5 9B — multi-agent workers. Unsloth UD-Q4_K_XL.
  fast:
    source: huggingface
    repo: "unsloth/Qwen3.5-9B-GGUF"
    file: "*UD-Q4_K_XL.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3.5-9B-UD-Q4_K_XL.gguf"

  # Qwen3-Coder-Next 80B-A3B — SWE-bench trained. unsloth's release.
  # Note: the official Qwen/Qwen3-Coder-Next-GGUF ships sharded
  # (00001-of-00004 ... 00004-of-00004), which the resolver doesn't
  # yet stitch — we use unsloth's single-file build.
  # Qwen3-Coder-30B-A3B (MoE, 3B active) — fits cleanly on a 24 GB GPU.
  #
  # Originally targeted Qwen3-Coder-Next-80B-A3B (~50 GB), but at that
  # size llama.cpp's partial CPU/GPU offload would only fit ~30 of 80
  # layers on GPU and produce numerically corrupted attention (same
  # symptom that broke Qwen3-72B as the highest_quality tier).
  # The 30B-A3B variant is the larger Qwen3 coder model that still
  # has full-VRAM headroom for stable output.
  coding:
    source: huggingface
    repo: "unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF"
    file: "*UD-Q4_K_XL.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf"

  # Qwen3.6 35B + mmproj — images / charts. Same base weights as the
  # versatile tier (Unsloth UD-Q4_K_XL); the runtime spawns a separate
  # llama-server with the mmproj attached so it can process vision input.
  vision:
    source: huggingface
    repo: "unsloth/Qwen3.6-35B-A3B-GGUF"
    file: "*UD-Q4_K_XL.gguf"
    mmproj: "mmproj-*BF16.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf"
      mmproj: "mmproj-Qwen3.6-35B-A3B-BF16.gguf"

  embedding:
    source: huggingface
    repo: "nomic-ai/nomic-embed-text-v1.5-GGUF"
    file: "*Q8_0.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "nomic-embed-text-v1.5.Q8_0.gguf"
