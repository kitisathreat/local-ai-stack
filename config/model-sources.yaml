# Model source tracking for native llama.cpp mode.
#
# On every `LocalAIStack.exe -Start`, backend.model_resolver polls
# Hugging Face for each tier declared below, picks the GGUF file to
# download, and writes data/resolved-models.json (consumed by config.py
# at backend startup).
#
# Fields:
#   source   huggingface — only HF is supported now (Ollama removed)
#   repo     repository id, e.g. "bartowski/Qwen3-72B-GGUF"
#   file     preferred GGUF filename pattern, e.g. "*Q4_K_M.gguf"
#   mmproj   (optional) glob for the mmproj-F16.gguf companion
#   tracking latest | pinned — when "pinned", the pinned revision/digest is
#            always used; when "latest", the resolver polls and falls back
#            to pinned on any network failure, rate-limit, or validation
#            failure.
#   pinned   fallback spec used when tracking=pinned OR upstream unreachable
#
# Resolution policy:
#   - Results are cached for 24 h in data/model-cache.json. `-Setup` and
#     `-CheckUpdates` force a refresh.
#   - MODEL_UPDATE_POLICY (env) controls what happens when an update is
#     detected:
#       auto    → download immediately
#       prompt  → native GUI shows a "new revision available — download N GB?" dialog
#       skip    → detected-but-not-downloaded updates stay queued until next -Setup
#   - OFFLINE=1 (env) skips all polling and uses pinned versions only.
#
# The downloaded file is renamed to data/models/<tier>.gguf so that
# config/models.yaml does not need to track exact filenames.

tiers:
  # Qwen3 72B — hardest reasoning. Repo: mradermacher's GGUF mirror
  # (the official Qwen org doesn't ship a 72B GGUF directly).
  highest_quality:
    source: huggingface
    repo: "mradermacher/Qwen3-72B-Instruct-GGUF"
    file: "*Q4_K_M.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3-72B-Instruct.Q4_K_M.gguf"

  # Qwen3.6 35B-A3B (MoE) — default + orchestrator. Same repo as the
  # vision tier; we download the Q4_K_M weights once and the vision
  # tier tacks on the mmproj companion. lmstudio-community releases
  # ship the mmproj alongside the weights.
  versatile:
    source: huggingface
    repo: "lmstudio-community/Qwen3.6-35B-A3B-GGUF"
    file: "*Q4_K_M.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3.6-35B-A3B-Q4_K_M.gguf"

  # Qwen3.5 9B — multi-agent workers. lmstudio-community publishes both
  # the weights and an mmproj-BF16; we only pull the weights here.
  fast:
    source: huggingface
    repo: "lmstudio-community/Qwen3.5-9B-GGUF"
    file: "*Q4_K_M.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3.5-9B-Q4_K_M.gguf"

  # Qwen3-Coder-Next 80B-A3B — SWE-bench trained. unsloth's release.
  # Note: the official Qwen/Qwen3-Coder-Next-GGUF ships sharded
  # (00001-of-00004 ... 00004-of-00004), which the resolver doesn't
  # yet stitch — we use unsloth's single-file build.
  coding:
    source: huggingface
    repo: "unsloth/Qwen3-Coder-Next-GGUF"
    file: "*Q4_K_M.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3-Coder-Next-Q4_K_M.gguf"

  # Qwen3.6 35B + mmproj — images / charts. Same base weights as the
  # versatile tier; the runtime spawns a separate llama-server with
  # the mmproj attached so it can process vision input.
  vision:
    source: huggingface
    repo: "lmstudio-community/Qwen3.6-35B-A3B-GGUF"
    file: "*Q4_K_M.gguf"
    mmproj: "mmproj-*BF16.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "Qwen3.6-35B-A3B-Q4_K_M.gguf"
      mmproj: "mmproj-Qwen3.6-35B-A3B-BF16.gguf"

  embedding:
    source: huggingface
    repo: "nomic-ai/nomic-embed-text-v1.5-GGUF"
    file: "*Q8_0.gguf"
    tracking: latest
    pinned:
      revision: "main"
      file: "nomic-embed-text-v1.5.Q8_0.gguf"
