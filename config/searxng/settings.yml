use_default_settings: true

server:
  secret_key: "local-ai-stack-searxng-secret-change-in-production"
  limiter: false
  image_proxy: true
  method: "GET"

ui:
  static_use_hash: true
  default_locale: en
  query_in_title: true
  infinite_scroll: true
  default_theme: simple

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "en"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  formats:
    - html
    - json

# Engines enabled for broad knowledge coverage
engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    language: en
    disabled: false

  - name: wikidata
    engine: wikidata
    shortcut: wd
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: stackoverflow
