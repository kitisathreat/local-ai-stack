# Open WebUI Tool Registry
# Tools extend what models can DO — they are Python functions the model calls in conversations.
# Install via Open WebUI Admin > Tools, or run: .\scripts\setup-tools.ps1
#
# Tool files live in: tools/
# Open WebUI tool docs: https://docs.openwebui.com/features/plugin/tools/

tools:
  # ── Search & Research ─────────────────────────────────────────────────────────
  web_search:
    file: tools/web_search.py
    group: web_geo
    subgroup: web_search
    title: "Web Search"
    description: "Search the web in real time via the configured provider (Brave or DuckDuckGo). Gives models access to current events and live data."
    requires_service: null
    default_enabled: true

  wikipedia:
    file: tools/wikipedia.py
    group: research
    subgroup: reference
    title: "Wikipedia Lookup"
    description: "Retrieve Wikipedia article summaries and full content. Great for encyclopedic knowledge."
    requires_service: null
    default_enabled: true

  arxiv_search:
    file: tools/arxiv_search.py
    group: research
    subgroup: computer_science
    title: "ArXiv Paper Search"
    description: "Search and retrieve academic papers from ArXiv. Gives models access to research."
    requires_service: null
    default_enabled: true

  url_reader:
    file: tools/url_reader.py
    group: web_geo
    subgroup: web_search
    title: "URL Reader"
    description: "Fetch and extract readable text from any URL. Lets the model read web pages."
    requires_service: null
    default_enabled: true

  # ── Computation & Data ────────────────────────────────────────────────────────
  calculator:
    file: tools/calculator.py
    group: code_data_compute
    subgroup: compute_notebooks
    title: "Calculator"
    description: "Perform arithmetic, algebra, unit conversions, and financial calculations accurately."
    requires_service: null
    default_enabled: true

  datetime_tool:
    file: tools/datetime_tool.py
    group: code_data_compute
    subgroup: dev_utilities
    title: "Date & Time"
    description: "Get current date/time in any timezone, calculate date differences, parse dates."
    requires_service: null
    default_enabled: true

  weather:
    file: tools/weather.py
    group: web_geo
    subgroup: weather
    title: "Weather (Open-Meteo)"
    description: "Real-time weather and 7-day forecast via free Open-Meteo API. No API key needed."
    requires_service: null
    default_enabled: true

  # ── Academic & Scientific ─────────────────────────────────────────────────────
  pubmed:
    file: tools/pubmed.py
    group: research
    subgroup: life_sciences
    title: "PubMed / NCBI Biomedical Search"
    description: "Search 35M+ biomedical articles. Covers medicine, biology, pharmacology, genetics, neuroscience."
    requires_service: null
    default_enabled: true
    api_key_required: false

  semantic_scholar:
    file: tools/semantic_scholar.py
    group: research
    subgroup: cross_disciplinary
    title: "Semantic Scholar"
    description: "AI-powered search across 220M+ papers in all fields. Finds open-access PDFs, citation counts, and author profiles."
    requires_service: null
    default_enabled: true
    api_key_required: false

  crossref:
    file: tools/crossref.py
    group: research
    subgroup: cross_disciplinary
    title: "CrossRef — DOI & Citation Lookup"
    description: "Resolve any DOI, search 150M+ scholarly works, get citation counts, and look up journal metadata."
    requires_service: null
    default_enabled: true
    api_key_required: false

  openalex:
    file: tools/openalex.py
    group: research
    subgroup: cross_disciplinary
    title: "OpenAlex — Open Scholarly Catalog"
    description: "Search 250M+ scholarly works, explore scientific concepts, and look up institution research output."
    requires_service: null
    default_enabled: true
    api_key_required: false

  zenodo:
    file: tools/zenodo.py
    group: research
    subgroup: cross_disciplinary
    title: "Zenodo — CERN Open Repository"
    description: "Search Zenodo for open research datasets, software, papers, and presentations with persistent DOIs."
    requires_service: null
    default_enabled: true
    api_key_required: false

  dblp:
    file: tools/dblp.py
    group: research
    subgroup: computer_science
    title: "DBLP — CS Bibliography"
    description: "Search DBLP for computer science publications from all major venues (NeurIPS, ICML, CVPR, ACL, SOSP...)."
    requires_service: null
    default_enabled: true
    api_key_required: false

  nasa_ads:
    file: tools/nasa_ads.py
    group: research
    subgroup: physical_sciences
    title: "NASA ADS — Astrophysics Data System"
    description: "Search 15M+ astronomy and astrophysics papers. Free API token required (1-minute signup)."
    requires_service: null
    default_enabled: true
    api_key_required: true
    api_key_url: "https://ui.adsabs.harvard.edu/user/settings/token"

  unpaywall:
    file: tools/unpaywall.py
    group: research
    subgroup: cross_disciplinary
    title: "Unpaywall — Free Paper Finder"
    description: "Find free legal PDFs of paywalled papers by DOI. Sources from PubMed Central, ArXiv, institutional repos."
    requires_service: null
    default_enabled: true
    api_key_required: false

  # ── Code & Development ────────────────────────────────────────────────────────
  github_search:
    file: tools/github_search.py
    group: code_data_compute
    subgroup: code_search
    title: "GitHub Search"
    description: "Search GitHub repositories, issues, and code. Useful for development assistance."
    requires_service: null
    default_enabled: true

  code_troubleshoot:
    file: tools/code_troubleshoot.py
    group: code_data_compute
    subgroup: code_search
    title: "Code Troubleshoot — SO + GitHub Issues/Discussions/Wikis"
    description: "Crawl Stack Overflow and GitHub (issues, discussions, wikis) for fixes to a specific error or bug. find_solutions runs SO + closed-issue + discussion searches in parallel; per-source primitives drill into a single issue thread or pull the top N upvoted SO answers in full."
    requires_service: null
    default_enabled: true
    api_key_required: false

  # ── Memory & Persistence ──────────────────────────────────────────────────────
  memory_tool:
    file: tools/memory_tool.py
    group: code_data_compute
    subgroup: memory_interaction
    title: "Long-Term Memory"
    description: "Store and recall facts across conversations. Persist important user context."
    requires_service: null
    default_enabled: true

  # ── Desktop Integration (Phase 9) ───────────────────────────────────────────
  # Reach out of the backend process and into the host machine: filesystem,
  # application launches, design-software automation. Off by default — toggle
  # from the admin Tools panel after reviewing each tool's Valves. All seven
  # carry `requires_service: host_*` so they're suppressed when airgap is on.
  filesystem:
    file: tools/filesystem.py
    group: desktop
    subgroup: system
    title: "Local Filesystem — Read/Write/Search C:/D:"
    description: "Browse, read, search, and (opt-in) write/delete files anywhere on the host machine. Defaults to C:\\, D:\\, and the user's home; blocks Windows, Program Files\\WindowsApps, $Recycle.Bin, etc. Writes and deletes require flipping WRITE_ENABLED / DELETE_ENABLED on the tool's Valves."
    requires_service: host_filesystem
    default_enabled: false
    api_key_required: false

  app_launcher:
    file: tools/app_launcher.py
    group: desktop
    subgroup: system
    title: "App Launcher — Open Programs and Files"
    description: "Launch desktop programs (KiCad, Blender, Fusion 360, FL Studio, Synthesizer V Studio, browsers, anything else) and open files in their default handler. Restricts launches to a configured APPS allow-list unless ALLOW_ARBITRARY_EXEC is on."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false

  kicad:
    file: tools/kicad.py
    group: desktop
    subgroup: eda
    title: "KiCad — Schematic / PCB Open & CLI Automation"
    description: "Open KiCad projects, schematics, and PCB layouts, and run kicad-cli (KiCad 7+) headlessly to export Gerbers, drill files, STEP 3D models, schematic PDFs, BOMs, and netlists. Also runs ERC and DRC."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false

  blender:
    file: tools/blender.py
    group: desktop
    subgroup: cad_3d
    title: "Blender — GUI launch + Headless Python Scripting"
    description: "Open .blend files in Blender's GUI or run arbitrary Python in Blender's bundled interpreter (full bpy API). Can render single frames or animations and export models to glTF, FBX, OBJ, STL, USD, or Alembic."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false

  fusion360:
    file: tools/fusion360.py
    group: desktop
    subgroup: cad_3d
    title: "Fusion 360 — Launch + Script/Add-in Installation"
    description: "Open Fusion 360 (or .f3d / .f3z files) and install Python scripts and add-ins into Fusion's standard API folders. Add-ins can be configured to auto-load on Fusion launch."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false

  fl_studio:
    file: tools/fl_studio.py
    group: desktop
    subgroup: audio_production
    title: "FL Studio — Project Open + Headless Render + MIDI Send"
    description: "Open .flp projects and .mid files in FL Studio, render projects to WAV/MP3/OGG/FLAC headlessly via FL64.exe's /R flag, install MIDI Scripting controller-surface scripts, and (optionally) send live MIDI via mido/python-rtmidi."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false

  synthv_studio:
    file: tools/synthv_studio.py
    group: desktop
    subgroup: audio_production
    title: "Synthesizer V Studio — Open + Batch Render + JS Scripting"
    description: "Open Synthesizer V Studio Pro projects (.svp / .s5p), batch-render them to WAV via synthv-cli (or synthv-studio --batch-render), and install JavaScript automation scripts into the user scripts directory."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false

  # ── Entertainment & Media (Phase 9b) ────────────────────────────────────────
  # Game-library, music-player, streaming, and torrent integrations. Off by
  # default. Steam, MusicBee, qBittorrent, and the torrent search/download
  # paths reach the host (require_service: host_*); Spotify and Free Music
  # are online-API-only.
  steam:
    file: tools/steam.py
    group: entertainment
    subgroup: games
    title: "Steam — Launch Games + Library Inspection"
    description: "Launch installed Steam games via the steam:// URL protocol, list installed games by parsing libraryfolders.vdf, and (with a free Steam Web API key) fetch a public profile's owned-games list, recently played, and player summary."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false
    api_key_url: "https://steamcommunity.com/dev/apikey"

  musicbee:
    file: tools/musicbee.py
    group: entertainment
    subgroup: local_player
    title: "MusicBee — Local Music Player Control"
    description: "Drive a local MusicBee install via its command-line switches: launch, play / pause / next / previous, set volume, mute, queue and play files, open library/playlists."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false

  spotify:
    file: tools/spotify.py
    group: entertainment
    subgroup: streaming_music
    title: "Spotify — Web API Search + Playback Control"
    description: "Spotify Web API for catalogue search, playlist browsing, and playback control. Public-catalogue endpoints work with a client_id+secret; playback control needs a long-lived user refresh_token."
    requires_service: null
    default_enabled: false
    api_key_required: true
    api_key_url: "https://developer.spotify.com/dashboard"

  torrent_search:
    file: tools/torrent_search.py
    group: entertainment
    subgroup: torrents
    title: "Torrent Search — YTS, EZTV, Nyaa, Pirate Bay, Internet Archive, Jackett"
    description: "Search public torrent indexers for movies (YTS), TV (EZTV), anime (Nyaa), the long-tail (apibay.org), and Internet Archive's public-domain collection. Optional Jackett/Prowlarr meta-search routes one query through every configured tracker. Returns magnet URIs / .torrent links — pair with the qBittorrent client to actually download."
    requires_service: null
    default_enabled: false
    api_key_required: false

  torrent_aggregators:
    file: tools/torrent_aggregators.py
    group: entertainment
    subgroup: torrents
    title: "Torrent Aggregators — Knaben, Solid Torrents, 1337x, TorrentGalaxy, BTDigg"
    description: "Crawl meta-search aggregators that index dozens of public trackers at once. Knaben + Solid Torrents (JSON), 1337x + TorrentGalaxy (HTML), BTDigg (DHT-discovered). Complements `torrent_search` by covering the long-tail releases YTS/EZTV/Nyaa miss. Returns magnet URIs for the qBittorrent tool."
    requires_service: null
    default_enabled: false
    api_key_required: false

  free_games:
    file: tools/free_games.py
    group: entertainment
    subgroup: games
    title: "Free & Archived Games — GamerPower + Epic + Steam + GOG + IA + FOSS"
    description: "Currently-free game promotions (GamerPower aggregator, Epic weekly free, Steam free-to-play, GOG $0 catalogue, itch.io free indies) plus game-preservation archives (Internet Archive Software Library — often browser-playable; MyAbandonware; OldGamesDownload) plus FOSS / open-source games (libregamewiki). Aggregator runs every layer in parallel for one query."
    requires_service: null
    default_enabled: true
    api_key_required: false

  qbittorrent:
    file: tools/qbittorrent.py
    group: entertainment
    subgroup: torrents
    title: "qBittorrent — Web API Client"
    description: "Drive a local or remote qBittorrent instance via its Web API. Add torrents from a magnet URI or .torrent URL, list and filter the queue, pause / resume / delete (with optional file removal), set per-torrent download limits, and fetch global transfer stats."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false

  free_music:
    file: tools/free_music.py
    group: entertainment
    subgroup: p2p_music
    title: "Free Music — FMA, Internet Archive Audio, Jamendo"
    description: "Search and download legitimately-free music from Free Music Archive (CC-licensed indie), Internet Archive Audio (public-domain & CC concerts/broadcasts/78rpm rips, often FLAC), and Jamendo (CC-licensed releases from 600k+ artists, FLAC with a free API key)."
    requires_service: null
    default_enabled: false
    api_key_required: false
    api_key_url: "https://devportal.jamendo.com"

  # ── Authoring tools (Phase 9c): the model creates content, not just opens apps ─
  composition:
    file: tools/composition.py
    group: code_data_compute
    subgroup: compute_notebooks
    title: "Composition — MIDI Authoring"
    description: "Compose MIDI files programmatically: tracks, notes, chords, scales, drum patterns, transposition, key fitting. Output imports cleanly into FL Studio, SynthV, MuseScore, Logic, Ableton."
    requires_service: null
    default_enabled: false
    api_key_required: false

  synthv_author:
    file: tools/synthv_author.py
    group: desktop
    subgroup: audio_authoring
    title: "SynthV Author — Build .svp Projects"
    description: "Author Synthesizer V Studio Pro project files: tempo / time-sig / key, tracks bound to singer voice DBs, note groups, notes with lyrics + phonemes, parameter automation curves, MIDI import."
    requires_service: host_filesystem
    default_enabled: false
    api_key_required: false

  fl_studio_author:
    file: tools/fl_studio_author.py
    group: desktop
    subgroup: audio_authoring
    title: "FL Studio Author — Compose Tracks from a Prompt"
    description: "Generate full songs as MIDI (drums, bass, chords, leads) and wrap them in .flp projects (when pyflp is installed) or hand off to FL Studio's MIDI importer."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false

  blender_author:
    file: tools/blender_author.py
    group: desktop
    subgroup: cad_3d_authoring
    title: "Blender Author — Build 3D Scenes from Spec"
    description: "Build 3D scenes: primitives, custom meshes from vertices, PBR materials, lights, cameras, render setup. Generates a single bpy script and runs it headlessly via the existing blender tool."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false

  fusion360_author:
    file: tools/fusion360_author.py
    group: desktop
    subgroup: cad_3d_authoring
    title: "Fusion 360 Author — Generate Parametric CAD Scripts"
    description: "Author Fusion designs: sketches, extrudes, fillets, chamfers, shells, multi-component assemblies, materials, exports (STEP / IGES / STL / F3D). Emits a Fusion script and installs it via fusion360.install_script."
    requires_service: host_filesystem
    default_enabled: false
    api_key_required: false

  kicad_author:
    file: tools/kicad_author.py
    group: desktop
    subgroup: eda_authoring
    title: "KiCad Author — Schematic + PCB with 3rd-party Libraries"
    description: "End-to-end KiCad authoring: project scaffold, 3rd-party library fetch (SnapEDA / Ultra Librarian / GitHub URLs), library registration, symbol placement, wires + labels + hierarchical sheets, PCB tracks + vias + board outline, ERC + DRC."
    requires_service: host_filesystem
    default_enabled: false
    api_key_required: true
    api_key_url: "https://www.snapeda.com/account/api/"

  media_library:
    file: tools/media_library.py
    group: desktop
    subgroup: media_library
    title: "Media Library — Organize Music / Books / Films / TV"
    description: "Universal organizer for downloads. Reads ID3/Vorbis/FLAC/MP4 tags via mutagen, EPUB/PDF metadata, and parses 'Show.S01E02' / 'Title.YEAR' filenames. Routes files into Music/<Artist>/<Album>/, Books/<Author>/, Films/<Title> (Year)/, TV/<Show>/Season NN/."
    requires_service: host_filesystem
    default_enabled: false
    api_key_required: false

  musicbee_author:
    file: tools/musicbee_author.py
    group: desktop
    subgroup: audio_authoring
    title: "MusicBee Author — Playlists + Vibe-Based Streaming"
    description: "Build .m3u8 playlists from explicit track lists or scan-and-filter the music library by tag, then auto-stream the playlist in MusicBee."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false

  # ── Phase 9d: Capability upgrades across every group ────────────────────────

  paywall_bypass:
    file: tools/paywall_bypass.py
    group: news_public_affairs
    subgroup: paywall
    title: "Paywall Bypass — Multi-Strategy Article Reader"
    description: "Try 12ft.io / archive.ph / Wayback / Googlebot UA / AMP / print URL in sequence to extract readable text from sites that block direct fetches. News, blog, and magazine paywalls."
    requires_service: null
    default_enabled: false
    api_key_required: false

  paper_full_text:
    file: tools/paper_full_text.py
    group: research
    subgroup: authoring
    title: "Paper Full-Text — Resolve DOI/arXiv → PDF → Extract"
    description: "Pipeline DOI/arXiv → Unpaywall lookup → PDF download → pypdf text extraction with [page N ¶M] anchors. Caches per-paper for instant re-reads."
    requires_service: null
    default_enabled: false
    api_key_required: false

  literature_review_author:
    file: tools/literature_review_author.py
    group: research
    subgroup: authoring
    title: "Literature Review Author — Topic → Markdown Review"
    description: "Topic + outline → fan out OpenAlex / Semantic Scholar searches → fetch full PDFs for top-N → emit per-section bibliographies + extracts."
    requires_service: null
    default_enabled: false
    api_key_required: false

  citation_graph:
    file: tools/citation_graph.py
    group: research
    subgroup: authoring
    title: "Citation Graph — References & Cited-By"
    description: "Walk the OpenAlex citation graph: lookup, references, cited-by, multi-level lineage tracing."
    requires_service: null
    default_enabled: false
    api_key_required: false

  portfolio_author:
    file: tools/portfolio_author.py
    group: finance
    subgroup: authoring
    title: "Portfolio Author — Backtest a Strategy"
    description: "Vectorised pandas backtest of static-weight portfolios with rebalance schedules, transaction costs, Sharpe / Sortino / Calmar / max-DD / alpha vs benchmark."
    requires_service: null
    default_enabled: false
    api_key_required: false

  dd_report_author:
    file: tools/dd_report_author.py
    group: finance
    subgroup: authoring
    title: "DD Report Author — Equity Due-Diligence Markdown"
    description: "Parallel-fetches yahoo / sec_edgar / finnhub / gdelt / technical_analysis to assemble a structured DD markdown for a ticker."
    requires_service: null
    default_enabled: false
    api_key_required: false

  news_correlator:
    file: tools/news_correlator.py
    group: finance
    subgroup: authoring
    title: "News Correlator — Match News to Price Moves"
    description: "For each big-move trading day in the trailing window, surface headlines that ran that day so the model can hypothesise causation."
    requires_service: null
    default_enabled: false
    api_key_required: false

  news_digest_author:
    file: tools/news_digest_author.py
    group: news_public_affairs
    subgroup: authoring
    title: "News Digest Author — Daily / Weekly Markdown"
    description: "Build a topic-organised digest by parallel-querying gdelt / guardian / nytimes / hackernews / rss_reader, deduplicated and grouped by source."
    requires_service: null
    default_enabled: false
    api_key_required: false

  vuln_advisory_author:
    file: tools/vuln_advisory_author.py
    group: news_public_affairs
    subgroup: authoring
    title: "Vulnerability Advisory Author — Manifest → CVE Triage"
    description: "Parse requirements.txt / package.json / Cargo.toml / go.mod / Gemfile.lock / composer.json / pyproject.toml, query OSV, emit a triage markdown with CVE / fixed-version per dependency."
    requires_service: host_filesystem
    default_enabled: false
    api_key_required: false

  metadata_enricher:
    file: tools/metadata_enricher.py
    group: entertainment
    subgroup: curation
    title: "Metadata Enricher — MusicBrainz Tag Write-Back"
    description: "Walk an audio dir, look up each file on MusicBrainz, write back canonical artist / album / title / track / date / MBID tags via mutagen."
    requires_service: host_filesystem
    default_enabled: false
    api_key_required: false

  library_dedupe:
    file: tools/library_dedupe.py
    group: entertainment
    subgroup: curation
    title: "Library Dedupe — Find Duplicate Music Files"
    description: "Walk a music library, cluster by (artist, album, title) or chromaprint fingerprint, keep the highest-quality copy, move losers to a trash subfolder."
    requires_service: host_filesystem
    default_enabled: false
    api_key_required: false

  auto_subtitle:
    file: tools/auto_subtitle.py
    group: entertainment
    subgroup: curation
    title: "Auto Subtitle — Fetch .srt for Videos"
    description: "OpenSubtitles lookup by file hash + filename for every video in a directory; download best .srt and place beside each video."
    requires_service: host_filesystem
    default_enabled: false
    api_key_required: true
    api_key_url: "https://www.opensubtitles.com/en/consumers"

  cross_source_playlist:
    file: tools/cross_source_playlist.py
    group: entertainment
    subgroup: curation
    title: "Cross-Source Playlist — Spotify → Local → Free Music Fallback"
    description: "Author a playlist that gracefully degrades per track: Spotify, then local MusicBee library, then free_music CC sources. Returns per-track resolution log."
    requires_service: host_filesystem
    default_enabled: false
    api_key_required: false

  art_collection_author:
    file: tools/art_collection_author.py
    group: culture
    subgroup: authoring
    title: "Art Collection Author — Cross-Museum Galleries"
    description: "Theme → parallel-search Met / Smithsonian / Rijksmuseum / Europeana / LoC → markdown gallery sorted by license openness (CC0 first)."
    requires_service: null
    default_enabled: false
    api_key_required: false

  headless_browser:
    file: tools/headless_browser.py
    group: web_geo
    subgroup: headless
    title: "Headless Browser — Playwright Page Fetcher"
    description: "Render JS-heavy pages via headless Chromium. Extract text + optional screenshot. Supports click chains for cookie banners and 'load more' interactions."
    requires_service: host_processes
    default_enabled: false
    api_key_required: false

  route_planner:
    file: tools/route_planner.py
    group: web_geo
    subgroup: routing
    title: "Route Planner — OSRM Driving / Walking / Cycling"
    description: "Multi-stop route optimization via OSRM. A→B with turn-by-turn directions, or N-stop TSP tour optimization."
    requires_service: null
    default_enabled: false
    api_key_required: false

  code_review_author:
    file: tools/code_review_author.py
    group: code_data_compute
    subgroup: authoring
    title: "Code Review Author — Diff-Aware Markdown"
    description: "Fetch a GitHub PR diff (or accept raw diff text), run heuristic static checks, emit a per-file line-anchored review markdown."
    requires_service: null
    default_enabled: false
    api_key_required: false

  notebook_author:
    file: tools/notebook_author.py
    group: code_data_compute
    subgroup: authoring
    title: "Notebook Author — Build .ipynb Cell-by-Cell"
    description: "Accumulate markdown + code cells in memory keyed by output path, commit by writing JSON in the official nbformat schema. Optional execute-end-to-end via jupyter_tool."
    requires_service: host_filesystem
    default_enabled: false
    api_key_required: false

  repo_scaffolder:
    file: tools/repo_scaffolder.py
    group: code_data_compute
    subgroup: authoring
    title: "Repo Scaffolder — Bootstrap a Project Skeleton"
    description: "Templates for python_cli, fastapi, python_library, rust_bin, go_service. Lays out source, tests, CI workflow, README, .gitignore, dependency manifest."
    requires_service: host_filesystem
    default_enabled: false
    api_key_required: false

