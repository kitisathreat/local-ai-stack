# Open WebUI Tool Registry
# Tools extend what models can DO — they are Python functions the model calls in conversations.
# Install via Open WebUI Admin > Tools, or run: .\scripts\setup-tools.ps1
#
# Tool files live in: tools/
# Open WebUI tool docs: https://docs.openwebui.com/features/plugin/tools/

tools:
  # ── Search & Research ─────────────────────────────────────────────────────────
  web_search:
    file: tools/web_search.py
    title: "Web Search (SearXNG)"
    description: "Search the web in real time via local SearXNG. Gives models access to current events and live data."
    requires_service: searxng
    default_enabled: true

  wikipedia:
    file: tools/wikipedia.py
    title: "Wikipedia Lookup"
    description: "Retrieve Wikipedia article summaries and full content. Great for encyclopedic knowledge."
    requires_service: null
    default_enabled: true

  arxiv_search:
    file: tools/arxiv_search.py
    title: "ArXiv Paper Search"
    description: "Search and retrieve academic papers from ArXiv. Gives models access to research."
    requires_service: null
    default_enabled: false

  url_reader:
    file: tools/url_reader.py
    title: "URL Reader"
    description: "Fetch and extract readable text from any URL. Lets the model read web pages."
    requires_service: null
    default_enabled: true

  # ── Computation & Data ────────────────────────────────────────────────────────
  calculator:
    file: tools/calculator.py
    title: "Calculator"
    description: "Perform arithmetic, algebra, unit conversions, and financial calculations accurately."
    requires_service: null
    default_enabled: true

  datetime_tool:
    file: tools/datetime_tool.py
    title: "Date & Time"
    description: "Get current date/time in any timezone, calculate date differences, parse dates."
    requires_service: null
    default_enabled: true

  weather:
    file: tools/weather.py
    title: "Weather (Open-Meteo)"
    description: "Real-time weather and 7-day forecast via free Open-Meteo API. No API key needed."
    requires_service: null
    default_enabled: true

  # ── Academic & Scientific ─────────────────────────────────────────────────────
  pubmed:
    file: tools/pubmed.py
    title: "PubMed / NCBI Biomedical Search"
    description: "Search 35M+ biomedical articles. Covers medicine, biology, pharmacology, genetics, neuroscience."
    requires_service: null
    default_enabled: false
    api_key_required: false

  semantic_scholar:
    file: tools/semantic_scholar.py
    title: "Semantic Scholar"
    description: "AI-powered search across 220M+ papers in all fields. Finds open-access PDFs, citation counts, and author profiles."
    requires_service: null
    default_enabled: false
    api_key_required: false

  crossref:
    file: tools/crossref.py
    title: "CrossRef — DOI & Citation Lookup"
    description: "Resolve any DOI, search 150M+ scholarly works, get citation counts, and look up journal metadata."
    requires_service: null
    default_enabled: false
    api_key_required: false

  openalex:
    file: tools/openalex.py
    title: "OpenAlex — Open Scholarly Catalog"
    description: "Search 250M+ scholarly works, explore scientific concepts, and look up institution research output."
    requires_service: null
    default_enabled: false
    api_key_required: false

  zenodo:
    file: tools/zenodo.py
    title: "Zenodo — CERN Open Repository"
    description: "Search Zenodo for open research datasets, software, papers, and presentations with persistent DOIs."
    requires_service: null
    default_enabled: false
    api_key_required: false

  dblp:
    file: tools/dblp.py
    title: "DBLP — CS Bibliography"
    description: "Search DBLP for computer science publications from all major venues (NeurIPS, ICML, CVPR, ACL, SOSP...)."
    requires_service: null
    default_enabled: false
    api_key_required: false

  nasa_ads:
    file: tools/nasa_ads.py
    title: "NASA ADS — Astrophysics Data System"
    description: "Search 15M+ astronomy and astrophysics papers. Free API token required (1-minute signup)."
    requires_service: null
    default_enabled: false
    api_key_required: true
    api_key_url: "https://ui.adsabs.harvard.edu/user/settings/token"

  unpaywall:
    file: tools/unpaywall.py
    title: "Unpaywall — Free Paper Finder"
    description: "Find free legal PDFs of paywalled papers by DOI. Sources from PubMed Central, ArXiv, institutional repos."
    requires_service: null
    default_enabled: false
    api_key_required: false

  arxiv_search:
    file: tools/arxiv_search.py
    title: "ArXiv Paper Search"
    description: "Search ArXiv preprints in CS, physics, math, biology, economics. Filter by category."
    requires_service: null
    default_enabled: false
    api_key_required: false

  # ── Code & Development ────────────────────────────────────────────────────────
  github_search:
    file: tools/github_search.py
    title: "GitHub Search"
    description: "Search GitHub repositories, issues, and code. Useful for development assistance."
    requires_service: null
    default_enabled: false

  # ── Memory & Persistence ──────────────────────────────────────────────────────
  memory_tool:
    file: tools/memory_tool.py
    title: "Long-Term Memory"
    description: "Store and recall facts across conversations. Persist important user context."
    requires_service: null
    default_enabled: true

# Pipelines extend how requests are PROCESSED — they sit between the user and the model.
# Pipeline files live in: pipelines/
# Open WebUI adds them as API connections (http://pipelines:9099)

pipelines:
  rate_limiter:
    file: pipelines/rate_limiter.py
    title: "Rate Limiter"
    description: "Limit requests per user to prevent abuse and manage GPU load."
    type: filter

  context_injector:
    file: pipelines/context_injector.py
    title: "System Context Injector"
    description: "Automatically inject date, time, and user context into every system prompt."
    type: filter

  web_search_rag:
    file: pipelines/web_search_rag.py
    title: "Web Search RAG"
    description: "Automatically search the web and inject results when the model lacks knowledge."
    type: pipe

# ── Additional Tools Added ────────────────────────────────────────────────────
# Finance & Markets
additional_tools:
  finance:
    file: tools/finance.py
    title: "Finance — Stocks & Crypto"
    description: "Real-time stock quotes (Yahoo Finance) + crypto prices (CoinGecko). No API key required."
    api_key_required: false

  clinicaltrials:
    file: tools/clinicaltrials.py
    title: "ClinicalTrials.gov"
    description: "Search 480,000+ clinical trials worldwide. Find active studies, eligibility, and sponsors."
    api_key_required: false

  openfda:
    file: tools/openfda.py
    title: "OpenFDA — Drug, Food & Device"
    description: "FDA drug labels, adverse event reports (FAERS), and product recalls. Free API."
    api_key_required: false

  pubchem:
    file: tools/pubchem.py
    title: "PubChem — Chemical Compounds"
    description: "Look up 115M+ chemicals by name, formula, or CAS. Get properties, SMILES, safety data."
    api_key_required: false

  open_library:
    file: tools/open_library.py
    title: "Open Library — Books"
    description: "Search 20M+ books, get author bios, covers, and links to free full-text via Internet Archive."
    api_key_required: false

  rss_reader:
    file: tools/rss_reader.py
    title: "RSS / Atom Feed Reader"
    description: "Read any RSS or Atom feed. 25+ presets: HN, ArXiv, BBC, TechCrunch, Nature, NASA, Reddit, OpenAI Blog..."
    api_key_required: false

  hackernews:
    file: tools/hackernews.py
    title: "Hacker News"
    description: "Browse HN top/new/best/ask/show stories and search all past discussions via Algolia."
    api_key_required: false

  dictionary:
    file: tools/dictionary.py
    title: "Dictionary & Thesaurus"
    description: "Definitions, pronunciation, etymology, synonyms, antonyms, rhymes, and word associations."
    api_key_required: false

  dev_utils:
    file: tools/dev_utils.py
    title: "Developer Utilities"
    description: "Hash (MD5/SHA256/SHA512), UUID gen, Base64 encode/decode, JSON format, regex test, URL encode, color convert."
    api_key_required: false

  package_search:
    file: tools/package_search.py
    title: "Package Search — PyPI / npm / DockerHub"
    description: "Search Python packages on PyPI, JS packages on npm, and container images on Docker Hub."
    api_key_required: false

  network_tools:
    file: tools/network_tools.py
    title: "Network Tools — IP / DNS / WHOIS"
    description: "IP geolocation, ASN lookup, DNS resolution, and domain WHOIS/RDAP data."
    api_key_required: false

  n8n_trigger:
    file: tools/n8n_trigger.py
    title: "n8n Workflow Trigger"
    description: "Trigger any n8n automation workflow from chat. List workflows, call webhooks, get results."
    requires_service: n8n
    api_key_required: false

# ── Excel & Spreadsheet ───────────────────────────────────────────────────────
  excel_tool:
    file: tools/excel_tool.py
    title: "Excel & Spreadsheet Tool"
    description: "Read/analyze Excel and CSV files from URLs, generate Python openpyxl code to create workbooks, analyze pasted CSV data with statistics, and get Excel formula help for financial/data tasks."
    api_key_required: false
    requirements: openpyxl

# ── Finance & Economics ───────────────────────────────────────────────────────
  fred:
    file: tools/fred.py
    title: "FRED — Federal Reserve Economic Data"
    description: "Access 800,000+ economic series from the St. Louis Fed. GDP, CPI, unemployment, Fed funds rate, treasury yields, M2, VIX, housing, trade, and consumer data. Free API key required."
    api_key_required: true
    api_key_url: "https://fred.stlouisfed.org/docs/api/api_key.html"

  yahoo_finance_extended:
    file: tools/yahoo_finance_extended.py
    title: "Yahoo Finance Extended — Financials, History & Options"
    description: "Deep financial data: historical OHLCV prices, income/balance/cashflow statements, key ratios (P/E, P/B, beta), options chains, earnings calendar, and analyst recommendations."
    api_key_required: false

  sec_edgar:
    file: tools/sec_edgar.py
    title: "SEC EDGAR — Company Filings & Disclosures"
    description: "Search SEC EDGAR for 10-K annual reports, 10-Q quarterly reports, 8-K current events, S-1 IPOs, proxy statements, and insider transactions. Find companies by name or ticker."
    api_key_required: false

  forex:
    file: tools/forex.py
    title: "Forex — Live Exchange Rates & Currency Conversion"
    description: "Real-time foreign exchange rates via ECB/Frankfurter API. Convert between 30+ currencies, view historical rate charts, and get live rate tables. No API key required."
    api_key_required: false

  financial_calculator:
    file: tools/financial_calculator.py
    title: "Financial Calculator — NPV, IRR, DCF, Options & Portfolio"
    description: "Professional financial math: NPV/IRR analysis, loan amortization schedules, Black-Scholes options pricing, bond yield-to-maturity, compound interest, and portfolio Sharpe/Sortino/drawdown metrics."
    api_key_required: false

  world_bank:
    file: tools/world_bank.py
    title: "World Bank — Global Economic & Development Data"
    description: "200+ countries, 1000+ indicators: GDP, inflation, unemployment, poverty, education, health, trade, CO2 emissions. Compare countries side-by-side and build country profiles."
    api_key_required: false

  technical_analysis:
    file: tools/technical_analysis.py
    title: "Technical Analysis — RSI, MACD, Bollinger Bands & More"
    description: "Full technical analysis from live Yahoo Finance data. RSI (overbought/oversold), MACD crossovers, Bollinger Bands, SMA/EMA golden/death cross, and full technical reports with overall signals."
    api_key_required: false

# ── Engineering & Physics ─────────────────────────────────────────────────────
  nasa_apis:
    file: tools/nasa_apis.py
    title: "NASA Open APIs — APOD, NEO, Mars Rover & Exoplanets"
    description: "Astronomy Picture of the Day, Near Earth Object (asteroid) tracking, Mars Rover photos (Curiosity/Perseverance), and NASA Exoplanet Archive queries. Free API key at api.nasa.gov."
    api_key_required: true
    api_key_url: "https://api.nasa.gov"

  materials_project:
    file: tools/materials_project.py
    title: "Materials Project — Computational Materials Science"
    description: "Search 150,000+ inorganic compounds for crystal structure, band gap, formation energy, stability, and magnetic properties. Computed via DFT. Free API key at materialsproject.org."
    api_key_required: true
    api_key_url: "https://materialsproject.org"

  simbad:
    file: tools/simbad.py
    title: "SIMBAD — Astronomical Database (Stars, Galaxies, Nebulae)"
    description: "Query 15+ million astronomical objects: stars, galaxies, pulsars, nebulae. Get coordinates, spectral type, parallax, proper motion, magnitude, and radial velocity from the CDS Strasbourg. No API key."
    api_key_required: false

  usgs:
    file: tools/usgs.py
    title: "USGS — Earthquakes, Geology & Water Resources"
    description: "Real-time and historical earthquake data (worldwide M3+), USGS stream gauge water levels, and seismic hazard analysis for any region. No API key required."
    api_key_required: false

# ── Defense & Geopolitics ─────────────────────────────────────────────────────
  acled:
    file: tools/acled.py
    title: "ACLED — Armed Conflict Location & Event Data"
    description: "Real-time global conflict events: battles, explosions, protests, riots, and violence against civilians. 200+ countries since 1997. Fatalities, actors, and geographic detail. Free API key at acleddata.com."
    api_key_required: true
    api_key_url: "https://developer.acleddata.com"

# ── Finance (Extended) ────────────────────────────────────────────────────────
  alpha_vantage:
    file: tools/alpha_vantage.py
    title: "Alpha Vantage — Stocks, Forex, Crypto & Economic Data"
    description: "Real-time and historical stock prices, 50+ technical indicators, forex rates, crypto OHLCV, and US macro data (GDP, CPI, inflation, treasury yields). Free API key at alphavantage.co."
    api_key_required: true
    api_key_url: "https://www.alphavantage.co/support/#api-key"

  finnhub:
    file: tools/finnhub.py
    title: "Finnhub — Real-Time Stocks, Fundamentals & News"
    description: "Real-time quotes, company profiles, earnings history, analyst recommendations, insider transactions, news sentiment, and IPO calendar. 60 requests/minute free. API key at finnhub.io."
    api_key_required: true
    api_key_url: "https://finnhub.io"

# ── Humanities & Cultural Heritage ───────────────────────────────────────────
  europeana:
    file: tools/europeana.py
    title: "Europeana — European Cultural Heritage"
    description: "Search 50M+ cultural objects from 2,500 European museums, archives, and libraries. Paintings, manuscripts, maps, photographs, audio, and 3D objects. Filter by country, era, media type. Free API key."
    api_key_required: true
    api_key_url: "https://pro.europeana.eu/page/apis"

# ── Natural Science ───────────────────────────────────────────────────────────
  noaa_climate:
    file: tools/noaa_climate.py
    title: "NOAA Climate Data — Historical Weather & Climate Records"
    description: "Historical temperature, precipitation, snowfall, and extreme weather from 100,000+ global stations dating to 1763. US climate normals (30-year averages). Free API token at ncei.noaa.gov."
    api_key_required: true
    api_key_url: "https://www.ncdc.noaa.gov/cdo-web/token"

  uniprot:
    file: tools/uniprot.py
    title: "UniProt — Protein Sequences, Functions & Interactions"
    description: "Search 250M+ protein sequences (Swiss-Prot + TrEMBL). Get amino acid sequences, domains, PTMs, disease associations, 3D structures (PDB links), Gene Ontology, and pathways. No API key required."
    api_key_required: false

  ensembl:
    file: tools/ensembl.py
    title: "Ensembl — Genomics, Gene Sequences & Variants"
    description: "Query Ensembl for 250+ species. Gene coordinates, DNA/protein sequences, SNP/variant data, ortholog mapping across species, and gene expression. Essential for bioinformatics. No API key required."
    api_key_required: false

# ── Phase 6: Financial Modelling & Charting ───────────────────────────────────
  chart_generator:
    file: tools/chart_generator.py
    title: "Financial Chart Generator — Candlesticks, Comparison & Technical Charts"
    description: "Generate inline financial charts: candlestick price history with volume, multi-asset normalized comparison, full technical analysis panel (RSI/MACD/Bollinger), and return correlation heatmap. Works for stocks, ETFs, crypto, forex. No API key required."
    api_key_required: false
    requirements: "httpx matplotlib mplfinance pandas numpy"

  financial_model:
    file: tools/financial_model.py
    title: "Financial Modelling — DCF, Monte Carlo, Efficient Frontier & Scenarios"
    description: "Professional financial models with embedded charts: DCF valuation with WACC/terminal-growth sensitivity heatmap, Monte Carlo stock price simulation (GBM fan chart), Markowitz Efficient Frontier for portfolio optimization, and bear/base/bull scenario P&L analysis."
    api_key_required: false
    requirements: "httpx matplotlib pandas numpy scipy"

  jupyter_tool:
    file: tools/jupyter_tool.py
    title: "Jupyter Code Executor — Run Custom Python"
    description: "Execute arbitrary Python in the local Jupyter kernel (scipy-notebook with pandas, numpy, scipy, matplotlib, scikit-learn, statsmodels). Returns stdout and matplotlib figures as inline images. Ideal for custom models, data analysis, and ML experiments."
    requires_service: jupyter
    api_key_required: false
    requirements: "httpx websockets"
