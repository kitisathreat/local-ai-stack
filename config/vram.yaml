# VRAM scheduler policy — consumed by backend/vram_scheduler.py.
#
# The scheduler holds a single in-process registry of which tiers are
# resident in VRAM, reference-counted. When a new reservation would exceed
# total_vram_gb (minus headroom_gb), it evicts LRU unpinned tiers with
# refcount==0 to make room.

# ── Hardware ────────────────────────────────────────────────────────────────
total_vram_gb: 24                       # RTX Pro 4000 SFF (Blackwell, 24GB GDDR7)
headroom_gb: 1.5                        # safety margin for KV cache growth
poll_interval_sec: 5                    # background sweeper cadence

# ── Eviction policy ─────────────────────────────────────────────────────────
# The sweeper polls every `poll_interval_sec` and evicts any RESIDENT,
# unpinned, refcount==0 tier that EITHER:
#   - hasn't been used in `idle_eviction_sec` seconds, OR
#   - has had `cross_tier_eviction_messages` requests routed to a different
#     tier since its own last use (whichever fires first).
# Both default to a conservative "release VRAM proactively" policy because
# llama.cpp KV cache + draft model + parallel slots make actual residency
# cost ~2-3x the static `vram_estimate_gb` for MoE tiers — letting idle
# tiers linger until VRAM pressure forces eviction caused VRAM exhaustion
# bugs across multi-tier chat sessions on the 24 GB card.
eviction:
  policy: lru
  min_residency_sec: 30                 # don't evict a model that just loaded (anti-thrash)
  idle_eviction_sec: 300                # 5 min idle → unload (set 0 to disable)
  cross_tier_eviction_messages: 50      # 50 acquires of OTHER tiers since this one
                                        # was last used → unload (set 0 to disable)
  pin_orchestrator: false               # orchestrator CAN be evicted while workers run
  pin_vision: true                      # vision tier is pinned — pre-spawned by the
                                        # launcher and never evicted

# ── Multi-agent coordination ────────────────────────────────────────────────
multi_agent:
  release_orchestrator_during_workers: true
  # When true, after the orchestrator emits its plan, it's released (refcount
  # drops to 0) so the 3 parallel Fast workers (~21GB total) can fit in the
  # same 24GB card. The orchestrator is re-acquired for synthesis at the end
  # (may trigger a reload, adding ~5-8s of latency — considered acceptable
  # because the wall-clock win from parallel workers is much larger).
  synthesis_reload_timeout_sec: 60

# ── Observed cost tuning ────────────────────────────────────────────────────
# vram_estimate_gb values in models.yaml are static guesses. After each
# successful load, the scheduler reads delta via pynvml and caches the
# observed cost. On next start, eviction math uses max(estimate, observed).
observed_costs:
  persist_path: /app/data/vram_observed.json
  learning_rate: 0.1                    # EMA smoothing for observed values

# ── Wait queue for concurrent requests beyond slot capacity ─────────────────
# When a tier has all `parallel_slots` taken, further requests queue on an
# asyncio Condition. While queued, the backend streams {kind:"queued",
# position, eta_sec} SSE events every `position_update_interval_sec`. If the
# wait exceeds `max_wait_sec`, the request is failed with a queue_timeout
# error. If the queue itself is full, the request is rejected immediately
# with HTTP 503 + Retry-After.
queue:
  max_depth_per_tier: 10
  max_wait_sec: 60
  position_update_interval_sec: 2

# ── KV cache pressure manager ───────────────────────────────────────────────
# When the live context for a request would push the tier's KV allocation
# past `spill_trigger_fraction * num_ctx`, `backend/kv_cache_manager.py`
# classifies each message by importance (recency + lexical relevance to
# the live turn + role prior − size penalty) and drops the lowest-scoring
# unpinned segments. System prompts, the current user turn, and linked
# tool_call/result pairs are always pinned. Evicted text is stashed in an
# in-process SpillStore so later turns can recall it.
#
# Acting at 0.92 means we prune before llama.cpp starts paging — the
# degradation curve is non-linear and tokens/sec falls off a cliff once
# true RAM spillover engages.
kv_cache:
  enable: true
  spill_trigger_fraction: 0.92
  reserve_output_tokens: 512
  max_spill_entries_per_conv: 256
  weights:
    recency: 0.45
    relevance: 0.30
    role_prior: 0.15
    size_penalty: 0.10
    hot_window: 4                       # last N turns get an automatic recency boost

# ── Per-model partial residency ─────────────────────────────────────────────
# `backend/model_residency.py` picks a `num_gpu` layer count + mmap/mlock
# posture per load. With enough free VRAM and a non-trivial user turn we
# keep every layer on the card (FULL mode). When the card is tight, we
# drop to PARTIAL (CPU-offloading some layers via mmap) or MINIMAL
# (smallest working offload). A trivial-looking turn shaves an extra
# `low_complexity_savings` fraction of layers so other tiers can share
# the card without eviction.
residency:
  enable: true
  full_headroom_multiplier: 1.15        # free >= cost * this → go FULL
  partial_min_ratio: 0.35               # floor for PARTIAL layer ratio
  minimal_ratio: 0.15                   # floor for MINIMAL mode
  low_complexity_savings: 0.15          # extra layers we're willing to drop for easy turns
  mlock_full_mode: true                 # pin pages when fully resident
  mlock_partial_mode: false             # let CPU side page in/out under memory pressure
