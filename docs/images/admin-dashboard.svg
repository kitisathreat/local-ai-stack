<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="Segoe UI, -apple-system, Roboto, sans-serif" role="img" aria-label="Admin dashboard — Models tab with pull progress, VRAM card, and totals">
  <defs>
    <style><![CDATA[
      .bg     { fill: #0e1114; }
      .alt    { fill: #141820; }
      .panel  { fill: #1a1f28; }
      .fg     { fill: #e5e7eb; }
      .dim    { fill: #8b94a6; }
      .accent { fill: #7c9cff; }
      .success{ fill: #5fd18f; }
      .warn   { fill: #ffb860; }
      .danger { fill: #ff6b6b; }
      .sep    { stroke: #252a34; stroke-width: 1; }
      text    { font-size: 12px; }
      .h1     { font-size: 15px; font-weight: 600; fill: #e5e7eb; }
      .label  { font-size: 10px; fill: #8b94a6; letter-spacing: 0.05em; }
      .big    { font-size: 22px; font-weight: 600; fill: #e5e7eb; }
      .mono   { font-family: ui-monospace, Consolas, monospace; }
    ]]></style>
    <linearGradient id="vgrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#7c9cff"/>
      <stop offset="80%" stop-color="#ffb860"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="980" height="560"/>

  <!-- Title bar -->
  <rect class="alt" width="980" height="56"/>
  <line class="sep" x1="0" y1="56" x2="980" y2="56"/>
  <text class="h1" x="20" y="34">Local AI Stack — Admin</text>
  <text class="dim" x="900" y="34" font-size="11">— ▢ ✕</text>

  <!-- Tab bar (matches gui/windows/admin.py order) -->
  <rect class="panel" x="20" y="68" width="940" height="34" rx="8" stroke="#252a34"/>
  <text class="dim"    x="38"  y="89" font-size="11">Users</text>
  <rect class="alt"    x="86"  y="74" width="74" height="22" rx="5" stroke="#7c9cff"/>
  <text class="accent" x="98"  y="89" font-size="11">Models</text>
  <text class="dim"    x="174" y="89" font-size="11">Tools</text>
  <text class="dim"    x="218" y="89" font-size="11">Airgap</text>
  <text class="dim"    x="266" y="89" font-size="11">VRAM</text>
  <text class="dim"    x="312" y="89" font-size="11">Router</text>
  <text class="dim"    x="362" y="89" font-size="11">Auth</text>
  <text class="dim"    x="402" y="89" font-size="11">Errors</text>
  <text class="dim"    x="450" y="89" font-size="11">Reload</text>

  <!-- Pull-progress table card (Models tab body, left) -->
  <text class="label" x="20" y="124">TIER PULL STATUS · /admin/model-pull-status</text>
  <rect class="panel" x="20" y="132" width="600" height="276" rx="8" stroke="#252a34"/>
  <rect class="alt"   x="20" y="132" width="600" height="28" rx="8"/>
  <line class="sep" x1="20" y1="160" x2="620" y2="160"/>
  <text class="label" x="32"  y="151">TIER</text>
  <text class="label" x="160" y="151">MODEL</text>
  <text class="label" x="380" y="151">SIZE</text>
  <text class="label" x="450" y="151">STATUS</text>
  <text class="label" x="540" y="151">ACTION</text>

  <!-- Row: highest_quality (queued) -->
  <text class="accent mono" x="32" y="184" font-size="11">highest_quality</text>
  <text class="dim mono" x="160" y="184" font-size="11">Qwen3-72B-Q4_K_M</text>
  <text class="fg" x="380" y="184">42 GB</text>
  <text class="dim" x="450" y="184">queued</text>
  <rect class="panel" x="538" y="170" width="68" height="22" rx="5" stroke="#252a34"/>
  <text class="fg" x="554" y="185" font-size="11">Pull</text>
  <line class="sep" x1="20" y1="196" x2="620" y2="196"/>

  <!-- Row: versatile (pulling — animated bar) -->
  <text class="accent mono" x="32" y="220" font-size="11">versatile</text>
  <text class="dim mono" x="160" y="220" font-size="11">Qwen3.6-35B-A3B-Q4_K_M</text>
  <text class="fg" x="380" y="220">21 GB</text>
  <text class="warn" x="450" y="220">pulling 64%</text>
  <rect fill="#141820" x="538" y="208" width="68" height="10" rx="5" stroke="#252a34"/>
  <rect class="warn" x="538" y="208" width="44" height="10" rx="5">
    <animate attributeName="width" values="36;46;42;52;48;58" dur="3s" repeatCount="indefinite"/>
  </rect>
  <line class="sep" x1="20" y1="232" x2="620" y2="232"/>

  <!-- Row: fast (ready) -->
  <text class="accent mono" x="32" y="256" font-size="11">fast</text>
  <text class="dim mono" x="160" y="256" font-size="11">Qwen3.5-9B-Q5_K_M</text>
  <text class="fg" x="380" y="256">7 GB</text>
  <text class="success" x="450" y="256">ready</text>
  <rect class="panel" x="538" y="242" width="68" height="22" rx="5" stroke="#252a34"/>
  <text class="dim" x="552" y="257" font-size="11">Replace</text>
  <line class="sep" x1="20" y1="268" x2="620" y2="268"/>

  <!-- Row: coding -->
  <text class="accent mono" x="32" y="292" font-size="11">coding</text>
  <text class="dim mono" x="160" y="292" font-size="11">Qwen3-Coder-Next-80B-A3B</text>
  <text class="fg" x="380" y="292">26 GB</text>
  <text class="success" x="450" y="292">ready</text>
  <rect class="panel" x="538" y="278" width="68" height="22" rx="5" stroke="#252a34"/>
  <text class="dim" x="552" y="293" font-size="11">Replace</text>
  <line class="sep" x1="20" y1="304" x2="620" y2="304"/>

  <!-- Row: vision -->
  <text class="accent mono" x="32" y="328" font-size="11">vision</text>
  <text class="dim mono" x="160" y="328" font-size="11">Qwen3.6-35B + mmproj</text>
  <text class="fg" x="380" y="328">25 GB</text>
  <text class="success" x="450" y="328">ready · pinned</text>
  <rect class="panel" x="538" y="314" width="68" height="22" rx="5" stroke="#252a34"/>
  <text class="dim" x="552" y="329" font-size="11">Replace</text>
  <line class="sep" x1="20" y1="340" x2="620" y2="340"/>

  <!-- Row: embedding -->
  <text class="accent mono" x="32" y="364" font-size="11">embedding</text>
  <text class="dim mono" x="160" y="364" font-size="11">nomic-embed-text-v1.5</text>
  <text class="fg" x="380" y="364">0.3 GB</text>
  <text class="success" x="450" y="364">ready · pinned</text>
  <rect class="panel" x="538" y="350" width="68" height="22" rx="5" stroke="#252a34"/>
  <text class="dim" x="552" y="365" font-size="11">Replace</text>

  <!-- Footer note -->
  <text class="dim" x="32" y="396" font-size="10.5">Polling every 5 s · sources from config/model-sources.yaml</text>

  <!-- VRAM card (right) -->
  <text class="label" x="640" y="124">VRAM RESIDENCY · /vram</text>
  <rect class="panel" x="640" y="132" width="320" height="276" rx="8" stroke="#252a34"/>

  <text class="label" x="656" y="156">TOTAL / USED</text>
  <text class="big"   x="656" y="186">21.4 / 24.0 GB</text>

  <rect fill="#141820" x="656" y="200" width="288" height="12" rx="6" stroke="#252a34"/>
  <rect x="656" y="200" width="258" height="12" rx="6" fill="url(#vgrad)"/>

  <text class="label" x="656" y="234">LOADED TIERS</text>
  <text class="accent mono" x="656" y="254" font-size="11">tier.versatile</text>
  <text class="dim" x="800" y="254" font-size="11">21 GB · refs 2</text>
  <line class="sep" x1="656" y1="262" x2="944" y2="262"/>
  <text class="accent mono" x="656" y="282" font-size="11">tier.vision</text>
  <text class="dim" x="800" y="282" font-size="11">0.4 GB · pinned</text>
  <line class="sep" x1="656" y1="290" x2="944" y2="290"/>
  <text class="accent mono" x="656" y="310" font-size="11">tier.embedding</text>
  <text class="dim" x="800" y="310" font-size="11">0.3 GB · pinned</text>
  <line class="sep" x1="656" y1="318" x2="944" y2="318"/>
  <text class="accent mono" x="656" y="338" font-size="11">tier.fast</text>
  <text class="dim" x="800" y="338" font-size="11">idle · evictable</text>

  <text class="label" x="656" y="372">SCHEDULER</text>
  <text class="dim" x="656" y="390" font-size="11">LRU + ref-count · 2 GB headroom</text>

  <!-- Totals row -->
  <text class="label" x="20" y="436">TOTALS</text>
  <rect class="panel" x="20"  y="444" width="180" height="48" rx="8" stroke="#252a34"/>
  <text class="label" x="32"  y="462">USERS</text>
  <text class="fg"    x="32"  y="482" font-size="18" font-weight="600">27</text>

  <rect class="panel" x="210" y="444" width="180" height="48" rx="8" stroke="#252a34"/>
  <text class="label" x="222" y="462">CONVERSATIONS</text>
  <text class="fg"    x="222" y="482" font-size="18" font-weight="600">418</text>

  <rect class="panel" x="400" y="444" width="180" height="48" rx="8" stroke="#252a34"/>
  <text class="label" x="412" y="462">RAG DOCS</text>
  <text class="fg"    x="412" y="482" font-size="18" font-weight="600">94 · 41 MB</text>

  <rect class="panel" x="590" y="444" width="180" height="48" rx="8" stroke="#252a34"/>
  <text class="label" x="602" y="462">MEMORIES</text>
  <text class="fg"    x="602" y="482" font-size="18" font-weight="600">312</text>

  <rect class="panel" x="780" y="444" width="180" height="48" rx="8" stroke="#252a34"/>
  <text class="label" x="792" y="462">TOOLS ENABLED</text>
  <text class="fg"    x="792" y="482" font-size="18" font-weight="600">87 / 100</text>

  <!-- Status bar -->
  <text class="dim" x="20" y="528" font-size="10.5">Connected to backend :18000 · admin@local · QSettings keep-alive</text>
  <circle class="success" cx="952" cy="525" r="4"/>
  <text class="dim" x="900" y="529" font-size="10.5">backend ok</text>
</svg>
