<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540"
     role="img" aria-label="First-run setup wizard — Public access page (Cloudflare tunnel), Bloomberg-themed">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
      .face   { font-family: 'IBM Plex Mono', 'Cascadia Code', Consolas, monospace; }
      .bg     { fill: #000000; }
      .panel  { fill: #0a0a0a; }
      .amber  { fill: #FFA028; }
      .amber-dim { fill: #B87513; }
      .yellow { fill: #FFFF00; }
      .green  { fill: #00FF66; }
      .red    { fill: #FF3333; }
      .cyan   { fill: #00DDFF; }
      .header-bg { fill: #8B0000; }
      .border-amber { stroke: #FFA028; stroke-width: 1; fill: none; }
      .border-dim   { stroke: #66421A; stroke-width: 1; fill: none; }
      .b      { font-weight: 600; }
    ]]></style>
  </defs>

  <rect class="bg" width="760" height="540"/>

  <!-- Title bar -->
  <rect class="header-bg" x="0" y="0" width="760" height="22"/>
  <text class="face amber b" x="14" y="16" font-size="11">SETUP WIZARD  ::  STEP 4 / 6  ::  PUBLIC ACCESS</text>
  <text class="face amber-dim" x="744" y="16" font-size="11" text-anchor="end">F1=HELP</text>

  <!-- Step indicator (animated fill on the active step) -->
  <g class="face" font-size="10">
    <text class="amber-dim" x="20" y="46">1 ENV</text>
    <line x1="60" y1="42" x2="100" y2="42" class="border-dim"/>
    <text class="amber-dim" x="106" y="46">2 BIN</text>
    <line x1="146" y1="42" x2="186" y2="42" class="border-dim"/>
    <text class="amber-dim" x="192" y="46">3 MODELS</text>
    <line x1="252" y1="42" x2="292" y2="42" class="border-dim"/>
    <text class="amber b" x="298" y="46">4 PUBLIC</text>
    <line x1="358" y1="42" x2="398" y2="42" class="border-dim"/>
    <text class="amber-dim" x="404" y="46">5 ADMIN</text>
    <line x1="448" y1="42" x2="488" y2="42" class="border-dim"/>
    <text class="amber-dim" x="494" y="46">6 TEST</text>
    <!-- Active dot pulse -->
    <circle cx="280" cy="42" r="3" class="amber">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Body card -->
  <rect class="border-amber" x="20" y="62" width="720" height="420"/>
  <text class="face amber b" x="32" y="86" font-size="14">Public access via Cloudflare Tunnel</text>
  <text class="face amber-dim" x="32" y="106" font-size="11">Optional. Skips to step 5 if you only want LAN access.</text>

  <!-- Two columns -->
  <g class="face">
    <!-- Left column: form -->
    <text class="amber-dim" x="32" y="138" font-size="10">TUNNEL HOSTNAME</text>
    <rect class="border-amber" x="32" y="146" width="320" height="28"/>
    <text class="amber b" x="40" y="166" font-size="12">chat.mylensandi.com</text>
    <rect x="346" y="156" width="2" height="14" class="amber">
      <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
    </rect>

    <text class="amber-dim" x="32" y="200" font-size="10">CREDENTIALS FILE  ::  .json</text>
    <rect class="border-amber" x="32" y="208" width="320" height="28"/>
    <text class="amber" x="40" y="228" font-size="11">5bf79db7-daaa-4225-9fe7-...</text>
    <text class="green b" x="346" y="228" font-size="11" text-anchor="end">browse</text>

    <text class="amber-dim" x="32" y="262" font-size="10">INGRESS</text>
    <rect class="panel" x="32" y="270" width="320" height="84"/>
    <rect class="border-amber" x="32" y="270" width="320" height="84"/>
    <text class="amber"     x="40" y="288" font-size="10.5">- hostname: chat.mylensandi.com</text>
    <text class="amber"     x="40" y="304" font-size="10.5">  service: http://localhost:18000</text>
    <text class="amber-dim" x="40" y="320" font-size="10.5">- hostname: stream.mylensandi.com</text>
    <text class="amber-dim" x="40" y="336" font-size="10.5">  service: http://localhost:8096</text>
    <text class="amber-dim" x="40" y="352" font-size="10.5">- service: http_status:404</text>

    <!-- Right column: live status -->
    <text class="amber-dim" x="396" y="138" font-size="10">CONNECTIVITY CHECK</text>
    <rect class="border-amber" x="396" y="146" width="332" height="208"/>

    <text class="amber-dim" x="408" y="170" font-size="10">cloudflared binary</text>
    <text class="green b"   x="716" y="170" font-size="11" text-anchor="end">found</text>

    <text class="amber-dim" x="408" y="194" font-size="10">tunnel auth (cert.pem)</text>
    <text class="green b"   x="716" y="194" font-size="11" text-anchor="end">valid</text>

    <text class="amber-dim" x="408" y="218" font-size="10">tunnel info → Cloudflare</text>
    <text class="amber b"   x="716" y="218" font-size="11" text-anchor="end" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.2s" fill="freeze"/>
      probing...
    </text>
    <text class="green b"   x="716" y="218" font-size="11" text-anchor="end" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.2s" fill="freeze"/>
      4 conns
    </text>
    <rect x="716" y="218" width="0" height="0">
      <animate attributeName="x" from="716" to="0" begin="2.2s" dur="0.0s" fill="freeze"/>
    </rect>

    <text class="amber-dim" x="408" y="242" font-size="10">DNS routing</text>
    <text class="green b"   x="716" y="242" font-size="11" text-anchor="end" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.2s" fill="freeze"/>
      lax01, lax05, lax08
    </text>

    <text class="amber-dim" x="408" y="266" font-size="10">ingress dispatch</text>
    <text class="green b"   x="716" y="266" font-size="11" text-anchor="end" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.2s" fill="freeze"/>
      ready
    </text>

    <!-- Progress bar across bottom of card -->
    <rect x="408" y="286" width="308" height="6" class="border-dim"/>
    <rect x="408" y="286" width="0" height="6" class="amber">
      <animate attributeName="width" from="0" to="308" begin="0.4s" dur="2.8s" fill="freeze"/>
    </rect>
    <text class="amber-dim" x="408" y="316" font-size="10">writes config.yml + cert to ProgramData</text>
    <text class="amber-dim" x="408" y="332" font-size="10">restarts cloudflared service when "Apply" pressed</text>
  </g>

  <!-- Footer / actions -->
  <rect class="panel" x="20" y="408" width="720" height="46"/>
  <rect class="border-amber" x="20" y="408" width="720" height="46"/>
  <text class="face amber-dim" x="32" y="436" font-size="11">Skip this step if you only need LAN access. You can revisit anytime via the Admin → Cloudflare tab.</text>

  <rect class="border-amber" x="468" y="466" width="124" height="26"/>
  <text class="face amber" x="530" y="484" font-size="11" text-anchor="middle">SKIP</text>

  <rect x="600" y="466" width="140" height="26" class="amber"/>
  <text class="face b" x="670" y="484" font-size="11" text-anchor="middle" fill="#000">APPLY + NEXT</text>

  <!-- Status footer -->
  <rect class="panel" x="0" y="514" width="760" height="22"/>
  <text class="face amber-dim" x="14" y="529" font-size="10">STEP 4 / 6  ::  PUBLIC ACCESS</text>
  <text class="face green b"   x="240" y="529" font-size="10" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.3s" fill="freeze"/>
    READY
  </text>
  <text class="face amber-dim" x="744" y="529" font-size="10" text-anchor="end">elapsed 3.2s</text>
</svg>
