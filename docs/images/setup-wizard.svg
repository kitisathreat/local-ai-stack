<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" font-family="Segoe UI, -apple-system, sans-serif" role="img" aria-label="First-run setup wizard — Public access page (Cloudflare tunnel)">
  <defs>
    <style><![CDATA[
      .bg     { fill: #0f1116; }
      .alt    { fill: #161a22; }
      .panel  { fill: #1a1f28; }
      .fg     { fill: #e5e7eb; }
      .dim    { fill: #8b94a6; }
      .accent { fill: #7c9cff; }
      .ok     { fill: #5fd18f; }
      .warn   { fill: #ffb860; }
      .sep    { stroke: #252a34; stroke-width: 1; }
      text    { font-size: 12px; }
      .h1     { font-size: 17px; font-weight: 600; fill: #e5e7eb; }
      .h2     { font-size: 13px; font-weight: 600; fill: #e5e7eb; }
      .label  { font-size: 10px; fill: #8b94a6; letter-spacing: 0.05em; }
      .mono   { font-family: ui-monospace, Consolas, monospace; }
    ]]></style>
  </defs>

  <rect class="bg" width="760" height="540"/>

  <!-- Title bar -->
  <rect class="alt" width="760" height="34"/>
  <line class="sep" x1="0" y1="34" x2="760" y2="34"/>
  <text class="dim" x="14" y="22" font-size="11">Local AI Stack — Setup</text>
  <text class="dim" x="730" y="22" font-size="12">— ▢ ✕</text>

  <!-- Step rail (left) -->
  <rect class="alt" x="0" y="34" width="190" height="466"/>
  <line class="sep" x1="190" y1="34" x2="190" y2="500"/>

  <text class="label" x="20" y="68">SETUP STEPS</text>

  <g font-size="12">
    <circle class="ok" cx="32" cy="100" r="8"/>
    <text fill="#0e1114" x="29" y="104" font-size="10" font-weight="700">✓</text>
    <text class="dim" x="50" y="104">1 · Welcome &amp; prereqs</text>

    <circle class="ok" cx="32" cy="132" r="8"/>
    <text fill="#0e1114" x="29" y="136" font-size="10" font-weight="700">✓</text>
    <text class="dim" x="50" y="136">2 · Admin account</text>

    <circle class="ok" cx="32" cy="164" r="8"/>
    <text fill="#0e1114" x="29" y="168" font-size="10" font-weight="700">✓</text>
    <text class="dim" x="50" y="168">3 · Secrets</text>

    <circle class="accent" cx="32" cy="196" r="8"/>
    <text fill="#ffffff" x="29" y="200" font-size="10" font-weight="700">4</text>
    <text class="fg" x="50" y="200" font-weight="600">4 · Public access</text>

    <circle fill="#252a34" cx="32" cy="228" r="8"/>
    <text class="dim" x="29" y="232" font-size="10">5</text>
    <text class="dim" x="50" y="232">5 · SMTP</text>

    <circle fill="#252a34" cx="32" cy="260" r="8"/>
    <text class="dim" x="29" y="264" font-size="10">6</text>
    <text class="dim" x="50" y="264">6 · Models</text>

    <circle fill="#252a34" cx="32" cy="292" r="8"/>
    <text class="dim" x="29" y="296" font-size="10">7</text>
    <text class="dim" x="50" y="296">7 · Finish</text>
  </g>

  <text class="label" x="20" y="436">PREREQUISITES</text>
  <text class="ok"  x="20" y="456" font-size="11">✓ Python 3.12.6</text>
  <text class="ok"  x="20" y="472" font-size="11">✓ cloudflared 2024.10.1</text>
  <text class="ok"  x="20" y="488" font-size="11">✓ NVIDIA driver 553.30</text>

  <!-- Page body -->
  <text class="h1" x="216" y="76">Public access</text>
  <text class="dim" x="216" y="98" font-size="11.5" >How do you want users to reach this stack?</text>

  <!-- Radios -->
  <circle fill="#252a34" stroke="#7c9cff" cx="228" cy="134" r="7"/>
  <text class="fg" x="244" y="138" font-size="12.5">Local only</text>
  <text class="dim" x="244" y="154" font-size="11">Bind to 127.0.0.1 — only this machine can reach the API.</text>

  <circle fill="#7c9cff" cx="228" cy="190" r="7"/>
  <circle fill="#0f1116" cx="228" cy="190" r="3"/>
  <text class="accent" x="244" y="194" font-size="12.5" font-weight="600">Cloudflare Tunnel</text>
  <text class="dim" x="244" y="210" font-size="11">Provision a named tunnel + DNS. HTTPS everywhere; no port-forwarding.</text>

  <!-- Tunnel form group -->
  <rect class="panel" x="216" y="226" width="528" height="200" rx="8" stroke="#252a34"/>

  <text class="label"  x="232" y="250">DOMAIN (zone)</text>
  <rect class="alt" x="232" y="256" width="240" height="28" rx="6" stroke="#252a34"/>
  <text class="fg mono" x="244" y="274" font-size="11">mylensandi.com</text>

  <text class="label"  x="492" y="250">CHAT HOSTNAME</text>
  <rect class="alt" x="492" y="256" width="240" height="28" rx="6" stroke="#252a34"/>
  <text class="fg mono" x="504" y="274" font-size="11">chat.mylensandi.com</text>

  <text class="label" x="232" y="306">TUNNEL NAME</text>
  <rect class="alt" x="232" y="312" width="240" height="28" rx="6" stroke="#252a34"/>
  <text class="fg mono" x="244" y="330" font-size="11">local-ai-stack-home</text>

  <text class="label" x="492" y="306">CERT.PEM</text>
  <rect class="alt" x="492" y="312" width="240" height="28" rx="6" stroke="#252a34"/>
  <text class="ok mono" x="504" y="330" font-size="11">✓ ~/.cloudflared/cert.pem</text>

  <!-- Provisioning progress -->
  <rect class="alt" x="232" y="354" width="500" height="56" rx="6" stroke="#7c9cff"/>
  <text class="accent" x="244" y="374" font-size="11.5" font-weight="600">Provisioning tunnel…</text>
  <text class="dim mono" x="244" y="390" font-size="10.5">created tunnel · routing chat.mylensandi.com → :18000 · installing svc</text>
  <rect fill="#0f1116" x="244" y="396" width="476" height="6" rx="3" stroke="#252a34"/>
  <rect class="accent" x="244" y="396" width="320" height="6" rx="3">
    <animate attributeName="width" values="120;320;380;460" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Wizard nav buttons -->
  <line class="sep" x1="0" y1="500" x2="760" y2="500"/>
  <rect class="panel" x="216" y="510" width="68" height="24" rx="5" stroke="#252a34"/>
  <text class="dim" x="234" y="526" font-size="11">&lt; Back</text>
  <rect class="panel" x="592" y="510" width="68" height="24" rx="5" stroke="#252a34"/>
  <text class="dim" x="610" y="526" font-size="11">Skip</text>
  <rect class="accent" x="668" y="510" width="76" height="24" rx="5"/>
  <text fill="#ffffff" x="690" y="526" font-size="11" font-weight="600">Next &gt;</text>
</svg>
