<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360"
     role="img" aria-label="Sign-in dialog — Bloomberg Terminal aesthetic">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
      .face   { font-family: 'IBM Plex Mono', 'Cascadia Code', Consolas, monospace; }
      .bg     { fill: #000000; }
      .amber  { fill: #FFA028; }
      .amber-dim { fill: #B87513; }
      .green  { fill: #00FF66; }
      .red    { fill: #FF3333; }
      .border-amber { stroke: #FFA028; stroke-width: 1; fill: none; }
      .border-dim   { stroke: #66421A; stroke-width: 1; fill: none; }
      .b      { font-weight: 600; }
    ]]></style>
  </defs>

  <rect class="bg" width="480" height="360"/>

  <!-- Frame -->
  <rect class="border-amber" x="60" y="40" width="360" height="280"/>
  <rect x="60" y="40" width="360" height="280" fill="#0a0a0a"/>
  <rect class="border-amber" x="60" y="40" width="360" height="280"/>

  <!-- Title -->
  <text class="face amber b" x="240" y="74" font-size="14" text-anchor="middle"
        letter-spacing="0.08em">LOCAL AI STACK</text>
  <line x1="92" y1="86" x2="388" y2="86" class="border-amber"/>

  <!-- Username -->
  <text class="face amber-dim" x="92" y="118" font-size="10" letter-spacing="0.08em">USERNAME</text>
  <rect class="border-dim" x="92" y="124" width="296" height="28"/>
  <text class="face amber" x="100" y="143" font-size="13">kitisathreat</text>
  <rect x="178" y="132" width="8" height="14" fill="#FFA028">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Password -->
  <text class="face amber-dim" x="92" y="178" font-size="10" letter-spacing="0.08em">PASSWORD</text>
  <rect class="border-dim" x="92" y="184" width="296" height="28"/>
  <text class="face amber" x="100" y="203" font-size="14" letter-spacing="0.2em">••••••••••</text>

  <!-- Sign in button -->
  <rect x="92" y="232" width="296" height="34" fill="#FFA028"/>
  <text class="face b" x="240" y="254" font-size="12" text-anchor="middle"
        letter-spacing="0.1em" fill="#000">SIGN IN</text>

  <!-- Status / connection probe (animated) -->
  <text class="face amber-dim" x="92" y="294" font-size="10" letter-spacing="0.06em">STATUS</text>
  <text class="face green b" x="148" y="294" font-size="10" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.3s" fill="freeze"/>
    BACKEND ONLINE
  </text>
  <circle cx="380" cy="290" r="3" class="green">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom info bar -->
  <text class="face amber-dim" x="240" y="340" font-size="9" text-anchor="middle"
        letter-spacing="0.1em">F1 HELP · F2 RESET · F8 ABORT</text>
</svg>
