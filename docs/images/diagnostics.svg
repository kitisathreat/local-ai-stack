<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540"
     role="img" aria-label="Diagnostics window — health check results with auto-fix, Bloomberg-themed">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
      .face   { font-family: 'IBM Plex Mono', 'Cascadia Code', Consolas, monospace; }
      .bg     { fill: #000000; }
      .panel  { fill: #0a0a0a; }
      .amber  { fill: #FFA028; }
      .amber-dim { fill: #B87513; }
      .yellow { fill: #FFFF00; }
      .green  { fill: #00FF66; }
      .red    { fill: #FF3333; }
      .cyan   { fill: #00DDFF; }
      .header-bg { fill: #8B0000; }
      .border-amber { stroke: #FFA028; stroke-width: 1; fill: none; }
      .border-dim   { stroke: #66421A; stroke-width: 1; fill: none; }
      .b      { font-weight: 600; }
    ]]></style>
  </defs>

  <rect class="bg" width="900" height="540"/>
  <rect class="header-bg" x="0" y="0" width="900" height="22"/>
  <text class="face amber b" x="14" y="16" font-size="11">DIAGNOSTICS  ::  python -m backend.diagnostics</text>
  <text class="face amber-dim" x="884" y="16" font-size="11" text-anchor="end">F2=AUTOFIX  F8=ABORT</text>

  <!-- Top progress -->
  <text class="face amber-dim" x="14" y="48" font-size="11">RUNNING 14 CHECKS</text>
  <rect x="14" y="56" width="872" height="6" class="border-dim"/>
  <rect x="14" y="56" width="0" height="6" class="amber">
    <animate attributeName="width" from="0" to="872" begin="0s" dur="3.6s" fill="freeze"/>
  </rect>
  <text class="face green b" x="884" y="76" font-size="11" text-anchor="end" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.3s" fill="freeze"/>
    14 / 14 PASS  ::  0 FAIL
  </text>

  <!-- Check list -->
  <g class="face" font-size="11.5">
    <!-- Each row: timestamp + status pill + check name + detail -->
    <g>
      <text class="amber-dim" x="14" y="100">12:31:02</text>
      <text class="green b"   x="80" y="100" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="100">PowerShell version  ≥ 7.0</text>
      <text class="amber-dim" x="884" y="100" font-size="10" text-anchor="end" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.2s" fill="freeze"/>
        7.4.1
      </text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="120">12:31:02</text>
      <text class="green b"   x="80" y="120" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="120">CUDA toolkit + nvcc ≥ 12.0</text>
      <text class="amber-dim" x="884" y="120" font-size="10" text-anchor="end" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.2s" fill="freeze"/>
        12.4.131
      </text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="140">12:31:03</text>
      <text class="green b"   x="80" y="140" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="140">RTX A4500 Laptop GPU detected</text>
      <text class="amber-dim" x="884" y="140" font-size="10" text-anchor="end" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.2s" fill="freeze"/>
        16 GB VRAM
      </text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="160">12:31:03</text>
      <text class="green b"   x="80" y="160" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="160">Python 3.12 venvs intact (backend, jupyter, agents)</text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="180">12:31:04</text>
      <text class="green b"   x="80" y="180" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="180">llama-server binary  ::  b8992</text>
      <text class="amber-dim" x="884" y="180" font-size="10" text-anchor="end" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.2s" fill="freeze"/>
        --jinja supported
      </text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="200">12:31:04</text>
      <text class="yellow b"  x="80" y="200" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.2s" fill="freeze"/>
        WARN
      </text>
      <text class="amber"     x="118" y="200">cloudflared service in pending-delete state</text>
      <text class="cyan"      x="884" y="200" font-size="10" text-anchor="end" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.2s" fill="freeze"/>
        autofix avail
      </text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="220">12:31:05</text>
      <text class="green b"   x="80" y="220" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="220">Qdrant healthy on :6333</text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="240">12:31:06</text>
      <text class="green b"   x="80" y="240" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="240">Embedding tier  ::  Qwen3-Embedding-8B  Q5_K_M</text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="260">12:31:06</text>
      <text class="green b"   x="80" y="260" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="260">Reranker tier  ::  Qwen3-Reranker-4B</text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="280">12:31:07</text>
      <text class="green b"   x="80" y="280" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="280">SQLite schema 12  ::  users + conversations + memory</text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="300">12:31:07</text>
      <text class="green b"   x="80" y="300" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="300">Auth secret + history secret present in .env</text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="320">12:31:08</text>
      <text class="green b"   x="80" y="320" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="320">Tools registry loaded  ::  91 tools across 23 modules</text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="340">12:31:09</text>
      <text class="green b"   x="80" y="340" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="340">Skills registry loaded  ::  7 skills</text>
    </g>
    <g>
      <text class="amber-dim" x="14" y="360">12:31:10</text>
      <text class="green b"   x="80" y="360" opacity="0">
        <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.2s" fill="freeze"/>
        OK
      </text>
      <text class="amber"     x="118" y="360">Backend  ::  /healthz returned 200 (degraded=false)</text>
    </g>
  </g>

  <!-- Autofix section -->
  <rect class="border-amber" x="14" y="386" width="872" height="118"/>
  <text class="face amber b" x="22" y="404" font-size="12">AUTOFIX QUEUE  ::  1 ACTION SUGGESTED</text>
  <g class="face" font-size="11">
    <text class="amber-dim" x="22" y="426">[1]</text>
    <text class="amber"     x="50" y="426">cloudflared service pending-delete →</text>
    <text class="cyan"      x="320" y="426">sc delete cloudflared; cloudflared service install</text>
    <text class="amber-dim" x="22" y="446">est. impact</text>
    <text class="amber"     x="120" y="446">restores tunnel persistence after the next reboot; no impact on running tunnel</text>
    <text class="amber-dim" x="22" y="466">est. duration</text>
    <text class="amber"     x="120" y="466">&lt; 5s</text>
  </g>

  <!-- Action buttons -->
  <rect class="border-amber" x="606" y="476" width="120" height="22"/>
  <text class="face amber" x="666" y="491" font-size="11" text-anchor="middle">DISMISS</text>
  <rect x="734" y="476" width="142" height="22" class="amber"/>
  <text class="face b" x="805" y="491" font-size="11" text-anchor="middle" fill="#000">APPLY AUTOFIX</text>

  <!-- Status footer -->
  <rect class="panel" x="0" y="518" width="900" height="22"/>
  <text class="face amber-dim" x="14" y="533" font-size="10">STATUS</text>
  <text class="face green b"   x="62" y="533" font-size="10" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.3s" fill="freeze"/>
    HEALTHY (1 warning)
  </text>
  <text class="face amber-dim" x="884" y="533" font-size="10" text-anchor="end">14 / 14 checks</text>
</svg>
