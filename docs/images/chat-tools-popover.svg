<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600"
     role="img" aria-label="Chat Tools popover — tier→group→subgroup tree, Bloomberg-themed">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
      .face   { font-family: 'IBM Plex Mono', 'Cascadia Code', Consolas, monospace; }
      .bg     { fill: #000000; }
      .panel  { fill: #0a0a0a; }
      .panel2 { fill: #161616; }
      .amber  { fill: #FFA028; }
      .amber-dim { fill: #B87513; }
      .green  { fill: #00FF66; }
      .red    { fill: #FF3333; }
      .cyan   { fill: #00DDFF; }
      .yellow { fill: #FFFF00; }
      .header-bg { fill: #8B0000; }
      .border-amber { stroke: #FFA028; stroke-width: 1; fill: none; }
      .border-dim   { stroke: #66421A; stroke-width: 1; fill: none; }
      .b      { font-weight: 600; }
    ]]></style>
  </defs>

  <rect class="bg" width="720" height="600"/>

  <!-- Composer (bottom edge, anchoring) -->
  <rect class="header-bg" x="0" y="0" width="720" height="22"/>
  <text class="face amber b" x="14" y="16" font-size="11">CHAT  ::  TOOLS POPOVER</text>

  <rect class="panel" x="0" y="558" width="720" height="42"/>
  <rect class="border-amber" x="14" y="568" width="540" height="28"/>
  <text class="face amber-dim" x="22" y="586" font-size="11">ask anything…</text>
  <rect x="566" y="568" width="60" height="28" fill="#FFA028"/>
  <text class="face b" x="596" y="586" font-size="11" text-anchor="middle" fill="#000">SEND</text>
  <rect class="border-amber" x="638" y="568" width="68" height="28"/>
  <text class="face amber" x="672" y="586" font-size="11" text-anchor="middle">TOOLS</text>

  <!-- Popover anchor pointer -->
  <polyline points="660,558 666,548 672,558" stroke="#FFA028" fill="#0a0a0a"/>
  <line x1="660" y1="558" x2="672" y2="558" stroke="#0a0a0a" stroke-width="2"/>

  <!-- Popover frame -->
  <rect class="border-amber" x="34" y="42" width="652" height="510"/>
  <rect x="34" y="42" width="652" height="510" fill="#0a0a0a"/>
  <rect class="border-amber" x="34" y="42" width="652" height="510"/>

  <!-- Search bar -->
  <text class="face amber b" x="48" y="68" font-size="12">TOOLS</text>
  <text class="face amber-dim" x="672" y="68" font-size="10" text-anchor="end">23 enabled / 91 total</text>
  <rect class="border-dim" x="48" y="78" width="624" height="26"/>
  <text class="face amber-dim" x="58" y="95" font-size="11">filter…</text>

  <!-- Tier 1 -->
  <text class="face amber-dim" x="48" y="126" font-size="10">NETWORK / EXTERNAL APIs</text>
  <line x1="48" y1="130" x2="672" y2="130" class="border-dim"/>

  <!-- Group: research -->
  <g>
    <text class="face amber b" x="60" y="152" font-size="11">research</text>
    <text class="face amber-dim" x="120" y="152" font-size="10">3 subgroups</text>
    <text class="face green b" x="660" y="152" font-size="10" text-anchor="end">5 / 12</text>
    <!-- Open chevron -->
    <polyline points="48,148 52,152 48,156" stroke="#FFA028" fill="none"/>
    <!-- Animated subgroup expand -->
    <g>
      <rect x="60" y="158" width="612" height="0" class="panel2">
        <animate attributeName="height" values="0;78;78;0;0" dur="6s" repeatCount="indefinite" keyTimes="0;0.3;0.65;0.85;1"/>
      </rect>
      <g opacity="0">
        <animate attributeName="opacity" values="0;1;1;0;0" dur="6s" repeatCount="indefinite" keyTimes="0;0.3;0.65;0.85;1"/>
        <text class="face amber-dim" x="76" y="174" font-size="10">academic citations</text>
        <text class="face amber"     x="240" y="174" font-size="10">crossref</text>
        <text class="face green b"   x="660" y="174" font-size="10" text-anchor="end">2 / 4 ON</text>

        <text class="face amber-dim" x="76" y="194" font-size="10">code search</text>
        <text class="face amber"     x="240" y="194" font-size="10">github · sourcegraph</text>
        <text class="face green b"   x="660" y="194" font-size="10" text-anchor="end">2 / 4 ON</text>

        <text class="face amber-dim" x="76" y="214" font-size="10">web search</text>
        <text class="face amber"     x="240" y="214" font-size="10">brave · ddg</text>
        <text class="face yellow b"  x="660" y="214" font-size="10" text-anchor="end">1 / 4 ON</text>
      </g>
    </g>
  </g>

  <!-- Group: connectors -->
  <g>
    <text class="face amber b" x="60" y="252" font-size="11">connectors</text>
    <text class="face amber-dim" x="138" y="252" font-size="10">14 services</text>
    <text class="face green b" x="660" y="252" font-size="10" text-anchor="end">3 / 14</text>
    <polyline points="48,248 52,252 48,256" stroke="#FFA028" fill="none"/>
  </g>

  <!-- Group: cloud -->
  <g>
    <text class="face amber b" x="60" y="278" font-size="11">cloud platforms</text>
    <text class="face amber-dim" x="172" y="278" font-size="10">3 services</text>
    <text class="face amber-dim" x="660" y="278" font-size="10" text-anchor="end">0 / 3</text>
    <polyline points="48,274 52,278 48,282" stroke="#FFA028" fill="none"/>
  </g>

  <!-- Tier 2 -->
  <text class="face amber-dim" x="48" y="318" font-size="10">LOCAL / FILESYSTEM / SHELL</text>
  <line x1="48" y1="322" x2="672" y2="322" class="border-dim"/>

  <g>
    <text class="face amber b" x="60" y="344" font-size="11">filesystem</text>
    <text class="face amber-dim" x="142" y="344" font-size="10">read · write · diff</text>
    <text class="face green b" x="660" y="344" font-size="10" text-anchor="end">8 / 8</text>
  </g>
  <g>
    <text class="face amber b" x="60" y="370" font-size="11">shell</text>
    <text class="face amber-dim" x="100" y="370" font-size="10">bash · pwsh</text>
    <text class="face green b" x="660" y="370" font-size="10" text-anchor="end">2 / 2</text>
  </g>

  <!-- Tier 3 -->
  <text class="face amber-dim" x="48" y="410" font-size="10">EXECUTION / AGENTS</text>
  <line x1="48" y1="414" x2="672" y2="414" class="border-dim"/>

  <g>
    <text class="face amber b" x="60" y="436" font-size="11">code interpreter</text>
    <text class="face amber-dim" x="184" y="436" font-size="10">jupyter sandbox</text>
    <text class="face green b" x="660" y="436" font-size="10" text-anchor="end">3 / 3</text>
  </g>
  <g>
    <text class="face amber b" x="60" y="462" font-size="11">multi-agent</text>
    <text class="face amber-dim" x="156" y="462" font-size="10">spawn · orchestrate · synthesize</text>
    <text class="face green b" x="660" y="462" font-size="10" text-anchor="end">3 / 3</text>
  </g>

  <!-- Toggle pulse animation: a checkbox flips on partway through -->
  <rect class="border-amber" x="640" y="171" width="14" height="6" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" dur="6s" repeatCount="indefinite" keyTimes="0;0.45;0.5;0.85;1"/>
  </rect>
  <rect x="640" y="171" width="14" height="6" class="green" opacity="0">
    <animate attributeName="opacity" values="0;0;0;1;1;0" dur="6s" repeatCount="indefinite" keyTimes="0;0.5;0.55;0.6;0.85;1"/>
  </rect>

  <!-- Footer -->
  <line x1="48" y1="510" x2="672" y2="510" class="border-dim"/>
  <text class="face amber-dim" x="48" y="528" font-size="10">CLICK A GROUP TO EXPAND  ·  TOGGLE ANY ROW WITH SPACE</text>
  <text class="face amber-dim" x="672" y="528" font-size="10" text-anchor="end">ESC to close</text>
</svg>
