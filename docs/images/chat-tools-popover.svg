<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Animated mockup of the chat 🔧 Tools popover: tier → group → subgroup tree, module-aggregated rows with friendly display names, master toggles. Cycles between collapsed and drilled-in states.">
  <defs>
    <style><![CDATA[
      .bg { fill: #0e1114; }
      .panel { fill: #1a1f28; }
      .alt { fill: #141820; }
      .border { stroke: #252a34; stroke-width: 1; fill: none; }
      .fg { fill: #e5e7eb; }
      .dim { fill: #8b94a6; }
      .accent { fill: #7c9cff; }
      .danger { fill: #ff6b6b; }
      .success { fill: #5fd18f; }
      text { font-size: 12px; fill: #e5e7eb; }
      .meta { font-size: 10px; fill: #8b94a6; }
      .count { font-size: 11px; fill: #8b94a6; }
      .tier-row { font-size: 12.5px; font-weight: 600; }
      .group-row { font-size: 12.5px; font-weight: 500; }
      .sub-row { font-size: 12px; fill: #b6bbc7; }
      .module-row { font-size: 12px; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

      /* The drilled-in subtree fades from invisible at t=0 to visible at t≈4s,
         then back, on a 9s loop — gives a "click → expand → review → collapse"
         feel without needing JS. */
      #drilled { opacity: 0; }
      #drilled.show { opacity: 1; }

      /* Toggle slider that flips on partway through the drill, to show a
         user enabling a module mid-look. */
      .slider-knob { fill: #2a2f3a; }
    ]]></style>
  </defs>

  <!-- Backdrop (chat composer area, dimmed, behind the popover) -->
  <rect class="bg" width="720" height="600"/>
  <line class="border" x1="0" y1="540" x2="720" y2="540"/>
  <rect class="alt" x="20" y="552" width="600" height="36" rx="6" stroke="#252a34"/>
  <text class="dim" x="34" y="575">Message Versatile…</text>
  <rect class="accent" x="630" y="552" width="68" height="36" rx="6"/>
  <text fill="#ffffff" font-weight="600" x="652" y="575">Send</text>

  <!-- Composer toolbar with the 🔧 Tools button (highlighted, pulsing) -->
  <rect class="alt" x="20" y="510" width="84" height="22" rx="4" stroke="#7c9cff">
    <animate attributeName="stroke" values="#7c9cff;#a5bfff;#7c9cff" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text fill="#7c9cff" x="32" y="525" font-size="11">🔧 Tools</text>
  <text class="meta mono" x="78" y="525" font-size="11">(8)</text>

  <!-- ── Popover, anchored above the Tools button ──────────────── -->
  <!-- Frame -->
  <g transform="translate(20, 14)">
    <rect class="panel" width="480" height="486" rx="8" stroke="#252a34"/>

    <!-- Filter input -->
    <rect class="alt" x="10" y="10" width="460" height="28" rx="4" stroke="#252a34"/>
    <text class="dim" x="22" y="29">Filter tools…</text>

    <!-- ───────────────── COLLAPSED VIEW (first ~4s of loop) ───────────────── -->
    <!-- Always-visible top-level structure. Both tier headers shown collapsed
         with their counts + master switches. -->
    <g id="collapsed">
      <!-- Tier 1: Network-only Tools (collapsed) -->
      <rect class="alt" x="10" y="50" width="460" height="32" rx="4"/>
      <text class="dim" x="22" y="71" font-size="10">▸</text>
      <text class="tier-row" x="40" y="71">Network-only Tools</text>
      <text class="count" x="408" y="71" text-anchor="end">415</text>
      <!-- Master toggle (off) -->
      <rect fill="#2a2f3a" x="420" y="60" width="36" height="14" rx="7"/>
      <circle class="slider-knob" cx="429" cy="67" r="5" fill="#e5e7eb"/>

      <!-- Tier 2: Host / System Access (collapsed) -->
      <rect class="alt" x="10" y="88" width="460" height="32" rx="4"/>
      <text class="dim" x="22" y="109" font-size="10">▸</text>
      <text class="tier-row" x="40" y="109">Host / System Access</text>
      <text class="count" x="408" y="109" text-anchor="end">205</text>
      <rect fill="#2a2f3a" x="420" y="98" width="36" height="14" rx="7"/>
      <circle class="slider-knob" cx="429" cy="105" r="5" fill="#e5e7eb"/>

      <!-- Caption explaining the default state -->
      <text class="meta" x="10" y="146">Default state: tier headers collapsed; click to drill in.</text>
      <text class="meta" x="10" y="162">Aggregated 620 individual tool methods → 152 module rows.</text>
    </g>

    <!-- ───────────────── DRILLED VIEW (fades in mid-loop) ────────────────── -->
    <g id="drilled" opacity="0">
      <animate attributeName="opacity" keyTimes="0;0.32;0.55;0.78;1" values="0;0;1;1;0" dur="9s" repeatCount="indefinite"/>

      <!-- Tier 1: Network-only Tools (EXPANDED) — overlay on top of collapsed row -->
      <rect class="alt" x="10" y="50" width="460" height="32" rx="4"/>
      <text class="accent" x="22" y="71" font-size="10">▾</text>
      <text class="tier-row" x="40" y="71">Network-only Tools</text>
      <text class="count" x="408" y="71" text-anchor="end">415</text>
      <rect fill="#2a2f3a" x="420" y="60" width="36" height="14" rx="7"/>
      <circle class="slider-knob" cx="429" cy="67" r="5" fill="#e5e7eb"/>

      <!-- Group: Research & Academia (expanded) -->
      <text class="dim" x="36" y="106" font-size="10">▾</text>
      <text class="group-row" x="52" y="106">Research &amp; Academia</text>
      <text class="count" x="408" y="106" text-anchor="end">92</text>
      <rect fill="#2a2f3a" x="420" y="95" width="36" height="14" rx="7"/>
      <circle class="slider-knob" cx="429" cy="102" r="5" fill="#e5e7eb"/>

      <!-- Subgroup: Cross-disciplinary (expanded) -->
      <text class="dim" x="50" y="135" font-size="10">▾</text>
      <text class="sub-row" x="64" y="135">Cross-disciplinary</text>
      <text class="count" x="408" y="135" text-anchor="end">15</text>

      <!-- Module rows under Cross-disciplinary -->
      <!-- Row 1: Crossref -->
      <text class="module-row" x="80" y="159">Academic citations (Crossref)</text>
      <text class="count" x="394" y="159" text-anchor="end">3</text>
      <rect fill="#2a2f3a" x="420" y="148" width="36" height="14" rx="7"/>
      <circle class="slider-knob" cx="429" cy="155" r="5" fill="#e5e7eb"/>

      <!-- Row 2: Doaj -->
      <text class="module-row" x="80" y="183">Open-access journals (DOAJ)</text>
      <text class="count" x="394" y="183" text-anchor="end">2</text>
      <rect fill="#2a2f3a" x="420" y="172" width="36" height="14" rx="7"/>
      <circle class="slider-knob" cx="429" cy="179" r="5" fill="#e5e7eb"/>

      <!-- Row 3: OpenAlex — gets toggled on mid-animation -->
      <text class="module-row" x="80" y="207">Academic papers &amp; metadata (OpenAlex)</text>
      <text class="count" x="394" y="207" text-anchor="end">3</text>
      <!-- Animated toggle: slides from off (#2a2f3a) → on (#7c9cff) at t≈5s -->
      <rect x="420" y="196" width="36" height="14" rx="7" fill="#2a2f3a">
        <animate attributeName="fill"
                 keyTimes="0;0.55;0.62;0.78;1"
                 values="#2a2f3a;#2a2f3a;#7c9cff;#7c9cff;#2a2f3a"
                 dur="9s" repeatCount="indefinite"/>
      </rect>
      <circle r="5" cy="203" cx="429" fill="#e5e7eb">
        <animate attributeName="cx"
                 keyTimes="0;0.55;0.62;0.78;1"
                 values="429;429;447;447;429"
                 dur="9s" repeatCount="indefinite"/>
      </circle>

      <!-- Row 4: Semantic Scholar -->
      <text class="module-row" x="80" y="231">Academic papers (Semantic Scholar)</text>
      <text class="count" x="394" y="231" text-anchor="end">3</text>
      <rect fill="#2a2f3a" x="420" y="220" width="36" height="14" rx="7"/>
      <circle class="slider-knob" cx="429" cy="227" r="5" fill="#e5e7eb"/>

      <!-- Row 5: Unpaywall -->
      <text class="module-row" x="80" y="255">Free-version finder (Unpaywall)</text>
      <text class="count" x="394" y="255" text-anchor="end">2</text>
      <rect fill="#2a2f3a" x="420" y="244" width="36" height="14" rx="7"/>
      <circle class="slider-knob" cx="429" cy="251" r="5" fill="#e5e7eb"/>

      <!-- Row 6: Zenodo -->
      <text class="module-row" x="80" y="279">Open research data (Zenodo)</text>
      <text class="count" x="394" y="279" text-anchor="end">2</text>
      <rect fill="#2a2f3a" x="420" y="268" width="36" height="14" rx="7"/>
      <circle class="slider-knob" cx="429" cy="275" r="5" fill="#e5e7eb"/>

      <!-- Following collapsed subgroups (peers of Cross-disciplinary) -->
      <text class="dim" x="50" y="305" font-size="10">▸</text>
      <text class="sub-row" x="64" y="305">Computer Science</text>
      <text class="count" x="408" y="305" text-anchor="end">3</text>

      <text class="dim" x="50" y="325" font-size="10">▸</text>
      <text class="sub-row" x="64" y="325">Life Sciences</text>
      <text class="count" x="408" y="325" text-anchor="end">27</text>

      <text class="dim" x="50" y="345" font-size="10">▸</text>
      <text class="sub-row" x="64" y="345">Physical Sciences</text>
      <text class="count" x="408" y="345" text-anchor="end">12</text>

      <text class="dim" x="50" y="365" font-size="10">▸</text>
      <text class="sub-row" x="64" y="365">Earth &amp; Climate</text>
      <text class="count" x="408" y="365" text-anchor="end">13</text>

      <text class="dim" x="50" y="385" font-size="10">▸</text>
      <text class="sub-row" x="64" y="385">Reference</text>
      <text class="count" x="408" y="385" text-anchor="end">14</text>

      <!-- Sibling collapsed groups (peers of Research & Academia) -->
      <text class="dim" x="36" y="409" font-size="10">▸</text>
      <text class="group-row" x="52" y="409">Finance &amp; Economics</text>
      <text class="count" x="408" y="409" text-anchor="end">73</text>

      <text class="dim" x="36" y="429" font-size="10">▸</text>
      <text class="group-row" x="52" y="429">News &amp; Public Affairs</text>
      <text class="count" x="408" y="429" text-anchor="end">28</text>

      <text class="dim" x="36" y="449" font-size="10">▸</text>
      <text class="group-row" x="52" y="449">Entertainment &amp; Personal Media</text>
      <text class="count" x="408" y="449" text-anchor="end">140</text>

      <text class="dim" x="36" y="469" font-size="10">▸</text>
      <text class="group-row" x="52" y="469">Culture &amp; Heritage</text>
      <text class="count" x="408" y="469" text-anchor="end">16</text>
    </g>
  </g>
</svg>
