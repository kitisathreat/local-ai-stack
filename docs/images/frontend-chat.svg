<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Animated mockup of the chat UI running a collaborative multi-agent request">
  <defs>
    <style><![CDATA[
      .bg { fill: #0e1114; }
      .panel { fill: #1a1f28; }
      .alt { fill: #141820; }
      .border { stroke: #252a34; stroke-width: 1; fill: none; }
      .fg { fill: #e5e7eb; }
      .dim { fill: #8b94a6; }
      .accent { fill: #7c9cff; }
      .accent-dim { fill: #3d5bbf; }
      .success { fill: #5fd18f; }
      .warn { fill: #ffb860; }
      .danger { fill: #ff6b6b; }
      .sep { stroke: #252a34; stroke-width: 1; }
      text { font-size: 12px; }
      .title { font-size: 13px; font-weight: 600; fill: #e5e7eb; }
      .meta { font-size: 10px; fill: #8b94a6; }
      .chip { fill: #1a1f28; stroke: #252a34; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    ]]></style>
  </defs>

  <!-- Root background -->
  <rect class="bg" width="900" height="640"/>

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <rect class="alt" x="0" y="0" width="240" height="640"/>
  <line class="sep" x1="240" y1="0" x2="240" y2="640"/>

  <text class="title" x="20" y="30">Local AI Stack</text>
  <rect class="chip" x="180" y="16" width="20" height="20" rx="4"/>
  <text class="dim" x="187" y="30">⚙</text>
  <rect class="chip" x="205" y="16" width="20" height="20" rx="4"/>
  <text class="fg" x="212" y="30">+</text>
  <line class="sep" x1="0" y1="54" x2="240" y2="54"/>

  <rect class="panel" x="10" y="66" width="220" height="30" rx="6"/>
  <text class="fg" x="20" y="85">RAG → pgvector migration</text>
  <text class="dim" x="20" y="115">Response-mode experiments</text>
  <text class="dim" x="20" y="140">VRAM scheduler tuning</text>
  <text class="dim" x="20" y="165">Compose tier overrides</text>
  <text class="dim" x="20" y="190">Debug SSE backpressure</text>
  <text class="dim" x="20" y="215">Qdrant upload flow</text>
  <text class="dim" x="20" y="240">Roadmap triage</text>

  <line class="sep" x1="0" y1="610" x2="240" y2="610"/>
  <text class="dim" x="20" y="628">you@example.com · <tspan fill="#7c9cff">sign out</tspan></text>

  <!-- ── Header ───────────────────────────────────────────── -->
  <line class="sep" x1="240" y1="54" x2="900" y2="54"/>

  <!-- Tier picker -->
  <rect class="alt" x="252" y="14" width="186" height="28" rx="8" stroke="#252a34"/>
  <rect class="panel" x="258" y="18" width="62" height="20" rx="5"/>
  <text class="fg" x="266" y="32" font-size="11">Versatile</text>
  <text class="dim" x="328" y="32" font-size="11">Fast</text>
  <text class="dim" x="362" y="32" font-size="11">Coding</text>
  <text class="dim" x="402" y="32" font-size="11">Vision</text>

  <!-- Reasoning toggle -->
  <rect class="alt" x="446" y="14" width="106" height="28" rx="6" stroke="#252a34"/>
  <text class="dim" x="454" y="32" font-size="11">🧠 reason: auto ▾</text>

  <!-- Response mode picker -->
  <rect class="alt" x="560" y="14" width="92" height="28" rx="6" stroke="#252a34"/>
  <text class="dim" x="568" y="32" font-size="11">⚡ Immediate ▾</text>

  <!-- Multi-agent toggle (NEW — admin only, currently active) -->
  <rect class="alt" x="660" y="14" width="118" height="28" rx="6" stroke="#7c9cff" id="ma-toggle">
    <animate attributeName="stroke" values="#7c9cff;#a5bfff;#7c9cff" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <text class="accent" x="668" y="32" font-size="11">🤝 multi-agent</text>
  <circle class="accent" cx="770" cy="28" r="3"/>

  <!-- Admin button + email -->
  <rect class="panel" x="786" y="14" width="44" height="28" rx="6" stroke="#252a34"/>
  <text class="fg" x="795" y="32" font-size="11">Admin</text>
  <text class="dim" x="838" y="32" font-size="11">you@…</text>

  <!-- ── Chat body ────────────────────────────────────────── -->
  <!-- User message -->
  <rect class="accent-dim" x="380" y="76" width="380" height="48" rx="10"/>
  <text fill="#ffffff" x="396" y="98">Compare Python, Rust, and Go for a high-throughput</text>
  <text fill="#ffffff" x="396" y="116">web service. Cover concurrency and ecosystem.</text>

  <!-- Assistant tier label -->
  <text class="meta" x="260" y="144">versatile · multi-agent · collaborative</text>

  <!-- ── Multi-agent step panel (agent.* SSE events) ─────── -->
  <rect class="panel" x="260" y="152" width="620" height="98" rx="10" stroke="#7c9cff"/>

  <!-- Step 1: Plan -->
  <circle class="success" cx="276" cy="174" r="5"/>
  <text class="fg" x="290" y="178">Planning subtasks</text>
  <text class="dim" x="404" y="178" font-size="10">→ 3 subtasks</text>

  <!-- Step 2: Workers -->
  <circle class="success" cx="276" cy="196" r="5"/>
  <text class="fg" x="290" y="200">Spawning parallel workers</text>
  <text class="dim" x="430" y="200" font-size="10">→ python · rust · go (tier.fast)</text>

  <!-- Step 3: Refine (animated to highlight collab feature) -->
  <circle class="accent" cx="276" cy="218" r="5">
    <animate attributeName="r" values="5;7;5" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <text class="fg" x="290" y="222">Refining drafts (round 2 of 3)</text>
  <text class="dim" x="430" y="222" font-size="10">peers cross-reading drafts</text>

  <!-- Step 4: Synthesize (pending) -->
  <circle class="dim" cx="276" cy="240" r="5"/>
  <text class="dim" x="290" y="244">Synthesizing</text>

  <!-- ── Worker cards row (live) ─────────────────────────── -->
  <g id="worker-cards" font-size="10">
    <!-- Worker 1 — done -->
    <rect class="panel" x="260" y="262" width="200" height="74" rx="8" stroke="#252a34"/>
    <rect fill="#5fd18f" x="260" y="262" width="3" height="74" rx="2"/>
    <text class="fg" x="272" y="280" font-weight="600" font-size="11">Worker 1</text>
    <text class="success" x="430" y="280" text-anchor="end" font-size="9">DONE</text>
    <text class="dim mono" x="272" y="294" font-size="10">tier.fast · round 2</text>
    <text class="fg" x="272" y="312" font-size="10">Compare Python concurrency</text>
    <text class="fg" x="272" y="324" font-size="10">model + ecosystem maturity.</text>

    <!-- Worker 2 — refining (active animation) -->
    <rect class="panel" x="470" y="262" width="200" height="74" rx="8" stroke="#7c9cff">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <rect fill="#7c9cff" x="470" y="262" width="3" height="74" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.6s" repeatCount="indefinite"/>
    </rect>
    <text class="fg" x="482" y="280" font-weight="600" font-size="11">Worker 2</text>
    <text class="accent" x="640" y="280" text-anchor="end" font-size="9">REFINING</text>
    <text class="dim mono" x="482" y="294" font-size="10">tier.fast · round 2</text>
    <text class="fg" x="482" y="312" font-size="10">Compare Rust concurrency</text>
    <text class="fg" x="482" y="324" font-size="10">model + ecosystem maturity.</text>

    <!-- Worker 3 — done -->
    <rect class="panel" x="680" y="262" width="200" height="74" rx="8" stroke="#252a34"/>
    <rect fill="#5fd18f" x="680" y="262" width="3" height="74" rx="2"/>
    <text class="fg" x="692" y="280" font-weight="600" font-size="11">Worker 3</text>
    <text class="success" x="850" y="280" text-anchor="end" font-size="9">DONE</text>
    <text class="dim mono" x="692" y="294" font-size="10">tier.fast · round 2</text>
    <text class="fg" x="692" y="312" font-size="10">Compare Go concurrency</text>
    <text class="fg" x="692" y="324" font-size="10">model + deployment story.</text>
  </g>

  <!-- ── Streaming partial answer ─────────────────────── -->
  <rect class="alt" x="260" y="346" width="620" height="76" rx="10" stroke="#252a34"/>
  <text class="dim" x="276" y="365" font-size="10">SYNTHESIZED ANSWER (streaming)</text>
  <text class="fg" x="276" y="384" font-size="11">All three handle the load, but the right pick depends on</text>
  <text class="fg" x="276" y="400" font-size="11">where you want to spend complexity. Go's goroutines give</text>
  <text class="fg" x="276" y="416" font-size="11">the smoothest ramp; Rust trades early friction for…<tspan class="accent">▌<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></tspan></text>

  <!-- ── Telemetry panel (compact, expanded) ─────────── -->
  <line class="sep" x1="240" y1="442" x2="900" y2="442"/>
  <rect class="alt" x="240" y="442" width="660" height="98"/>

  <circle class="success" cx="260" cy="460" r="4"/>
  <text class="dim" x="272" y="464" font-size="11">31 ms · 47.1 tok/s · 3 workers active</text>
  <text class="dim" x="884" y="464" font-size="11" text-anchor="end">▾</text>

  <text class="dim" x="260" y="486" font-size="11">VRAM</text>
  <rect fill="#1a1f28" x="320" y="479" width="380" height="6" rx="3" stroke="#252a34"/>
  <rect class="accent" x="320" y="479" width="350" height="6" rx="3"/>
  <text class="fg" x="712" y="486" font-size="11">22.1 / 24.0 GB</text>
  <text class="dim" x="800" y="486" font-size="11">(92%)</text>

  <text class="dim" x="260" y="504" font-size="11">RAM</text>
  <rect fill="#1a1f28" x="320" y="497" width="380" height="6" rx="3" stroke="#252a34"/>
  <rect class="warn" x="320" y="497" width="262" height="6" rx="3"/>
  <text class="fg" x="712" y="504" font-size="11">22.1 / 32.0 GB</text>
  <text class="dim" x="800" y="504" font-size="11">(69%)</text>

  <text class="dim" x="260" y="522" font-size="11">Context</text>
  <rect fill="#1a1f28" x="320" y="515" width="380" height="6" rx="3" stroke="#252a34"/>
  <rect class="accent" x="320" y="515" width="160" height="6" rx="3"/>
  <text class="fg" x="712" y="522" font-size="11">6.7k / 16k tok</text>
  <text class="dim" x="800" y="522" font-size="11">(42%)</text>

  <!-- ── Composer ─────────────────────────────────────────── -->
  <line class="sep" x1="240" y1="550" x2="900" y2="550"/>

  <rect class="alt" x="260" y="570" width="40" height="40" rx="6" stroke="#252a34"/>
  <text class="fg" x="273" y="596" font-size="16">📎</text>

  <rect class="alt" x="306" y="570" width="40" height="40" rx="6" stroke="#7c9cff"/>
  <text fill="#7c9cff" x="319" y="596" font-size="16">🧰</text>
  <circle class="accent" cx="342" cy="570" r="8"/>
  <text fill="#ffffff" x="339" y="573" font-size="9" font-weight="700">2</text>

  <rect class="alt" x="354" y="570" width="440" height="40" rx="6" stroke="#252a34"/>
  <text class="dim" x="370" y="594">Message Versatile…</text>

  <rect class="accent" x="802" y="570" width="80" height="40" rx="6"/>
  <text fill="#ffffff" x="830" y="594" font-weight="600">Send</text>

  <!-- Bottom caption -->
  <text class="dim" x="260" y="630" font-size="10">
    🤝 multi-agent toggle (admin/elevated only) · per-chat overrides for workers, tier, reasoning, interaction mode
  </text>
</svg>
