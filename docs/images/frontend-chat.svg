<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <style><![CDATA[
      .bg { fill: #0e1114; }
      .panel { fill: #1a1f28; }
      .alt { fill: #141820; }
      .border { stroke: #252a34; stroke-width: 1; fill: none; }
      .fg { fill: #e5e7eb; }
      .dim { fill: #8b94a6; }
      .accent { fill: #7c9cff; }
      .accent-dim { fill: #3d5bbf; }
      .success { fill: #5fd18f; }
      .warn { fill: #ffb860; }
      .danger { fill: #ff6b6b; }
      .sep { stroke: #252a34; stroke-width: 1; }
      text { font-size: 12px; }
      .title { font-size: 13px; font-weight: 600; fill: #e5e7eb; }
      .meta { font-size: 10px; fill: #8b94a6; }
      .chip { fill: #1a1f28; stroke: #252a34; }
    ]]></style>
  </defs>

  <!-- Root background -->
  <rect class="bg" width="900" height="600"/>

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <rect class="alt" x="0" y="0" width="240" height="600"/>
  <line class="sep" x1="240" y1="0" x2="240" y2="600"/>

  <!-- Sidebar header -->
  <text class="title" x="20" y="30">Local AI Stack</text>
  <rect class="chip" x="180" y="16" width="20" height="20" rx="4"/>
  <text class="dim" x="187" y="30">⚙</text>
  <rect class="chip" x="205" y="16" width="20" height="20" rx="4"/>
  <text class="fg" x="212" y="30">+</text>
  <line class="sep" x1="0" y1="54" x2="240" y2="54"/>

  <!-- Conversation list -->
  <rect class="panel" x="10" y="66" width="220" height="30" rx="6"/>
  <text class="fg" x="20" y="85">Response-mode experiments</text>
  <text class="dim" x="20" y="115">VRAM scheduler tuning</text>
  <text class="dim" x="20" y="140">Rewrite middleware pipeline</text>
  <text class="dim" x="20" y="165">Compose tier overrides</text>
  <text class="dim" x="20" y="190">Debug SSE backpressure</text>
  <text class="dim" x="20" y="215">Qdrant upload flow</text>
  <text class="dim" x="20" y="240">Roadmap triage</text>

  <!-- Sidebar footer -->
  <line class="sep" x1="0" y1="570" x2="240" y2="570"/>
  <text class="dim" x="20" y="588">you@example.com · <tspan fill="#7c9cff">sign out</tspan></text>

  <!-- ── Header ───────────────────────────────────────────── -->
  <line class="sep" x1="240" y1="54" x2="900" y2="54"/>

  <!-- Tier picker -->
  <rect class="alt" x="260" y="16" width="232" height="28" rx="8" stroke="#252a34"/>
  <rect class="panel" x="266" y="20" width="66" height="20" rx="5"/>
  <text class="fg" x="276" y="34" font-size="11">Versatile</text>
  <text class="dim" x="342" y="34" font-size="11">Fast</text>
  <text class="dim" x="378" y="34" font-size="11">Coding</text>
  <text class="dim" x="420" y="34" font-size="11">Vision</text>
  <text class="dim" x="462" y="34" font-size="11">Highest</text>

  <!-- Reasoning toggle -->
  <rect class="alt" x="500" y="16" width="128" height="28" rx="6" stroke="#252a34"/>
  <text class="dim" x="510" y="34" font-size="11">🧠 reasoning: auto ▾</text>

  <!-- Response mode picker -->
  <rect class="alt" x="636" y="16" width="126" height="28" rx="6" stroke="#7c9cff"/>
  <text class="accent" x="646" y="34" font-size="11">📋 Plan first ▾</text>

  <!-- Admin button + email -->
  <rect class="panel" x="770" y="16" width="48" height="28" rx="6" stroke="#252a34"/>
  <text class="fg" x="780" y="34" font-size="11">Admin</text>
  <text class="dim" x="826" y="34" font-size="11">you@…</text>

  <!-- ── Chat body ────────────────────────────────────────── -->
  <!-- User message -->
  <rect class="accent-dim" x="440" y="76" width="300" height="48" rx="10"/>
  <text fill="#ffffff" x="456" y="98">Draft a migration plan for switching</text>
  <text fill="#ffffff" x="456" y="116">RAG from Qdrant to pgvector.</text>

  <!-- Assistant: plan -->
  <text class="meta" x="260" y="144">versatile</text>
  <rect class="panel" x="260" y="152" width="520" height="156" rx="10" stroke="#252a34"/>
  <text class="fg" x="276" y="174" font-weight="600">Proposed plan</text>
  <text class="fg" x="276" y="196">1. Audit current RAG schema + embedding pipeline</text>
  <text class="fg" x="276" y="216">2. Stand up pgvector alongside Qdrant</text>
  <text class="fg" x="276" y="236">3. Dual-write embeddings for a week</text>
  <text class="fg" x="276" y="256">4. Cut reads over &amp; monitor recall</text>
  <text class="fg" x="276" y="276">5. Decommission Qdrant container</text>
  <text class="dim" x="276" y="300" font-style="italic">&gt; Reply "go" to execute, or edit the plan above.</text>

  <!-- Mode hint -->
  <text class="meta" x="260" y="326">🗒️ Follow-up: switch to "My plan" to steer step-by-step</text>

  <!-- ── Telemetry panel (expanded) ───────────────────────── -->
  <line class="sep" x1="240" y1="370" x2="900" y2="370"/>
  <rect class="alt" x="240" y="370" width="660" height="110"/>

  <!-- Toggle line -->
  <circle class="success" cx="260" cy="388" r="4"/>
  <text class="dim" x="272" y="392" font-size="11">28 ms · 32.4 tok/s</text>
  <text class="dim" x="884" y="392" font-size="11" text-anchor="end">▾</text>

  <!-- Telemetry body -->
  <text class="dim" x="260" y="416" font-size="11">Ping</text>
  <text class="fg" x="336" y="416" font-size="11">28 ms</text>
  <text class="dim" x="500" y="416" font-size="11">Tokens / sec</text>
  <text class="fg" x="592" y="416" font-size="11">32.4</text>

  <!-- VRAM bar -->
  <text class="dim" x="260" y="438" font-size="11">VRAM</text>
  <rect fill="#1a1f28" x="320" y="431" width="380" height="6" rx="3" stroke="#252a34"/>
  <rect class="accent" x="320" y="431" width="320" height="6" rx="3"/>
  <text class="fg" x="712" y="438" font-size="11">20.2 / 24.0 GB</text>
  <text class="dim" x="800" y="438" font-size="11">(84%)</text>

  <!-- RAM bar -->
  <text class="dim" x="260" y="456" font-size="11">RAM</text>
  <rect fill="#1a1f28" x="320" y="449" width="380" height="6" rx="3" stroke="#252a34"/>
  <rect class="warn" x="320" y="449" width="262" height="6" rx="3"/>
  <text class="fg" x="712" y="456" font-size="11">22.1 / 32.0 GB</text>
  <text class="dim" x="800" y="456" font-size="11">(69%)</text>

  <!-- Context bar -->
  <text class="dim" x="260" y="474" font-size="11">Context</text>
  <rect fill="#1a1f28" x="320" y="467" width="380" height="6" rx="3" stroke="#252a34"/>
  <rect class="accent" x="320" y="467" width="116" height="6" rx="3"/>
  <text class="fg" x="712" y="474" font-size="11">4.8k / 16k tok</text>
  <text class="dim" x="800" y="474" font-size="11">(30%)</text>

  <!-- ── Composer ─────────────────────────────────────────── -->
  <line class="sep" x1="240" y1="490" x2="900" y2="490"/>

  <!-- Upload button -->
  <rect class="alt" x="260" y="510" width="40" height="40" rx="6" stroke="#252a34"/>
  <text class="fg" x="273" y="536" font-size="16">📎</text>

  <!-- Tools button with count badge -->
  <rect class="alt" x="306" y="510" width="40" height="40" rx="6" stroke="#7c9cff"/>
  <text fill="#7c9cff" x="319" y="536" font-size="16">🧰</text>
  <circle class="accent" cx="342" cy="510" r="8"/>
  <text fill="#ffffff" x="339" y="513" font-size="9" font-weight="700">2</text>

  <!-- Textarea -->
  <rect class="alt" x="354" y="510" width="440" height="40" rx="6" stroke="#252a34"/>
  <text class="dim" x="370" y="534">Message Versatile…</text>

  <!-- Send -->
  <rect class="accent" x="802" y="510" width="80" height="40" rx="6"/>
  <text fill="#ffffff" x="830" y="534" font-weight="600">Send</text>
</svg>
