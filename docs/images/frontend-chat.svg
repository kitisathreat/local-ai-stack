<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540"
     role="img" aria-label="Chat UI mid-collaborative-multi-agent run, Bloomberg-themed">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
      .face   { font-family: 'IBM Plex Mono', 'Cascadia Code', Consolas, monospace; }
      .bg     { fill: #000000; }
      .panel  { fill: #0a0a0a; }
      .panel2 { fill: #161616; }
      .amber  { fill: #FFA028; }
      .amber-dim { fill: #B87513; }
      .yellow { fill: #FFFF00; }
      .green  { fill: #00FF66; }
      .red    { fill: #FF3333; }
      .cyan   { fill: #00DDFF; }
      .magenta{ fill: #FF44CC; }
      .header-bg { fill: #8B0000; }
      .border-amber { stroke: #FFA028; stroke-width: 1; fill: none; }
      .border-dim   { stroke: #66421A; stroke-width: 1; fill: none; }
      .b      { font-weight: 600; }
    ]]></style>
  </defs>

  <rect class="bg" width="900" height="540"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="900" height="32" class="bg"/>
  <line x1="0" y1="32" x2="900" y2="32" class="border-amber"/>
  <text class="face amber b" x="14" y="20" font-size="11">LOCAL AI STACK</text>
  <rect class="border-amber" x="120" y="6" width="180" height="20"/>
  <text class="face amber" x="130" y="20" font-size="10">VERSATILE: Qwen3-30B</text>
  <text class="face amber-dim" x="320" y="20" font-size="10">ORCH</text>
  <text class="face amber" x="358" y="20" font-size="10">VERSATILE</text>
  <text class="face amber-dim" x="450" y="20" font-size="10">WORKERS</text>
  <text class="face amber" x="510" y="20" font-size="10">FAST x3</text>
  <text class="face amber-dim" x="600" y="20" font-size="10">VRAM</text>
  <text class="face green b"  x="640" y="20" font-size="10">12.8/16 GB</text>
  <text class="face amber-dim" x="740" y="20" font-size="10">CTX</text>
  <text class="face amber" x="772" y="20" font-size="10">8.4k/65k</text>

  <!-- Sidebar -->
  <rect class="panel" x="0" y="32" width="200" height="476"/>
  <line x1="200" y1="32" x2="200" y2="508" class="border-amber"/>
  <text class="face amber-dim" x="14" y="56" font-size="10">CONVERSATIONS</text>
  <rect class="panel2" x="10" y="64" width="180" height="36"/>
  <rect class="border-amber" x="10" y="64" width="180" height="36"/>
  <text class="face amber b" x="18" y="80" font-size="11">RAG benchmarks</text>
  <text class="face amber-dim" x="18" y="93" font-size="9">12:14 PT  ::  versatile</text>
  <text class="face amber" x="18" y="119" font-size="11">Code review pass</text>
  <text class="face amber-dim" x="18" y="132" font-size="9">11:42 PT  ::  coding</text>
  <text class="face amber" x="18" y="158" font-size="11">Settings + connectors</text>
  <text class="face amber-dim" x="18" y="171" font-size="9">11:08 PT  ::  fast</text>

  <!-- Main chat -->
  <text class="face amber-dim" x="220" y="56" font-size="10">12:31:02 PT</text>
  <text class="face yellow b" x="220" y="72" font-size="11">USER</text>
  <text class="face yellow"   x="220" y="92" font-size="12">Compare three approaches to handling long-context</text>
  <text class="face yellow"   x="220" y="108" font-size="12">retrieval and pick the best for our stack.</text>

  <!-- Orchestrator pill -->
  <rect class="border-amber" x="220" y="128" width="660" height="22"/>
  <text class="face amber b"  x="230" y="144" font-size="11">ORCHESTRATOR</text>
  <text class="face cyan b"   x="340" y="144" font-size="11">decompose</text>
  <text class="face amber-dim" x="430" y="144" font-size="11">→ 3 worker prompts dispatched</text>
  <text class="face green b" x="850" y="144" font-size="11" text-anchor="end">running</text>
  <circle cx="868" cy="139" r="3" class="green">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Three workers -->
  <g>
    <rect class="border-dim" x="220" y="158" width="216" height="180"/>
    <text class="face amber-dim" x="228" y="174" font-size="10">WORKER 1  ::  fast tier</text>
    <text class="face amber"     x="228" y="192" font-size="10.5">approach: sliding window with</text>
    <text class="face amber"     x="228" y="207" font-size="10.5">overlap. preserves locality but</text>
    <text class="face amber"     x="228" y="222" font-size="10.5">drops context past 8k. fits</text>
    <text class="face amber"     x="228" y="237" font-size="10.5">cheap with the swarm tier.</text>
    <rect x="228" y="316" width="200" height="2" class="border-dim"/>
    <rect x="228" y="316" width="0" height="2" class="green">
      <animate attributeName="width" from="0" to="200" begin="0s" dur="3s" repeatCount="indefinite"/>
    </rect>

    <rect class="border-dim" x="442" y="158" width="216" height="180"/>
    <text class="face amber-dim" x="450" y="174" font-size="10">WORKER 2  ::  fast tier</text>
    <text class="face amber"     x="450" y="192" font-size="10.5">approach: hierarchical chunk</text>
    <text class="face amber"     x="450" y="207" font-size="10.5">summarize → re-rank top-k via</text>
    <text class="face amber"     x="450" y="222" font-size="10.5">embedding model. uses Qwen3-</text>
    <text class="face amber"     x="450" y="237" font-size="10.5">8B-Embedding for stage 1.</text>
    <rect x="450" y="316" width="200" height="2" class="border-dim"/>
    <rect x="450" y="316" width="0" height="2" class="green">
      <animate attributeName="width" from="0" to="200" begin="0.4s" dur="3s" repeatCount="indefinite"/>
    </rect>

    <rect class="border-dim" x="664" y="158" width="216" height="180"/>
    <text class="face amber-dim" x="672" y="174" font-size="10">WORKER 3  ::  fast tier</text>
    <text class="face amber"     x="672" y="192" font-size="10.5">approach: native long context</text>
    <text class="face amber"     x="672" y="207" font-size="10.5">on the reasoning_xl tier (256k</text>
    <text class="face amber"     x="672" y="222" font-size="10.5">window). slow but no recall</text>
    <text class="face amber"     x="672" y="237" font-size="10.5">loss. cost: ~3x latency.</text>
    <rect x="672" y="316" width="200" height="2" class="border-dim"/>
    <rect x="672" y="316" width="0" height="2" class="green">
      <animate attributeName="width" from="0" to="200" begin="0.8s" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Synthesis (typing in) -->
  <text class="face amber-dim" x="220" y="358" font-size="10">12:31:08 PT  ::  ORCHESTRATOR  ::  synthesize</text>
  <text class="face amber b" x="220" y="376" font-size="12">SYNTHESIS</text>
  <text class="face amber"   x="220" y="396" font-size="12">For your stack:</text>
  <text class="face amber"   x="220" y="414" font-size="12">- short-context (&lt;8k): worker 1 (sliding window)</text>
  <text class="face amber"   x="220" y="432" font-size="12">- mid-context (8-64k): worker 2 (rerank pipeline)</text>
  <text class="face amber"   x="220" y="450" font-size="12">- &gt;64k: worker 3 (reasoning_xl native)</text>
  <rect x="600" y="440" width="8" height="14" class="amber">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Footer composer -->
  <line x1="0" y1="478" x2="900" y2="478" class="border-amber"/>
  <rect class="panel" x="0" y="478" width="900" height="62"/>
  <rect class="border-amber" x="14" y="490" width="760" height="38"/>
  <text class="face amber-dim" x="22" y="513" font-size="11">Type a message. Enter to send, Shift+Enter for newline.</text>
  <rect x="784" y="490" width="100" height="38" class="amber"/>
  <text class="face b" x="834" y="514" font-size="12" text-anchor="middle" fill="#000">SEND</text>
</svg>
