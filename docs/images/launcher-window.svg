<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="Cascadia Code, Consolas, ui-monospace, monospace" role="img" aria-label="LocalAIStack.ps1 console banner during -Start">
  <defs>
    <style><![CDATA[
      .shadow { fill: rgba(0,0,0,0.45); }
      .chrome { fill: #1a1a1a; }
      .body   { fill: #0c0c0c; }
      .fg     { fill: #e5e7eb; }
      .dim    { fill: #8b94a6; }
      .accent { fill: #7c9cff; }
      .ok     { fill: #5fd18f; }
      .warn   { fill: #ffb860; }
      .step   { fill: #4ec9ff; }
    ]]></style>
  </defs>

  <!-- Backdrop -->
  <rect width="640" height="380" fill="#202328"/>

  <!-- Drop shadow + window -->
  <rect class="shadow" x="32" y="38" width="576" height="312" rx="8"/>
  <rect class="body"   x="28" y="32" width="576" height="312" rx="6"/>

  <!-- Title bar -->
  <rect class="chrome" x="28" y="32" width="576" height="28" rx="6"/>
  <rect class="chrome" x="28" y="52" width="576" height="8"/>
  <text class="dim" x="44" y="50" font-size="11" font-family="Segoe UI, sans-serif">Windows PowerShell — LocalAIStack.ps1 -Start</text>
  <text class="dim" x="568" y="50" font-size="12" font-family="Segoe UI, sans-serif">—</text>
  <text class="dim" x="586" y="50" font-size="12" font-family="Segoe UI, sans-serif">✕</text>

  <!-- Console body -->
  <text font-size="11.5">
    <tspan x="44" y="86" class="dim">PS C:\local-ai-stack&gt; </tspan><tspan class="fg">.\LocalAIStack.ps1</tspan>
    <tspan x="44" y="108" class="step">==&gt; </tspan><tspan class="fg">Resolving model tiers (Hugging Face GGUF)</tspan>
    <tspan x="64" y="124" class="ok">   ok </tspan><tspan class="dim">versatile  → Qwen3.6-35B-A3B-Q4_K_M.gguf  (cached)</tspan>
    <tspan x="64" y="140" class="ok">   ok </tspan><tspan class="dim">fast       → Qwen3.5-9B-Q5_K_M.gguf       (cached)</tspan>
    <tspan x="64" y="156" class="ok">   ok </tspan><tspan class="dim">embedding  → nomic-embed-text-v1.5.gguf  (cached)</tspan>
    <tspan x="44" y="178" class="step">==&gt; </tspan><tspan class="fg">Starting Qdrant on :6333</tspan>
    <tspan x="64" y="194" class="ok">   ok </tspan><tspan class="dim">vendor\qdrant\qdrant.exe (pid 14820)</tspan>
    <tspan x="44" y="216" class="step">==&gt; </tspan><tspan class="fg">Pre-spawning vision + embedding llama-server</tspan>
    <tspan x="64" y="232" class="ok">   ok </tspan><tspan class="dim">llama-server :8001 vision   (pid 9112)</tspan>
    <tspan x="64" y="248" class="ok">   ok </tspan><tspan class="dim">llama-server :8090 embedding (pid 12044)</tspan>
    <tspan x="44" y="270" class="step">==&gt; </tspan><tspan class="fg">Backend on :18000 (FastAPI / uvicorn)</tspan>
    <tspan x="64" y="286" class="ok">   ok </tspan><tspan class="dim">healthz {status:"ok"}</tspan>
    <tspan x="44" y="308" class="step">==&gt; </tspan><tspan class="fg">Launching native Qt GUI</tspan>
  </text>

  <!-- Caret -->
  <rect class="fg" x="44" y="322" width="7" height="13">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
