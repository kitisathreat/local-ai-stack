<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="Segoe UI, -apple-system, sans-serif" role="img" aria-label="Metrics window — VRAM per tier (QtCharts line chart)">
  <defs>
    <style><![CDATA[
      .bg     { fill: #0e1114; }
      .alt    { fill: #141820; }
      .panel  { fill: #1a1f28; }
      .fg     { fill: #e5e7eb; }
      .dim    { fill: #8b94a6; }
      .grid   { stroke: #1f242e; stroke-width: 1; }
      .axis   { stroke: #3a4150; stroke-width: 1; }
      .sep    { stroke: #252a34; stroke-width: 1; }
      text    { font-size: 11px; }
      .h1     { font-size: 15px; font-weight: 600; fill: #e5e7eb; }
      .label  { font-size: 10px; fill: #8b94a6; letter-spacing: 0.05em; }
      .mono   { font-family: ui-monospace, Consolas, monospace; }
    ]]></style>
  </defs>

  <rect class="bg" width="760" height="460"/>

  <!-- Title bar -->
  <rect class="alt" width="760" height="34"/>
  <line class="sep" x1="0" y1="34" x2="760" y2="34"/>
  <text class="h1" x="20" y="22" font-size="13">Local AI Stack — Metrics</text>
  <text class="dim" x="720" y="22" font-size="12">— ▢ ✕</text>

  <!-- Chart card -->
  <rect class="panel" x="20" y="50" width="720" height="340" rx="8" stroke="#252a34"/>
  <text class="label" x="36" y="74">VRAM PER TIER · /api/vram · 2 s poll · 60 sample window</text>

  <!-- Plot area: x = 60..720 inset, y = 90..360 -->
  <!-- Y gridlines + labels (0, 8, 16, 24, 32, 40, 48 GB) -->
  <line class="grid" x1="80" y1="356" x2="720" y2="356"/>
  <line class="grid" x1="80" y1="312" x2="720" y2="312"/>
  <line class="grid" x1="80" y1="268" x2="720" y2="268"/>
  <line class="grid" x1="80" y1="224" x2="720" y2="224"/>
  <line class="grid" x1="80" y1="180" x2="720" y2="180"/>
  <line class="grid" x1="80" y1="136" x2="720" y2="136"/>
  <line class="grid" x1="80" y1="92"  x2="720" y2="92"/>

  <text class="dim" x="48" y="360" font-size="10">0</text>
  <text class="dim" x="48" y="316" font-size="10">8</text>
  <text class="dim" x="44" y="272" font-size="10">16</text>
  <text class="dim" x="44" y="228" font-size="10">24</text>
  <text class="dim" x="44" y="184" font-size="10">32</text>
  <text class="dim" x="44" y="140" font-size="10">40</text>
  <text class="dim" x="44" y="96"  font-size="10">48</text>
  <text class="dim" x="20" y="232" transform="rotate(-90 20 232)">GB</text>

  <!-- X axis -->
  <line class="axis" x1="80" y1="356" x2="720" y2="356"/>
  <line class="axis" x1="80" y1="92"  x2="80"  y2="356"/>
  <text class="dim" x="80" y="376" font-size="10">0</text>
  <text class="dim" x="207" y="376" font-size="10">12</text>
  <text class="dim" x="335" y="376" font-size="10">24</text>
  <text class="dim" x="463" y="376" font-size="10">36</text>
  <text class="dim" x="591" y="376" font-size="10">48</text>
  <text class="dim" x="715" y="376" font-size="10">60</text>
  <text class="dim" x="380" y="392" font-size="10" text-anchor="middle">Tick (2 s each)</text>

  <!-- Series: versatile (blue ~21 GB) — y = 356 - gb*5.5 -->
  <polyline fill="none" stroke="#7c9cff" stroke-width="1.8"
    points="80,240 90,238 100,240 110,236 120,234 130,238 140,236 150,232 160,234 170,230 180,232 190,228 200,232 210,230 220,232 230,234 240,236 250,232 260,230 270,232 280,228 290,230 300,232 310,228 320,230 330,234 340,236 350,232 360,230 370,234 380,232 390,230 400,232 410,228 420,230 430,232 440,236 450,238 460,240 470,236 480,234 490,236 500,238 510,234 520,232 530,230 540,228 550,232 560,234 570,236 580,232 590,230 600,232 610,234 620,232 630,230 640,228 650,230 660,232 670,236 680,238 690,234 700,232 710,234 720,232"/>

  <!-- Series: vision (orange ~0.4 GB → flat near bottom) -->
  <polyline fill="none" stroke="#ffb860" stroke-width="1.8"
    points="80,353 200,352 320,353 440,352 560,353 680,352 720,353"/>

  <!-- Series: embedding (green ~0.3 GB) -->
  <polyline fill="none" stroke="#5fd18f" stroke-width="1.8"
    points="80,354 200,353 320,354 440,353 560,354 680,353 720,354"/>

  <!-- Series: fast (purple ~7 GB, bursts) -->
  <polyline fill="none" stroke="#b58cff" stroke-width="1.8"
    points="80,355 100,355 120,355 140,355 160,355 180,355 200,318 220,318 240,318 260,318 280,355 300,355 320,355 340,318 360,318 380,318 400,318 420,355 440,355 460,355 480,355 500,355 520,355 540,355 560,355 580,318 600,318 620,318 640,355 660,355 680,355 700,355 720,355"/>

  <!-- Series: coding (red — currently unloaded, flat baseline) -->
  <polyline fill="none" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="4 3"
    points="80,355 720,355"/>

  <!-- Pulse marker on latest tick -->
  <circle cx="720" cy="232" r="4" fill="#7c9cff">
    <animate attributeName="r" values="3;6;3" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Legend -->
  <g font-size="10.5">
    <line stroke="#7c9cff"  stroke-width="2" x1="80"  y1="412" x2="100" y2="412"/>
    <text x="106" y="416" class="fg mono">tier.versatile  21.4 GB</text>

    <line stroke="#b58cff"  stroke-width="2" x1="244" y1="412" x2="264" y2="412"/>
    <text class="fg" x="270" y="416">tier.fast  6.9 GB</text>

    <line stroke="#ffb860" stroke-width="2" x1="372" y1="412" x2="392" y2="412"/>
    <text class="fg" x="398" y="416">tier.vision  0.4 GB</text>

    <line stroke="#5fd18f"  stroke-width="2" x1="492" y1="412" x2="512" y2="412"/>
    <text class="fg" x="518" y="416">tier.embedding  0.3 GB</text>

    <line stroke="#ff6b6b"  stroke-width="2" stroke-dasharray="4 3" x1="638" y1="412" x2="658" y2="412"/>
    <text class="dim" x="664" y="416">tier.coding  evicted</text>
  </g>

  <!-- Status bar -->
  <text class="dim" x="20" y="448" font-size="10.5">Polling /api/vram every 2 s · QtCharts QLineSeries · cancels on close</text>
</svg>
