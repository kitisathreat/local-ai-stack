<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460"
     role="img" aria-label="Metrics window — VRAM per tier line chart, Bloomberg-themed">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
      .face   { font-family: 'IBM Plex Mono', 'Cascadia Code', Consolas, monospace; }
      .bg     { fill: #000000; }
      .panel  { fill: #0a0a0a; }
      .amber  { fill: #FFA028; }
      .amber-dim { fill: #B87513; }
      .yellow { fill: #FFFF00; }
      .green  { fill: #00FF66; }
      .red    { fill: #FF3333; }
      .cyan   { fill: #00DDFF; }
      .magenta{ fill: #FF44CC; }
      .header-bg { fill: #8B0000; }
      .border-amber { stroke: #FFA028; stroke-width: 1; fill: none; }
      .border-dim   { stroke: #66421A; stroke-width: 1; fill: none; }
      .b      { font-weight: 600; }
    ]]></style>
  </defs>

  <rect class="bg" width="760" height="460"/>
  <rect class="header-bg" x="0" y="0" width="760" height="22"/>
  <text class="face amber b" x="14" y="16" font-size="11">METRICS  ::  VRAM PER TIER  ::  60s WINDOW</text>
  <text class="face amber-dim" x="744" y="16" font-size="11" text-anchor="end">PAUSE: SPACE</text>

  <!-- Top KPI strip -->
  <g class="face">
    <rect class="border-amber" x="14" y="34" width="180" height="56"/>
    <text class="amber-dim" x="22" y="50" font-size="10">TOTAL VRAM</text>
    <text class="amber b"   x="22" y="76" font-size="20">12.6 / 16 GB</text>

    <rect class="border-amber" x="200" y="34" width="180" height="56"/>
    <text class="amber-dim" x="208" y="50" font-size="10">RESIDENT TIERS</text>
    <text class="amber b"   x="208" y="76" font-size="20">3</text>
    <text class="green b"   x="376" y="76" font-size="10" text-anchor="end">▲ 1 in last 60s</text>

    <rect class="border-amber" x="386" y="34" width="180" height="56"/>
    <text class="amber-dim" x="394" y="50" font-size="10">EVICTIONS / 5min</text>
    <text class="amber b"   x="394" y="76" font-size="20">2</text>

    <rect class="border-amber" x="572" y="34" width="174" height="56"/>
    <text class="amber-dim" x="580" y="50" font-size="10">P95 LATENCY</text>
    <text class="amber b"   x="580" y="76" font-size="20">3.4s</text>
    <text class="green b"   x="740" y="76" font-size="10" text-anchor="end">▼ 0.2s</text>
  </g>

  <!-- Main chart panel -->
  <rect class="border-amber" x="14" y="100" width="732" height="282"/>
  <text class="face amber b"  x="22" y="118" font-size="12">VRAM TIME SERIES</text>
  <text class="face amber-dim" x="22" y="134" font-size="10">stacked allocation per tier</text>
  <text class="face amber-dim" x="740" y="118" font-size="10" text-anchor="end">live</text>
  <circle cx="730" cy="115" r="3" class="green">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Axes -->
  <line x1="50" y1="356" x2="730" y2="356" class="border-dim"/>
  <line x1="50" y1="150" x2="50" y2="356" class="border-dim"/>
  <text class="face amber-dim" x="46" y="360" font-size="9" text-anchor="end">0</text>
  <text class="face amber-dim" x="46" y="306" font-size="9" text-anchor="end">4</text>
  <text class="face amber-dim" x="46" y="254" font-size="9" text-anchor="end">8</text>
  <text class="face amber-dim" x="46" y="202" font-size="9" text-anchor="end">12</text>
  <text class="face amber-dim" x="46" y="155" font-size="9" text-anchor="end">16 GB</text>
  <!-- 16GB ceiling -->
  <line x1="50" y1="150" x2="730" y2="150" stroke="#FF3333" stroke-width="0.5" stroke-dasharray="3 3"/>
  <text class="face red" x="730" y="146" font-size="9" text-anchor="end">VRAM cap 16 GB</text>

  <!-- 4 stacked lines drawn with stroke-dasharray reveal -->
  <polyline fill="none" stroke="#FFA028" stroke-width="1.5"
            points="50,346 110,344 170,342 230,341 290,340 350,338 410,336 470,335 530,333 590,332 650,331 730,330">
    <animate attributeName="stroke-dasharray" from="0,1500" to="1500,0" dur="1.5s" begin="0s" fill="freeze"/>
  </polyline>
  <polyline fill="none" stroke="#FFFF00" stroke-width="1.5"
            points="50,300 110,298 170,290 230,280 290,270 350,260 410,254 470,248 530,242 590,238 650,235 730,234">
    <animate attributeName="stroke-dasharray" from="0,1500" to="1500,0" dur="1.5s" begin="0.2s" fill="freeze"/>
  </polyline>
  <polyline fill="none" stroke="#00DDFF" stroke-width="1.5"
            points="50,246 110,242 170,236 230,230 290,222 350,216 410,210 470,206 530,202 590,200 650,198 730,196">
    <animate attributeName="stroke-dasharray" from="0,1500" to="1500,0" dur="1.5s" begin="0.4s" fill="freeze"/>
  </polyline>
  <polyline fill="none" stroke="#00FF66" stroke-width="1.5"
            points="50,210 110,208 170,205 230,200 290,196 350,192 410,188 470,184 530,180 590,176 650,172 730,170">
    <animate attributeName="stroke-dasharray" from="0,1500" to="1500,0" dur="1.5s" begin="0.6s" fill="freeze"/>
  </polyline>

  <!-- Eviction markers -->
  <line x1="290" y1="150" x2="290" y2="356" stroke="#FF3333" stroke-width="0.8" stroke-dasharray="2 4"/>
  <text class="face red" x="294" y="158" font-size="9">evict swarm</text>
  <line x1="530" y1="150" x2="530" y2="356" stroke="#FF3333" stroke-width="0.8" stroke-dasharray="2 4"/>
  <text class="face red" x="534" y="158" font-size="9">evict fast</text>

  <!-- Legend -->
  <g class="face" font-size="10">
    <line x1="60" y1="372" x2="84" y2="372" stroke="#FFA028" stroke-width="2"/>
    <text class="amber" x="92" y="376">swarm</text>
    <line x1="180" y1="372" x2="204" y2="372" stroke="#FFFF00" stroke-width="2"/>
    <text class="yellow" x="212" y="376">fast</text>
    <line x1="280" y1="372" x2="304" y2="372" stroke="#00DDFF" stroke-width="2"/>
    <text class="cyan" x="312" y="376">versatile</text>
    <line x1="420" y1="372" x2="444" y2="372" stroke="#00FF66" stroke-width="2"/>
    <text class="green" x="452" y="376">reasoning_xl</text>
  </g>

  <!-- Footer status -->
  <rect class="panel" x="0" y="436" width="760" height="24"/>
  <text class="face amber-dim" x="14" y="452" font-size="10">CADENCE</text>
  <text class="face amber"     x="78" y="452" font-size="10">1s</text>
  <text class="face amber-dim" x="120" y="452" font-size="10">SOURCE</text>
  <text class="face amber"     x="180" y="452" font-size="10">/admin/overview</text>
  <text class="face amber-dim" x="744" y="452" font-size="10" text-anchor="end">14:33:58 PT</text>
</svg>
