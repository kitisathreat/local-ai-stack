<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540"
     role="img" aria-label="Multi-agent workflow + live test runner, Bloomberg-themed">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
      .face   { font-family: 'IBM Plex Mono', 'Cascadia Code', Consolas, monospace; }
      .bg     { fill: #000000; }
      .panel  { fill: #0a0a0a; }
      .amber  { fill: #FFA028; }
      .amber-dim { fill: #B87513; }
      .yellow { fill: #FFFF00; }
      .green  { fill: #00FF66; }
      .red    { fill: #FF3333; }
      .cyan   { fill: #00DDFF; }
      .magenta{ fill: #FF44CC; }
      .header-bg { fill: #8B0000; }
      .border-amber { stroke: #FFA028; stroke-width: 1; fill: none; }
      .border-dim   { stroke: #66421A; stroke-width: 1; fill: none; }
      .b      { font-weight: 600; }
    ]]></style>
  </defs>

  <rect class="bg" width="900" height="540"/>
  <rect class="header-bg" x="0" y="0" width="900" height="22"/>
  <text class="face amber b" x="14" y="16" font-size="11">MULTI-AGENT  ::  ORCHESTRATOR + WORKERS</text>
  <text class="face amber-dim" x="884" y="16" font-size="11" text-anchor="end">F5=RUN  F6=STOP</text>

  <!-- Diagram: orchestrator at center, workers around -->
  <g class="face">
    <!-- Orchestrator node -->
    <rect class="border-amber" x="378" y="60" width="140" height="60"/>
    <text class="amber b" x="448" y="84" font-size="13" text-anchor="middle">ORCHESTRATOR</text>
    <text class="amber"   x="448" y="102" font-size="11" text-anchor="middle">VERSATILE</text>
    <text class="amber-dim" x="448" y="116" font-size="9" text-anchor="middle">qwen3-30b-a3b</text>

    <!-- Worker 1 -->
    <rect class="border-amber" x="78" y="200" width="140" height="60"/>
    <text class="amber b" x="148" y="222" font-size="12" text-anchor="middle">WORKER 1</text>
    <text class="amber"   x="148" y="240" font-size="11" text-anchor="middle">FAST</text>
    <circle cx="208" cy="208" r="5" class="green">
      <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" begin="0.0s"/>
    </circle>

    <!-- Worker 2 -->
    <rect class="border-amber" x="378" y="200" width="140" height="60"/>
    <text class="amber b" x="448" y="222" font-size="12" text-anchor="middle">WORKER 2</text>
    <text class="amber"   x="448" y="240" font-size="11" text-anchor="middle">FAST</text>
    <circle cx="508" cy="208" r="5" class="green">
      <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" begin="0.3s"/>
    </circle>

    <!-- Worker 3 -->
    <rect class="border-amber" x="678" y="200" width="140" height="60"/>
    <text class="amber b" x="748" y="222" font-size="12" text-anchor="middle">WORKER 3</text>
    <text class="amber"   x="748" y="240" font-size="11" text-anchor="middle">CODING</text>
    <circle cx="808" cy="208" r="5" class="green">
      <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" begin="0.6s"/>
    </circle>

    <!-- Connector lines (with dashed-flow animation) -->
    <line x1="448" y1="120" x2="148" y2="200" stroke="#FFA028" stroke-width="1" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-32" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="448" y1="120" x2="448" y2="200" stroke="#FFA028" stroke-width="1" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-32" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="448" y1="120" x2="748" y2="200" stroke="#FFA028" stroke-width="1" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-32" dur="1s" repeatCount="indefinite"/>
    </line>

    <!-- Round labels on lines -->
    <text class="amber-dim" x="270" y="150" font-size="10">prompt 1</text>
    <text class="amber-dim" x="430" y="170" font-size="10">prompt 2</text>
    <text class="amber-dim" x="600" y="150" font-size="10">prompt 3</text>

    <!-- Return paths (synthesize) -->
    <line x1="148" y1="260" x2="448" y2="320" stroke="#00FF66" stroke-width="1" stroke-dasharray="3 3">
      <animate attributeName="stroke-dashoffset" from="0" to="24" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="448" y1="260" x2="448" y2="320" stroke="#00FF66" stroke-width="1" stroke-dasharray="3 3">
      <animate attributeName="stroke-dashoffset" from="0" to="24" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="748" y1="260" x2="448" y2="320" stroke="#00FF66" stroke-width="1" stroke-dasharray="3 3">
      <animate attributeName="stroke-dashoffset" from="0" to="24" dur="1.2s" repeatCount="indefinite"/>
    </line>

    <!-- Synthesis node -->
    <rect class="border-amber" x="378" y="320" width="140" height="50"/>
    <text class="amber b" x="448" y="342" font-size="12" text-anchor="middle">SYNTHESIZE</text>
    <text class="amber-dim" x="448" y="358" font-size="10" text-anchor="middle">orchestrator merge</text>

    <!-- Final response -->
    <rect class="border-amber" x="378" y="394" width="140" height="40"/>
    <text class="green b" x="448" y="418" font-size="12" text-anchor="middle">RESPONSE</text>
    <line x1="448" y1="370" x2="448" y2="394" stroke="#00FF66" stroke-width="1" stroke-dasharray="3 3">
      <animate attributeName="stroke-dashoffset" from="0" to="24" dur="1.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Live test runner panel -->
  <rect class="border-amber" x="14" y="450" width="872" height="78"/>
  <text class="face amber b" x="22" y="468" font-size="11">LIVE TEST RUNNER</text>
  <text class="face amber-dim" x="884" y="468" font-size="10" text-anchor="end">elapsed 04:21</text>
  <g class="face" font-size="10.5">
    <text class="amber-dim" x="22" y="488">[OK]</text>
    <text class="green b"   x="62" y="488">orchestrator decompose → 3 prompts</text>
    <text class="amber-dim" x="22" y="504">[OK]</text>
    <text class="green b"   x="62" y="504">workers complete in parallel (2.3s, 2.9s, 3.1s)</text>
    <text class="amber-dim" x="22" y="520">[..]</text>
    <text class="yellow b"  x="62" y="520">orchestrator synthesizing</text>
    <rect x="180" y="510" width="80" height="10" class="border-dim"/>
    <rect x="180" y="510" width="0" height="10" class="amber">
      <animate attributeName="width" from="0" to="80" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
